  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:var(--mono);letter-spacing:-.01em}\n  .serif{font-family:var(--serif);font-style:italic;font-weight:400}\n  .micro{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)}\n\n  /* ============ NAV ============ */\n  nav.top{\n    position:sticky;top:0;z-index:50;\n    background:rgba(7,7,11,.78);backdrop-filter:saturate(160%) blur(14px);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}\n  .brand{display:flex;align-items:center;gap:11px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}\n  .brand .mark{\n    width:28px;height:28px;border-radius:7px;\n    background:linear-gradient(135deg,#FF3340 0%, var(--red) 60%, #B30E16 100%);\n    display:grid;place-items:center;color:#FFFFFF;\n    box-shadow:0 0 24px var(--red-glow), inset 0 0 0 1px rgba(255,255,255,.18);\n  }\n  .brand .mark svg{width:14px;height:14px}\n  .brand b{font-weight:700;font-size:16px;letter-spacing:-.015em}\n  .brand b i{font-style:normal;color:var(--ink-3);font-weight:400}\n  .nav-links{display:flex;gap:28px}\n  .nav-links a{font-size:13.5px;color:var(--ink-2);transition:color .15s;font-weight:500}\n  .nav-links a:hover{color:var(--ink)}\n  .nav-cta{display:flex;align-items:center;gap:10px}\n  .btn{\n    height:38px;padding:0 16px;border-radius:6px;\n    display:inline-flex;align-items:center;gap:8px;\n    font-size:13px;font-weight:600;letter-spacing:-.005em;\n    border:1px solid var(--line-2);background:transparent;color:var(--ink);cursor:pointer;\n    transition:all .2s ease;font-family:var(--sans);text-decoration:none;\n  }\n  .btn:hover{background:rgba(255,255,255,.04);border-color:var(--line-strong)}\n  .btn.primary{\n    background:var(--red);color:#FFFFFF;border-color:transparent;\n    box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 8px 22px -8px var(--red-glow);\n  }\n  .btn.primary:hover{background:var(--red-2);transform:translateY(-1px)}\n  .btn .arrow{transition:transform .2s}\n  .btn:hover .arrow{transform:translate(2px,-2px)}\n  .phone{font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}\n  .phone:hover{color:var(--ink)}\n\n  /* ============ HERO ============ */\n  .hero{\n    position:relative;padding:120px 0 100px;border-bottom:1px solid var(--line);overflow:hidden;\n  }\n  .hero::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:\n      linear-gradient(to right, rgba(255,255,255,.035) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(255,255,255,.035) 1px, transparent 1px);\n    background-size:84px 84px;\n    mask-image:radial-gradient(ellipse 70% 80% at 50% 30%, black 30%, transparent 80%);\n    pointer-events:none;\n  }\n  .hero::after{\n    content:\"\";position:absolute;right:-300px;top:-200px;width:900px;height:900px;\n    background:radial-gradient(circle, rgba(229,18,28,.18) 0%, transparent 60%);\n    filter:blur(40px);pointer-events:none;\n  }\n  #hero3d{position:absolute;inset:0;z-index:0;opacity:.85;pointer-events:none}\n  .hero-inner{position:relative;z-index:2;max-width:980px;margin:0 auto;text-align:center}\n  .pill{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:6px 14px 6px 8px;border-radius:999px;\n    border:1px solid var(--line-2);\n    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;\n    color:var(--ink-2);background:rgba(255,255,255,.025);\n  }\n  .pill .tag{background:var(--red);color:#FFFFFF;padding:3px 8px;border-radius:999px;font-weight:600;letter-spacing:.08em}\n  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse 2s ease-in-out infinite}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}\n\n  h1.hero-h{\n    margin:36px 0 0;\n    font-size:clamp(40px,5vw,72px);\n    line-height:1.0;letter-spacing:-.04em;font-weight:600;color:var(--ink);\n  }\n\n  /* ============ HERO — kinetic benchmark display ============ */\n  .hero-kinetic{margin:36px auto 0;max-width:1080px;text-align:center;position:relative}\n  .hero-kinetic .old{\n    font-family:var(--mono);font-size:16px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);\n    display:inline-flex;align-items:center;gap:14px;padding:8px 18px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.025);\n  }\n  .hero-kinetic .old .legacy{position:relative;color:var(--ink-2);font-weight:500}\n  .hero-kinetic .old .legacy::after{content:\"\";position:absolute;left:-4%;right:-4%;top:50%;height:1.5px;background:var(--red);transform:rotate(-4deg);border-radius:2px;opacity:.9}\n  .hero-kinetic .old .arrow{color:var(--red);font-family:var(--mono);font-weight:600}\n  .hero-kinetic .big{\n    margin-top:22px;display:flex;align-items:flex-end;justify-content:center;gap:6px;\n    font-weight:600;letter-spacing:-.06em;line-height:.85;color:var(--ink);\n    font-size:clamp(112px,18vw,260px);\n    font-feature-settings:\"tnum\";\n  }\n  .hero-kinetic .big .num{\n    background:linear-gradient(180deg,#FFFFFF 0%, #FF8088 60%, var(--red) 100%);\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 0 80px rgba(229,18,28,.25);\n    position:relative;\n  }\n  .hero-kinetic .big .num::after{\n    content:\"\";position:absolute;left:0;right:0;top:50%;height:1px;\n    background:linear-gradient(90deg, transparent, rgba(255,51,64,.45) 30%, rgba(255,51,64,.45) 70%, transparent);\n    transform:translateY(-12%);filter:blur(8px);opacity:.7;\n  }\n  .hero-kinetic .big .unit{\n    font-size:clamp(30px,3.6vw,52px);font-weight:500;letter-spacing:-.025em;color:var(--ink-2);\n    align-self:flex-end;padding-bottom:6%;\n    font-family:var(--mono);\n  }\n  .hero-kinetic .big .live{\n    width:14px;height:14px;border-radius:50%;background:var(--red);\n    box-shadow:0 0 24px var(--red),0 0 6px var(--red);\n    align-self:center;margin-bottom:18%;animation:pulse 1.2s ease-in-out infinite;\n  }\n  .hero-kinetic .caption{\n    margin-top:14px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;\n    font-family:var(--mono);font-size:13px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-3);\n  }\n  .hero-kinetic .caption span{display:inline-flex;align-items:center;gap:7px}\n  .hero-kinetic .caption span::before{content:\"\";display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;box-shadow:0 0 8px var(--red)}\n  .hero-kinetic .tagline{\n    margin:42px auto 0;max-width:660px;font-size:21px;line-height:1.5;color:var(--ink-2);font-weight:400;\n  }\n  .hero-kinetic .tagline b{color:var(--ink);font-weight:600}\n  .hero-kinetic .tagline .si{font-family:var(--serif);font-style:italic;color:var(--red);font-weight:400}\n  @media (max-width:760px){\n    .hero-kinetic .big{font-size:clamp(80px,22vw,140px)}\n    .hero-kinetic .big .unit{font-size:24px}\n    .hero-kinetic .big .live{width:10px;height:10px}\n    .hero-kinetic .tagline{font-size:16px}\n  }\n  h1.hero-h .em{\n    font-family:var(--serif);font-style:italic;font-weight:400;\n    background:linear-gradient(180deg,#FF6B73 0%, var(--red) 100%);\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    letter-spacing:-.02em;\n  }\n  .hero-sub{\n    margin:32px auto 0;font-size:19px;line-height:1.55;color:var(--ink-2);max-width:640px;font-weight:400;\n  }\n  .hero-sub b{color:var(--ink);font-weight:600}\n  .hero-cta{display:flex;justify-content:center;gap:14px;margin-top:40px;flex-wrap:wrap}\n  .hero-cta .btn{height:50px;padding:0 22px;font-size:14.5px;border-radius:8px}\n\n  .hero-marquee{margin-top:80px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:24px 0;background:rgba(255,255,255,.015)}\n  .marquee-inner{display:flex;justify-content:space-between;align-items:center;gap:32px;flex-wrap:wrap}\n  .marquee-inner .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-4)}\n  .marquee-logos{display:flex;gap:48px;flex-wrap:wrap;align-items:center}\n  .logo-stub{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink-3);letter-spacing:-.01em;opacity:.7;transition:opacity .2s}\n  .logo-stub:hover{opacity:1;color:var(--ink-2)}\n\n  /* ============ STATS STRIP ============ */\n  .stats-strip{padding:80px 0;border-bottom:1px solid var(--line);position:relative}\n  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  .stat{padding:36px 32px;border-right:1px solid var(--line);position:relative}\n  .stat:last-child{border-right:0}\n  .stat .v{font-size:64px;line-height:.95;letter-spacing:-.04em;font-weight:600;color:var(--ink)}\n  .stat .v sup{font-size:18px;color:var(--red);font-family:var(--mono);font-weight:500;vertical-align:super;margin-left:4px;letter-spacing:.04em}\n  .stat .v .red{color:var(--red)}\n  .stat .l{margin-top:14px;font-size:11px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase}\n  .stat .d{margin-top:10px;font-size:13.5px;color:var(--ink-2);line-height:1.5}\n\n  /* ============ SECTION RHYTHM ============ */\n  section{padding:140px 0;position:relative;border-top:1px solid var(--line)}\n  section.tight{padding:96px 0}\n  .eyebrow{\n    display:inline-flex;align-items:center;gap:12px;\n    font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);\n  }\n  .eyebrow::before{content:\"\";display:block;width:28px;height:1px;background:var(--red);opacity:.85}\n  h2.sh{\n    font-size:clamp(30px,3.4vw,48px);\n    line-height:1.05;letter-spacing:-.03em;font-weight:600;\n    margin:24px 0 0;max-width:18ch;color:var(--ink);\n  }\n  h2.sh.center{margin-left:auto;margin-right:auto;text-align:center}\n  h2.sh .em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--red);letter-spacing:-.02em}\n  .sh-sub{margin-top:22px;font-size:17px;color:var(--ink-3);max-width:680px;line-height:1.6}\n  .sh-sub.center{margin-left:auto;margin-right:auto;text-align:center}\n\n  /* ============ OUTCOMES GRID ============ */\n  .outcomes{display:grid;grid-template-columns:repeat(3,1fr);margin-top:64px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  .outcome{\n    padding:40px 32px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);\n    display:flex;flex-direction:column;gap:0;transition:background .25s ease;position:relative;\n  }\n  .outcome:nth-child(3n){border-right:0}\n  .outcome:nth-last-child(-n+3){border-bottom:0}\n  .outcome:hover{background:rgba(229,18,28,.04)}\n  .outcome:hover .ico{border-color:rgba(229,18,28,.42);background:rgba(229,18,28,.10);color:var(--red)}\n  .outcome .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}\n  .outcome .ico{\n    width:46px;height:46px;border-radius:10px;display:grid;place-items:center;\n    background:rgba(255,255,255,.04);border:1px solid var(--line-2);color:var(--ink-2);\n    transition:all .25s ease;\n  }\n  .outcome .ico svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}\n  .outcome .idx{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.14em;text-transform:uppercase}\n  .outcome h3{font-size:24px;letter-spacing:-.022em;font-weight:600;margin:0 0 14px;line-height:1.18;color:var(--ink)}\n  .outcome h3 .em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--red)}\n  .outcome p{margin:0;color:var(--ink-3);font-size:14.5px;line-height:1.65;flex:1}\n  .outcome .metric{\n    margin-top:28px;padding-top:18px;border-top:1px dashed var(--line);\n    display:flex;align-items:baseline;justify-content:space-between;gap:10px;\n  }\n  .outcome .metric .num{font-size:26px;letter-spacing:-.02em;line-height:1;color:var(--ink);font-weight:600}\n  .outcome .metric .num .acc{color:var(--red)}\n  .outcome .metric .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4);text-align:right}\n\n  /* ============ PAIN ============ */\n  .pains{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px}\n  .pain{\n    border:1px solid var(--line);border-radius:14px;padding:32px;\n    background:linear-gradient(180deg, rgba(229,18,28,.04), transparent 70%);\n    position:relative;\n  }\n  .pain q{display:block;font-family:var(--serif);font-style:italic;font-size:24px;line-height:1.3;color:var(--ink);quotes:\"“\" \"”\";letter-spacing:-.012em;font-weight:400}\n  .pain q::before{content:open-quote;color:var(--red);margin-right:2px}\n  .pain q::after{content:close-quote;color:var(--red)}\n  .pain p{margin:18px 0 0;color:var(--ink-3);font-size:14px;line-height:1.55}\n  .pain .src{margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.06em;text-transform:uppercase}\n\n  /* ============ COMPARE ============ */\n  .table-wrap{margin-top:56px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  table.cmp{width:100%;border-collapse:collapse;font-size:14px}\n  table.cmp th,table.cmp td{padding:18px 22px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}\n  table.cmp tr:last-child td{border-bottom:0}\n  table.cmp thead th{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);background:rgba(255,255,255,.025);border-bottom:1px solid var(--line-2)}\n  table.cmp thead th.us{color:var(--red)}\n  table.cmp thead th.us .star{margin-right:6px}\n  table.cmp td.criteria{color:var(--ink);font-weight:600;width:34%}\n  table.cmp td.cell{color:var(--ink-3)}\n  table.cmp td.us{background:linear-gradient(180deg,rgba(229,18,28,.10),rgba(229,18,28,.03));color:var(--ink);border-left:1px solid rgba(229,18,28,.30);border-right:1px solid rgba(229,18,28,.30)}\n  table.cmp tbody tr:last-child td.us{border-bottom:1px solid rgba(229,18,28,.30)}\n  .v-yes{color:var(--good);font-weight:500}\n  .v-warn{color:var(--warm);font-weight:500}\n  .v-no{color:#FF6B6B;font-weight:500}\n  .v-yes::before{content:\"●  \";font-size:10px}\n  .v-warn::before{content:\"◐  \";font-size:10px}\n  .v-no::before{content:\"○  \";font-size:10px}\n\n  /* ============ METRICS ============ */\n  .metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:64px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  .metric{padding:40px 28px 32px;border-right:1px solid var(--line);position:relative}\n  .metric:last-child{border-right:0}\n  .metric .big{font-size:80px;letter-spacing:-.04em;line-height:.9;font-weight:600;color:var(--ink)}\n  .metric .big .red{color:var(--red)}\n  .metric .big .u{font-size:36px;color:var(--ink-3);font-weight:500;letter-spacing:-.01em}\n  .metric .lbl{margin-top:20px;font-size:14px;color:var(--ink);font-weight:600}\n  .metric .desc{margin-top:6px;font-size:13px;color:var(--ink-3);line-height:1.5}\n\n  /* ============ LATENCY BARS ============ */\n  .lat-wrap{margin-top:48px;border:1px solid var(--line);border-radius:14px;padding:36px;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  .lat-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:36px}\n  .lat-head h3{margin:0;font-size:24px;letter-spacing:-.02em;font-weight:600}\n  .lat-head p{margin:6px 0 0;color:var(--ink-3);font-size:13.5px}\n  .lat-axis{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.04em}\n  .bars{display:flex;flex-direction:column;gap:14px}\n  .bar-row{display:grid;grid-template-columns:140px 1fr 110px;align-items:center;gap:18px}\n  .bar-label{font-size:14px;color:var(--ink-2);font-family:var(--mono);letter-spacing:.02em}\n  .bar-track{height:36px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--line)}\n  .bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:14px;font-family:var(--mono);font-size:12px;color:#FFFFFF;font-weight:600;transition:width 1.4s cubic-bezier(.2,.8,.2,1);width:0}\n  .bar-fill.cas{background:linear-gradient(90deg,#5A2229,#8B2D38)}\n  .bar-fill.lsm{background:linear-gradient(90deg,#5C4D2A,#8C7A4E)}\n  .bar-fill.ddb{background:linear-gradient(90deg,#3A4660,#5A6B86)}\n  .bar-fill.us-miss{background:linear-gradient(90deg,#B30E16,#E5121C)}\n  .bar-fill.us-hit{background:linear-gradient(90deg,#E5121C,#FF3340);box-shadow:0 0 24px rgba(229,18,28,.45)}\n  .bar-note{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);text-align:right}\n  .lat-foot{margin-top:30px;padding-top:22px;border-top:1px solid var(--line);font-size:14px;color:var(--ink-2);line-height:1.6}\n  .lat-foot b{color:var(--ink);font-weight:600}\n  .lat-foot code{font-family:var(--mono);background:rgba(229,18,28,.10);color:var(--red);padding:2px 6px;border-radius:4px;font-size:12.5px}\n\n  /* ============ DUEL ============ */\n  .duel{display:grid;grid-template-columns:1fr auto 1fr;gap:24px;align-items:stretch;margin-top:48px}\n  .duel-card{\n    border:1px solid var(--line);border-radius:14px;padding:32px;\n    background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);position:relative;overflow:hidden;\n  }\n  .duel-card.us{\n    background:linear-gradient(180deg,rgba(229,18,28,.10),rgba(229,18,28,.02));\n    border-color:rgba(229,18,28,.34);\n    box-shadow:0 0 0 1px rgba(229,18,28,.08), 0 30px 80px -40px rgba(229,18,28,.36);\n  }\n  .duel-card h4{margin:0;font-size:18px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap  .how-foot .lat{font-size:52px;letter-spacing:-.03em;color:var(--red);line-height:1;font-weight:600}\n  .how-foot .lat-l{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-top:6px}\n  .how-foot .desc{max-width:560px;color:var(--ink-2);font-size:14px;line-height:1.65}\n  .how-foot .desc b{color:var(--ink);font-weight:600}\n  .how-foot .desc code{font-family:var(--mono);background:rgba(229,18,28,.10);color:var(--red);padding:2px 6px;border-radius:4px;font-size:12.5px}\n\n  /* ============ DEPLOY ============ */\n  .deploy{display:grid;grid-template-columns:1.1fr .9fr;gap:32px;align-items:stretch;margin-top:48px}\n  .clouds{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}\n  .cloud{border:1px solid var(--line);border-radius:12px;padding:22px;background:rgba(255,255,255,.02);display:flex;flex-direction:column;gap:10px;min-height:130px;transition:border-color .2s}\n  .cloud:hover{border-color:var(--line-2)}\n  .cloud .name{font-size:15.5px;font-weight:600;letter-spacing:-.01em}\n  .cloud .nodes{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);line-height:1.5}\n  .cloud .badge{align-self:flex-start;font-family:var(--mono);font-size:10px;color:var(--red);background:rgba(229,18,28,.10);padding:3px 9px;border-radius:4px;letter-spacing:.08em;border:1px solid rgba(229,18,28,.20);font-weight:600}\n  .terminal{border:1px solid var(--line-2);border-radius:12px;background:#0A0A12;box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 18px 40px -18px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}\n  .term-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line)}\n  .term-head .lights{display:flex;gap:6px}\n  .term-head .lights i{display:block;width:10px;height:10px;border-radius:50%}\n  .term-head .lights i:nth-child(1){background:#FF5F56}\n  .term-head .lights i:nth-child(2){background:#FFBD2E}\n  .term-head .lights i:nth-c -family:var(--serif);font-style:italic;font-weight:400;color:var(--red)}\n  .cta .arrow-stat{display:inline-flex;align-items:center;gap:14px;margin:24px auto 0;font-family:var(--mono);font-size:13px;color:var(--ink-3);letter-spacing:.04em}\n  .cta .arrow-stat b{color:var(--ink);font-family:var(--sans);font-weight:600;font-size:14px}\n  .cta-cta{margin-top:38px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap}\n  .cta-cta .btn{height:52px;padding:0 24px;font-size:15px;border-radius:8px}\n  .cta-foot{margin-top:24px;font-family:var(--mono);font-size:12px;color:var(--ink-4);letter-spacing:.04em}\n  .cta-foot .sep{margin:0 10px}\n\n  /* ============ FOOTER ============ */\n  footer{border-top:1px solid var(--line);padding:56px 0 36px;background:#0A0A12}\n  .ft{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:48px;align-items:start}\n  .ft .brand-block{max-width:320px}\n  .ft .brand-block p{margin:14px 0 0;color:var(--ink-3);font-size:13px;line-height:1.6}\n  .ft h5{margin:0 0 14px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-4)}\n  .ft ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}\n  .ft ul a{font-size:13.5px;color:var(--ink-2);transition:color .15s}\n  .ft ul a:hover{color:var(--red)}\n  .ft-bar{margin-top:48px;padding-top:24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--ink-4);letter-spacing:.04em}\n\n  /* ============ TRUST STRIP ============ */\n  .trust-strip{padding:48px 0;border-top:1px solid var(--line);background:rgba(255,255,255,.015)}\n  .trust-inner{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:36px}\n  .trust-l{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);max-width:280px;line-height:1.5}\n  .trust-badges{display:flex;flex-wrap:wrap;gap:14px;align-items:center}\n  .trust-badge{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:10px 16px;border:1px solid var(--line);border-radius:8px;\n    background:rgba(255,255,255,.025);\n    font-family:var(--mono);font-size:12px;color:var(--ink-2);letter-spacing:.04em;font-weight:500;\n  }\n  .trust-badge svg{width:18px;height:18px;color:var(--red)}\n  .trust-badge b{color:var(--ink);font-weight:600;letter-spacing:.02em}\n\n  /* ============ TESTIMONIALS ============ */\n  .testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px}\n  .tcard{\n    border:1px solid var(--line);border-radius:14px;padding:32px;\n    background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);\n    display:flex;flex-direction:column;\n  }\n  .tcard .quote{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.4;color:var(--ink);quotes:\"“\" \"”\";letter-spacing:-.01em}\n  .tcard .quote::before{content:open-quote;color:var(--red);margin-right:2px}\n  .tcard .quote::after{content:close-quote;color:var(--red)}\n  .tcard .quote b{color:var(--red);font-style:normal;font-family:var(--sans);font-weight:600;background:rgba(229,18,28,.10);padding:1px 6px;border-radius:4px}\n  .tcard .person{margin-top:24px;display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--line)}\n  .tcard .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1B1B26,#0A0A12);border:1px solid var(--line-2);display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--red)}\n  .tcard .person .nm{font-size:14px;font-weight:600;color:var(--ink);line-height:1.2}\n  .tcard .person .role{margin-top:2px;font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em}\n\n  /* ============ PRICING ============ */\n  .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px;align-items:stretch}\n  .price{\n    border:1px solid var(--line);border-radius:14px;padding:36px 32px;\n    background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);\n    display:flex;flex-direction:column;position:relative;\n  }\n  .price.featured{\n    border-color:rgba(229,18,28,.42);\n    background:linear-gradient(180deg,rgba(229,18,28,.12),rgba(229,18,28,.02));\n    box-shadow:0 0 0 1px rgba(229,18,28,.10), 0 30px 60px -30px rgba(229,18,28,.30);\n  }\n  .price .ribbon{position:absolute;top:-12px;right:24px;background:var(--red);color:#fff;padding:5px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;font-weight:600}\n  .price .tier{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}\n  .price.featured .tier{color:var(--red)}\n  .price h3{margin:14px 0 6px;font-size:24px;font-weight:600;letter-spacing:-.015em;color:var(--ink)}\n  .price .for{font-size:14px;color:var(--ink-3);line-height:1.5;min-height:42px}\n  .price .amt{margin-top:24px;display:flex;align-items:baseline;gap:6px}\n  .price .amt .v{font-size:56px;font-weight:600;letter-spacing:-.035em;line-height:1;color:var(--ink)}\n  .price .amt .u{font-family:var(--mono);font-size:13px;color:var(--ink-3);letter-spacing:.04em}\n  .price.featured .amt .v{color:var(--red)}\n  .price ul{list-style:none;padding:0;margin:28px 0 0;display:flex;flex-direction:column;gap:12px;border-top:1px solid var(--line);padding-top:24px}\n  .price li{font-size:14px;color:var(--ink-2);line-height:1.55;display:grid;grid-template-columns:18px 1fr;gap:10px;align-items:start}\n  .price li::before{content:\"\";width:14px;height:14px;border-radius:50%;background:rgba(229,18,28,.14);border:1px solid rgba(229,18,28,.32);display:inline-block;margin-top:3px;background-image:radial-gradient(circle at 50% 55%, var(--red) 0 2px, transparent 3px)}\n  .price .pcta{margin-top:28px;padding-top:0}\n  .price .pcta .btn{width:100%;justify-content:center;height:46px}\n  .price .fine{margin-top:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-4);text-align:center;text-transform:uppercase}\n\n  /* ============ FAQ ============ */\n  .faq{margin-top:56px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}\n  .faq details{border-bottom:1px solid var(--line)}\n  .faq details:last-child{border-bottom:0}\n  .faq summary{\n    list-style:none;padding:22px 28px;display:flex;justify-content:space-between;align-items:center;gap:24px;\n    cursor:pointer;font-size:16.5px;font-weight:500;color:var(--ink);transition:background .15s;\n  }\n  .faq summary::-webkit-details-marker{display:none}\n  .faq summary::after{content:\"+\";font-family:var(--mono);font-size:22px;color:var(--red);font-weight:300;transition:transform .25s}\n  .faq details[open] summary::after{transform:rotate(45deg)}\n  .faq summary:hover{background:rgba(255,255,255,.02)}\n  .faq .answer{padding:0 28px 26px;color:var(--ink-3);font-size:14.5px;line-height:1.7;max-width:880px}\n  .faq .answer code{font-family:var(--mono);background:rgba(229,18,28,.10);color:var(--red);padding:2px 6px;border-radius:4px;font-size:12.5px}\n\n  /* ============ RESOURCES ============ */\n  .resources{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px}\n  .res{\n    border:1px solid var(--line);border-radius:14px;padding:28px;\n    background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);\n    display:flex;flex-direction:column;gap:16px;transition:border-color .2s, transform .2s;cursor:pointer;\n  }\n  .res:hover{border-color:var(--line-2);transform:translateY(-2px)}\n  .res .kind{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}\n  .res h4{margin:0;font-size:19px;font-weight:600;letter-spacing:-.015em;line-height:1.3;color:var(--ink)}\n  .res p{margin:0;color:var(--ink-3);font-size:13.5px;line-height:1.55;flex:1}\n  .res .meta{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.06em;display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:14px}\n\n  /* ============ NEWSLETTER ============ */\n  .news{margin-top:48px;border:1px solid var(--line);border-radius:14px;padding:48px;background:linear-gradient(135deg,rgba(229,18,28,.08),rgba(255,255,255,.02));display:grid;grid-template-columns:1.2fr 1fr;gap:32px;align-items:center}\n  .news h3{margin:0;font-size:28px;font-weight:600;letter-spacing:-.022em;line-height:1.2}\n  .news h3 .em{font-family:var(--serif);font-style:italic;color:var(--red);font-weight:400}\n  .news p{margin:12px 0 0;color:var(--ink-3);font-size:14px;line-height:1.6}\n  .news-form{display:flex;gap:8px}\n  .news-form input{\n    flex:1;height:48px;padding:0 16px;background:rgba(0,0,0,.4);\n    border:1px solid var(--line-2);border-radius:8px;color:var(--ink);\n    font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;\n  }\n  .news-form input:focus{border-color:var(--red)}\n  .news-form input::placeholder{color:var(--ink-4)}\n  .news-form button{height:48px;padding:0 22px;font-family:var(--sans);font-size:14px;font-weight:600;background:var(--red);color:#fff;border:0;border-radius:8px;cursor:pointer;transition:background .2s}\n  .news-form button:hover{background:var(--red-2)}\n\n  .news-mail{\n    display:flex;align-items:center;gap:18px;padding:18px 22px;\n    border:1px solid var(--line-2);border-radius:10px;background:rgba(0,0,0,.32);\n    transition:all .25s ease;color:var(--ink);text-decoration:none;\n  }\n  .news-mail:hover{border-color:var(--red);background:rgba(229,18,28,.06);transform:translateY(-2px)}\n  .news-mail-l{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);white-space:nowrap}\n  .news-mail-v{flex:1;font-family:var(--mono);font-size:15px;color:var(--ink);letter-spacing:-.005em;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n  .news-mail-a{font-size:18px;color:var(--red);transition:transform .25s ease}\n  .news-mail:hover .news-mail-a{transform:translate(3px,-3px)}\n  @media (max-width:640px){\n    .news-mail{flex-direction:column;align-items:flex-start;gap:8px;padding:18px}\n    .news-mail-v{font-size:13px;width:100%}\n  }\n\n  /* ============ Subtle reveal animation ============ */\n  .reveal{opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1)}\n  .reveal.in{opacity:1;transform:none}\n  .reveal-stagger > *{opacity:0;transform:translateY(14px);transition:opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1)}\n  .reveal-stagger.in > *{opacity:1;transform:none}\n  .reveal-stagger.in > *:nth-child(1){transition-delay:0s}\n  .reveal-stagger.in > *:nth-child(2){transition-delay:.08s}\n  .reveal-stagger.in > *:nth-child(3){transition-delay:.16s}\n  .reveal-stagger.in > *:nth-child(4){transition-delay:.24s}\n  .reveal-stagger.in > *:nth-child(5){transition-delay:.32s}\n  .reveal-stagger.in > *:nth-child(6){transition-delay:.40s}\n  @media (prefers-reduced-motion: reduce){\n    .reveal, .reveal-stagger > *{opacity:1!important;transform:none!important;transition:none!important}\n  }\n\n  /* ============ Nav link underline ============ */\n  .nav-links a{position:relative}\n  .nav-links a::after{\n    content:\"\";position:absolute;left:0;right:100%;bottom:-4px;height:1px;\n    background:var(--red);transition:right .25s ease;\n  }\n  .nav-links a:hover::after{right:0}\n\n  /* ============ Button glow + arrow ============ */\n  .btn.primary{position:relative;overflow:hidden}\n  .btn.primary::after{\n    content:\"\";position:absolute;inset:0;\n    background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.22) 50%, transparent 70%);\n    transform:translateX(-120%);transition:transform .6s ease;\n  }\n  .btn.primary:hover::after{transform:translateX(120%)}\n\n  /* ============ Outcome icon hover spin ============ */\n  .outcome .ico{will-change:transform}\n  .outcome:hover .ico{transform:rotate(-6deg) scale(1.05)}\n\n  /* ============ Pricing featured float ============ */\n  .price.featured{transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease}\n  .price.featured:hover{transform:translateY(-4px);box-shadow:0 0 0 1px rgba(229,18,28,.16), 0 40px 80px -30px rgba(229,18,28,.38)}\n\n  /* ============ Stat counter shimmer ============ */\n  .stat .v{position:relative;overflow:hidden}\n  .stats-grid.in .stat .v{animation:vNum .9s cubic-bezier(.2,.8,.2,1) both}\n  .stats-grid.in .stat:nth-child(1) .v{animation-delay:0s}\n  .stats-grid.in .stat:nth-child(2) .v{animation-delay:.08s}\n  .stats-grid.in .stat:nth-child(3) .v{animation-delay:.16s}\n  .stats-grid.in .stat:nth-child(4) .v{animation-delay:.24s}\n  @keyframes vNum{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n\n  /* ============ Hero kinetic intro ============ */\n  .hero-kinetic .old{opacity:0;transform:translateY(-6px);animation:heroFade .7s .15s cubic-bezier(.2,.8,.2,1) both}\n  .hero-kinetic .big{opacity:0;transform:translateY(10px) scale(.96);animation:heroFade .9s .35s cubic-bezier(.2,.8,.2,1) both}\n  .hero-kinetic .caption{opacity:0;animation:heroFade .7s .65s ease both}\n  .hero-kinetic .tagline{opacity:0;transform:translateY(8px);animation:heroFade .8s .85s ease both}\n  @keyframes heroFade{to{opacity:1;transform:none}}\n\n  /* ============ DEEP TECH (editorial article style) ============ */\n  .deep{display:flex;flex-direction:column;gap:48px;margin-top:72px;max-width:1080px;margin-left:auto;margin-right:auto}\n  .article{\n    position:relative;display:grid;grid-template-columns:140px 1fr;gap:48px;align-items:start;\n    padding:48px 0;border-top:1px solid var(--line-2);\n  }\n  .article:last-child{border-bottom:1px solid var(--line-2)}\n  .article-num{\n    font-family:var(--serif);font-style:italic;font-size:96px;line-height:.9;\n    color:transparent;-webkit-text-stroke:1px var(--red);text-stroke:1px var(--red);\n    letter-spacing:-.04em;font-weight:400;\n    position:sticky;top:96px;\n  }\n  .article-body{max-width:680px}\n  .article-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:14px}\n  .article-kicker::after{content:\"\";flex:1;height:1px;background:var(--line);max-width:80px}\n  .article-h{margin:18px 0 0;font-size:clamp(22px,2.4vw,32px);font-weight:500;letter-spacing:-.025em;line-height:1.15;color:var(--ink)}\n  .article-h .em{font-family:var(--serif);font-style:italic;color:var(--red);font-weight:400}\n  .article-lede{margin:22px 0 0;font-family:var(--serif);font-size:18px;line-height:1.55;color:var(--ink-2);font-weight:400;font-style:normal;border-left:2px solid var(--red);padding:4px 0 4px 18px}\n  .article-body p{margin:22px 0 0;color:var(--ink-2);font-size:15.5px;line-height:1.72;font-weight:300}\n  .article-body p b{color:var(--ink);font-weight:600}\n  .article-body p code, .article-body li code{font-family:var(--mono);background:rgba(229,18,28,.10);color:var(--red);padding:2px 7px;border-radius:4px;font-size:13px;letter-spacing:-.005em}\n  .article-body a.inline{color:var(--ink);border-bottom:1px solid var(--red);transition:color .15s,background .15s;padding:1px 3px;border-radius:2px}\n  .article-body a.inline:hover{color:var(--red);background:rgba(229,18,28,.08)}\n  .article-pull{\n    margin:32px 0;padding:24px 28px;\n    border:1px solid var(--line);border-radius:10px;\n    background:linear-gradient(180deg,rgba(229,18,28,.04),transparent);\n    display:grid;grid-template-columns:repeat(3,1fr);gap:0;\n  }\n  .article-pull .pull{padding:0 18px;border-right:1px solid var(--line)}\n  .article-pull .pull:first-child{padding-left:0}\n  .article-pull .pull:last-child{border-right:0}\n  .article-pull .pl{font-family:var(--mono);font-size:10.5px;letter-spacing:.14 ext-transform:uppercase;color:var(--ink-4)}\n    table.cmp td.us{background:linear-gradient(180deg,rgba(229,18,28,.10),rgba(229,18,28,.04));border-left:0!important;border-right:0!important}\n    table.cmp td.us::before{color:var(--red)}\n    .duel-card{padding:24px}\n    .duel-row .v{font-size:34px}\n    .path-demo{grid-template-columns:1fr}\n    .path-shapes{display:none}\n    .path-tabs{flex-direction:row}\n    .ptab{padding:12px 16px;font-size:10.5px}\n    .path-content{padding:24px 20px 0}\n    .path-ctx{display:none}\n    .path-h{font-size:19px}\n    .how-tabs{flex-direction:column}\n    .how-tab{border-right:0;border-bottom:1px solid var(--line);padding:14px 18px}\n    .how-tab:last-child{border-bottom:0}\n    .how-body{padding:28px 18px}\n    .flow{flex-direction:column}\n    .arrow-h{transform:rotate(90deg)}\n    .node{width:100%;min-width:0}\n    .term-body{padding:16px 14px;font-size:11.5px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<!-- ============ NAV ============ -->\n<nav class=\"top\">\n  <div class=\"wrap nav-inner\">\n    <a class=\"brand\" href=\"#\">\n      <span class=\"mark\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2L3 14h7l-1 8 11-13h-7l0-7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <b>Veltrix<i>DB<\u002Fi><\u002Fb>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#why\">Platform<\u002Fa>\n      <a href=\"#performance\">Benchmark<\u002Fa>\n      <a href=\"#compare\">Compare<\u002Fa>\n      <a href=\"#pricing\">Pricing<\u002Fa>\n      <a href=\"#calc\">Cost<\u002Fa>\n      <a href=\"#whitepaper\">Whitepaper<\u002Fa>\n      <a href=\"#how\">Architecture<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-cta\">\n      <a class=\"phone\" href=\"tel:+919817463648\">+91 98174 63648<\u002Fa>\n      <a class=\"btn primary\" href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Demo\">Book a demo <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============ HERO ============ -->\n<header class=\"hero\">\n  <div id=\"hero3d\"><\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-inner\">\n      <span class=\"pill\"><span class=\"tag\">BENCHMARKED<\u002Fspan><span>1B&nbsp;keys · 70/30 read/write · NVMe · May&nbsp;2026<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fspan>\n      <div class=\"hero-kinetic\">\n        <div class=\"old\">\n          <span>The legacy floor<\u002Fspan>\n          <span class=\"legacy\">33ms&nbsp;P99<\u002Fspan>\n          <span class=\"arrow\">————▶<\u002Fspan>\n          <span>The new floor<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"big\" aria-label=\"4.9 milliseconds\">\n          <span class=\"num\">4.9<\u002Fspan><span class=\"unit\">ms<\u002Fspan><span class=\"live\"><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"caption\">\n          <span>P99 read latency<\u002Fspan>\n          <span>1 billion keys<\u002Fspan>\n          <span>Commodity NVMe<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"tagline\"><b>VeltrixDB is the extreme point-lookup engine<\u002Fb> for teams whose Redis bill grew faster than their revenue — a persistent, NVMe-backed alternative built for <span class=\"si\">microsecond reads at billions of keys<\u002Fspan>. Closed source. Bare-metal honest.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"hero-cta\" style=\"margin-top:40px\">\n        <a class=\"btn primary\" href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Demo\">Book a demo <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n        <a class=\"btn\" href=\"#performance\">Read the benchmark<\u002Fa>\n        <a class=\"btn ghost\" href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Schedule%20Call&amp;body=Hi%20—%20can%20we%20pick%20a%20time%20this%20week%3F\" style=\"color:var(--ink-3);font-weight:500;text-decoration:underline;text-underline-offset:4px;border:0;padding:0\">or schedule directly<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap hero-marquee\" style=\"display:none\"><\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ TRUST STRIP (removed) ============ -->\n\n<!-- ============ STATS STRIP ============ -->\n<section class=\"stats-strip\" style=\"border-top:none\">\n  <div class=\"wrap\">\n    <div class=\"stats-grid\">\n      <div class=\"stat\">\n        <div class=\"v\">&lt;5<sup>ms<\u002Fsup><\u002Fdiv>\n        <div class=\"l\">P99 Latency<\u002Fdiv>\n        <div class=\"d\">Sustained at 1B keys, mixed read/write load.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"v\"><span class=\"red\">2M<\u002Fspan><sup>+<\u002Fsup><\u002Fdiv>\n        <div class=\"l\">Requests / sec<\u002Fdiv>\n        <div class=\"d\">Per node, with linear horizontal scale.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"v\">1B<sup>+<\u002Fsup><\u002Fdiv>\n        <div class=\"l\">Keys / cluster<\u002Fdiv>\n        <div class=\"d\">3-node cluster. 256 GB cache · 3 TB NVMe.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"v\">3–5<sup>×<\u002Fsup><\u002Fdiv>\n        <div class=\"l\">Cost reduction<\u002Fdiv>\n        <div class=\"d\">Versus DynamoDB at equivalent scale.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ OUTCOMES ============ -->\n<section id=\"why\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Why VeltrixDB<\u002Fspan>\n    <h2 class=\"sh\">What actually changes <span class=\"em\">when you switch<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Not a feature checklist. The real outcomes your engineers, finance team, and users feel — within weeks of deployment.<\u002Fp>\n\n    <div class=\"outcomes\">\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 17l5-5 4 4 8-9\"><\u002Fpath><path d=\"M14 7h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">01 — Latency<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Latency that <span class=\"em\">never surprises<\u002Fspan> you.<\u002Fh3>\n        <p>Sub-5ms reads at any scale, under any write load. No degradation during flash sales. No spikes when background cleanup runs. Consistent — always.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\"><span class=\"acc\">&lt;5<\u002Fspan>ms<\u002Fspan><span class=\"lbl\">P99 — guaranteed<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9 9.5C9 8 10.3 7 12 7s3 1 3 2.5-1.3 2-3 2.5-3 1-3 2.5S10.3 17 12 17s3-1 3-2.5\"><\u002Fpath><path d=\"M12 5v2M12 17v2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">02 — Cost<\u002Fspan>\n        <\u002Fdiv>\n        <h3>A bill you can <span class=\"em\">actually predict<\u002Fspan>.<\u002Fh3>\n        <p>Pay for fixed infrastructure, not per million operations. Your bill doesn't spike when a campaign goes viral or a cron job runs a full-table scan.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\"><span class=\"acc\">3–5×<\u002Fspan><\u002Fspan><span class=\"lbl\">Lower vs DynamoDB<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M7 18a5 5 0 010-10 6 6 0 0111.7 1.5A4 4 0 0118 18H7z\"><\u002Fpath><path d=\"M9 14h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">03 — Portability<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Any cloud. <span class=\"em\">Zero lock-in<\u002Fspan>.<\u002Fh3>\n        <p>One Helm chart runs identically on GKE, EKS, AKS, or bare metal. Switch providers without rewriting your data layer or renegotiating vendor contracts.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\">4 platforms<\u002Fspan><span class=\"lbl\">GKE · EKS · AKS · Bare<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 3l8 4v6c0 5-3.5 7.5-8 8-4.5-.5-8-3-8-8V7l8-4z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">04 — Compaction<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Background work, <span class=\"em\">invisible to users<\u002Fspan>.<\u002Fh3>\n        <p>Compaction and GC run on a completely separate I/O path. Your users never feel it. No more 3 AM pages because cleanup chose the wrong moment.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\"><span class=\"acc\">0<\u002Fspan> interference<\u002Fspan><span class=\"lbl\">Separate I/O path<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 12h4l2-7 4 14 2-7h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">05 — Observability<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Observability from <span class=\"em\">day one<\u002Fspan>.<\u002Fh3>\n        <p>50+ Prometheus metrics, pre-wired Grafana dashboards, and alert rules ship in the Helm chart. No custom instrumentation. No dark weeks.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\"><span class=\"acc\">50+<\u002Fspan> metrics<\u002Fspan><span class=\"lbl\">ServiceMonitor · Alerts<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><path d=\"M3 18h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">06 — Time to prod<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Zero to production <span class=\"em\">in minutes<\u002Fspan>.<\u002Fh3>\n        <p>One Helm command deploys storage, replication, auto-scaling, and monitoring. No weeks of tuning. No specialist hire. Day-one productive.<\u002Fp>\n        <div class=\"metric\"><span class=\"num\"><span class=\"acc\">94<\u002Fspan>s<\u002Fspan><span class=\"lbl\">helm install → ready<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PAIN ============ -->\n<section class=\"tight\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Sound familiar<\u002Fspan>\n    <h2 class=\"sh\">Every fast-growing team <span class=\"em\">hits the same wall<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Your database was fine at 1M users. Somewhere between 10M and 100M, things got expensive. Then slow. Then both.<\u002Fp>\n    <div class=\"pains\">\n      <div class=\"pain\">\n        <q>Our database bill tripled and we didn't ship a single feature.<\u002Fq>\n        <p>More data means more reads. More reads mean bigger Redis clusters or paying DynamoDB per million ops. The bill grows faster than revenue.<\u002Fp>\n        <div class=\"src\">— VP Engineering, Series C<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <q>Latency is fine at 9 AM, then spikes to 500ms at noon.<\u002Fq>\n        <p>Traditional databases run internal cleanup jobs that fight your user requests for disk access. Peak traffic + compaction = your worst nightmare.<\u002Fp>\n        <div class=\"src\">— Staff SRE, fintech<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <q>We're burning through SSDs every few months.<\u002Fq>\n        <p>Databases without key-value separation rewrite your data over and over. Every unnecessary rewrite is wear on expensive NVMe — a tax on your latency.<\u002Fp>\n        <div class=\"src\">— Platform Lead, ad-tech<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMPARE ============ -->\n<section id=\"compare\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Compared<\u002Fspan>\n    <h2 class=\"sh\">Why <span class=\"em\">replace<\u002Fspan> what you're running today.<\u002Fh2>\n    <p class=\"sh-sub\">A feature-by-feature look at how VeltrixDB stacks up against the databases teams typically outgrow.<\u002Fp>\n    <div class=\"table-wrap\">\n      <table class=\"cmp\">\n        <thead>\n          <tr>\n            <th>Capability<\u002Fth>\n            <th>Redis<\u002Fth>\n            <th>DynamoDB<\u002Fth>\n            <th>Cassandra<\u002Fth>\n            <th class=\"us\"><span class=\"star\">★<\u002Fspan>VeltrixDB<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td class=\"criteria\">Sub-5ms P99 at 1B keys<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">In-memory only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">~12ms typical<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">~80ms typical<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">4.9ms · NVMe-backed<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Predictable infra cost<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">RAM-bound<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">Pay per million ops<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-warn\">Ops overhead<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Fixed infrastructure<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Compaction-free reads<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-yes\">No compaction<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">Hidden, but spikes<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">Major spikes<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Separate I/O path<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Cloud portability<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">Self-managed work<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">AWS-only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-yes\">Yes<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Helm · any cloud<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Observability included<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">Roll your own<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-warn\">CloudWatch only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-warn\">Roll your own<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">50+ metrics + Grafana<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Time to production<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">Days<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-yes\">Minutes<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">Weeks<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">94 seconds<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ METRICS ============ -->\n<section id=\"performance\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">By the numbers<\u002Fspan>\n    <h2 class=\"sh\">Results that <span class=\"em\">speak for themselves<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Benchmarked on real cloud hardware — GCP N2 nodes with 8 NVMe SSDs, 64 cores, 480 GB RAM.<\u002Fp>\n    <div class=\"metric-row\">\n      <div class=\"metric\">\n        <div class=\"big\"><span class=\"red\">85<\u002Fspan><span class=\"u\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Reduction in read latency<\u002Fdiv>\n        <div class=\"desc\">From 33ms down to 4.9ms P99<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">10<span class=\"u\">×<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Less unnecessary rewriting<\u002Fdiv>\n        <div class=\"desc\">Compaction only touches keys, never values<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">3–5<span class=\"u\">×<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Lower infrastructure cost<\u002Fdiv>\n        <div class=\"desc\">vs DynamoDB at equivalent scale<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">1B<span class=\"u\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Keys on a 3-node cluster<\u002Fdiv>\n        <div class=\"desc\">256 GB cache · 3 TB NVMe per node<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lat-wrap\">\n      <div class=\"lat-head\">\n        <div>\n          <h3>P99 read latency at 1 billion keys — head to head<\u002Fh3>\n          <p>Lower is better. Sustained mixed read/write load. Equivalent hardware.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"lat-axis\">— ms (P99) →<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bars\" id=\"bars\">\n        <div class=\"bar-row\"><div class=\"bar-label\">Cassandra<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill cas\" data-w=\"100\">~80ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~80ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">LSM-tree DB<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill lsm\" data-w=\"42\">~33ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~33ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">DynamoDB<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill ddb\" data-w=\"16\">~12ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~12ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">VeltrixDB · miss<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill us-miss\" data-w=\"7\">4.9ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">4.9ms · cache miss<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">VeltrixDB · hit<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill us-hit\" data-w=\"2.5\">0.3ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">0.3ms · cache hit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lat-foot\">VeltrixDB achieves <b>&lt;5ms P99 even on cache misses<\u002Fb> because values are read directly from NVMe via zero-copy <code>io_uring<\u002Fcode> — no compaction, no page-cache eviction, no surprises.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DUEL (removed) ============ -->\n\n<!-- ============ USE CASES ============ -->\n<section id=\"usecases\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Where it fits<\u002Fspan>\n    <h2 class=\"sh\">Built for teams where <span class=\"em\">microseconds move money<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">We don't pretend to be a general-purpose database. VeltrixDB is a hyper-specialized point-lookup engine — if you're running one of these workloads at extreme scale, this was built for you.<\u002Fp>\n    <div class=\"cases\">\n      <div class=\"case\">\n        <div class=\"cap\">01 — AdTech &amp; Real-Time Bidding<\u002Fdiv>\n        <h3>User profile lookups <span class=\"em\">inside the 50ms RTB budget<\u002Fspan>.<\u002Fh3>\n        <p>Fetch the user profile, score the bid, write the impression — millions of times per second. Point lookups are the entire workload. Range queries aren't needed. Your RAM budget and bare-metal NVMe match the architecture perfectly.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">User profiles<\u002Fspan><span class=\"chip\">Bid scoring<\u002Fspan><span class=\"chip\">Impression writes<\u002Fspan><span class=\"chip\">DSP / SSP<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">02 — HFT &amp; Crypto Exchanges<\u002Fdiv>\n        <h3>Lock-free architecture, <span class=\"em\">microsecond determinism<\u002Fspan>.<\u002Fh3>\n        <p>Order books, position state, and risk checks where every microsecond is a P&amp;L line item. Lock-free shards, dedicated I/O queues, and zero-syscall reads — the architecture was built for trading desks who never accept jitter.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Order books<\u002Fspan><span class=\"chip\">Positions<\u002Fspan><span class=\"chip\">Risk state<\u002Fspan><span class=\"chip\">Tick storage<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">03 — Persistent caches &amp; session stores<\u002Fdiv>\n        <h3>Redis-class speed, <span class=\"em\">without RAM-class bills<\u002Fspan>.<\u002Fh3>\n        <p>When your dataset has outgrown the budget of \"keep everything in RAM,\" but you still need sub-millisecond access. DRAM index over NVMe values gives you 5–10× the working set on the same hardware spend — persistent, durable, no rehydration after restart.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Session stores<\u002Fspan><span class=\"chip\">Hot caches<\u002Fspan><span class=\"chip\">CDN edge<\u002Fspan><span class=\"chip\">Feature lookups<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">04 — Fraud detection &amp; rate limiting<\u002Fdiv>\n        <h3>Continuous writes, <span class=\"em\">instantaneous lookups<\u002Fspan>.<\u002Fh3>\n        <p>Stream transactions in, score them against history, decide in single-digit milliseconds. Write amplification of 1.0× means your NVMe survives the write rate; point-lookup speed means your risk engine never has to fall back to \"approve and reconcile.\"<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Fraud scoring<\u002Fspan><span class=\"chip\">Rate limits<\u002Fspan><span class=\"chip\">Velocity checks<\u002Fspan><span class=\"chip\">User history<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TESTIMONIALS (removed) ============ -->\n\n<!-- ============ PRICING ============ -->\n<section id=\"pricing\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Pricing<\u002Fspan>\n    <h2 class=\"sh\">Predictable pricing, <span class=\"em\">no surprise bills<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Fixed per-cluster pricing. No charge per million ops. No egress surprises. Scale your data, not your invoice.<\u002Fp>\n    <div class=\"pricing\">\n      <div class=\"price\">\n        <span class=\"tier\">Starter<\u002Fspan>\n        <h3>For early-stage teams<\u002Fh3>\n        <p class=\"for\">Validate sub-5ms reads on your workload before committing.<\u002Fp>\n        <div class=\"amt\"><span class=\"v\">$499<\u002Fspan><span class=\"u\">/ month<\u002Fspan><\u002Fdiv>\n        <ul>\n          <li>3-node cluster, single region<\u002Fli>\n          <li>Up to 100M keys<\u002Fli>\n          <li>64 GB cache · 1 TB NVMe per node<\u002Fli>\n          <li>Community support · 8×5 response<\u002Fli>\n          <li>50+ Prometheus metrics<\u002Fli>\n        <\u002Ful>\n        <div class=\"pcta\">\n          <a class=\"btn\" href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Starter\">Start free
