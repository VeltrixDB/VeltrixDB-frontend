         <div class=\"breakdown\" id=\"ddbBreakdown\">$1.00 / M blended ops · 10B ops → $10,000<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"calc-card us\">\n            <div class=\"nm\"><span>VeltrixDB<\u002Fspan><span class=\"tag\">FIXED<\u002Fspan><\u002Fdiv>\n            <div class=\"price\"><span id=\"vdbPrice\">$2,740<\u002Fspan><span class=\"u\">/ mo<\u002Fspan><\u002Fdiv>\n            <div class=\"breakdown\" id=\"vdbBreakdown\">Growth tier $2,490 + 5B overflow · same NVMe hardware<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"calc-foot\">\n          <span>Numbers are illustrative · actual quote depends on read/write mix, payload, region.<\u002Fspan>\n          <a href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Cost%20Modeling\">Get an exact quote for your workload →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW IT WORKS ============ -->\n<section id=\"how\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Architecture<\u002Fspan>\n    <h2 class=\"sh\">Fast, simple, <span class=\"em\">and it just works<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">All the complexity is hidden. You write data. You read data. At any scale. Without weekend on-call incidents.<\u002Fp>\n\n    <div class=\"pipe-wrap\">\n      <div id=\"pipe3d\"><\u002Fdiv>\n      <div class=\"pipe-overlay\">\n        <span class=\"tag\">› Live data path · 1024 shards<\u002Fspan>\n        <span class=\"legend\">\n          <span><i class=\"r\"><\u002Fi>Read packet<\u002Fspan>\n          <span><i class=\"w\"><\u002Fi>Write packet<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe-labels\">\n        <span>App<\u002Fspan><span>WAL<\u002Fspan><span class=\"us\">VLog<\u002Fspan><span>Index<\u002Fspan><span>Cache<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"path-demo\">\n      <!-- left: floating 3D shapes -->\n      <div class=\"path-shapes\">\n        <div id=\"pathShapes3d\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- right: tabbed step-by-step path -->\n      <div class=\"path-panel\">\n        <div class=\"path-bar\">\n          <div class=\"path-tabs\" role=\"tablist\">\n            <button class=\"ptab active\" data-path=\"write\">› WRITE<\u002Fbutton>\n            <button class=\"ptab\" data-path=\"read\">› READ<\u002Fbutton>\n            <button class=\"ptab\" data-path=\"delete\">› DELETE<\u002Fbutton>\n          <\u002Fdiv>\n          <span class=\"path-ctx\" id=\"pathCtx\">Single-key write · 128 B value · TCP binary protocol<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- WRITE -->\n        <div class=\"path-content\" id=\"pc-write\">\n          <div class=\"path-eyebrow\">PATH 01 / 03 — DURABLE WRITE<\u002Fdiv>\n          <h3 class=\"path-h\">Value lands on NVMe <em class=\"em\">before ack<\u002Fem>.<\u002Fh3>\n          <p class=\"path-sub\">Group-commit WAL batches concurrent writes into a single fsync. The value goes straight to the VLog via O_DIRECT — the index keeps only a 24-byte pointer. Zero write amplification.<\u002Fp>\n          <div class=\"path-steps\">\n            <div class=\"pstep\"><span class=\"psn\">01<\u002Fspan><span class=\"psl\">App → WAL<\u002Fspan><span class=\"pst\">~12µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep active\"><span class=\"psn\">02<\u002Fspan><span class=\"psl\">WAL fsync (group-commit)<\u002Fspan><span class=\"pst\">~80µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">03<\u002Fspan><span class=\"psl\">VLog → NVMe O_DIRECT<\u002Fspan><span class=\"pst\">~30µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">04<\u002Fspan><span class=\"psl\">Index pointer update<\u002Fspan><span class=\"pst\">~8µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">05<\u002Fspan><span class=\"psl\">Cache warm → ack<\u002Fspan><span class=\"pst\">~5µs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"path-foot\">\n            <span class=\"pf-label\">End-to-end · P99<\u002Fspan>\n            <span class=\"pf-val\">~0.2 ms<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- READ -->\n        <div class=\"path-content\" id=\"pc-read\" style=\"display:none\">\n          <div class=\"path-eyebrow\">PATH 02 / 03 — CACHE READ<\u002Fdiv>\n          <h3 class=\"path-h\">Hot key served in <em class=\"em\">microseconds<\u002Fem>.<\u002Fh3>\n          <p class=\"path-sub\">The LIRS cache learns your access pattern. Small hot keys (≤256&nbsp;B) get priority-2 eviction resistance — they stay warm even during large cold scans. Zero disk I/O on hit.<\u002Fp>\n          <div class=\"path-steps\">\n            <div class=\"pstep\"><span class=\"psn\">01<\u002Fspan><span class=\"psl\">App → LIRS cache lookup<\u002Fspan><span class=\"pst\">~20µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep active\"><span class=\"psn\">02<\u002Fspan><span class=\"psl\">LIR stack hit (in-memory)<\u002Fspan><span class=\"pst\">~15µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">03<\u002Fspan><span class=\"psl\">Zero-copy value return<\u002Fspan><span class=\"pst\">~5µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">04<\u002Fspan><span class=\"psl\">TCP response → ack<\u002Fspan><span class=\"pst\">~10µs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"path-foot\">\n            <span class=\"pf-label\">End-to-end · P99<\u002Fspan>\n            <span class=\"pf-val\">~0.3 ms<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- DELETE -->\n        <div class=\"path-content\" id=\"pc-delete\" style=\"display:none\">\n          <div class=\"path-eyebrow\">PATH 03 / 03 — TOMBSTONE DELETE<\u002Fdiv>\n          <h3 class=\"path-h\">Key marked dead, <em class=\"em\">instantly durable<\u002Fem>.<\u002Fh3>\n          <p class=\"path-sub\">Delete follows the same group-commit WAL path as a write. A tombstone is stamped in the index shard. The VLog value is marked dead for the next GC pass — no immediate disk rewrite.<\u002Fp>\n          <div class=\"path-steps\">\n            <div class=\"pstep\"><span class=\"psn\">01<\u002Fspan><span class=\"psl\">App → WAL<\u002Fspan><span class=\"pst\">~12µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep active\"><span class=\"psn\">02<\u002Fspan><span class=\"psl\">WAL fsync (group-commit)<\u002Fspan><span class=\"pst\">~80µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">03<\u002Fspan><span class=\"psl\">Tombstone → index shard<\u002Fspan><span class=\"pst\">~5µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">04<\u002Fspan><span class=\"psl\">Bloom filter update<\u002Fspan><span class=\"pst\">~2µs<\u002Fspan><\u002Fdiv>\n            <div class=\"pstep\"><span class=\"psn\">05<\u002Fspan><span class=\"psl\">VLog GC marks dead<\u002Fspan><span class=\"pst\">~3µs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"path-foot\">\n            <span class=\"pf-label\">End-to-end · P99<\u002Fspan>\n            <span class=\"pf-val\">~0.2 ms<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DEEP TECH ============ -->\n<section id=\"whitepaper\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Under the hood<\u002Fspan>\n    <h2 class=\"sh\">Not a wrapper. <span class=\"em\">A storage engine<\u002Fspan>, rebuilt.<\u002Fh2>\n    <p class=\"sh-sub\">We didn't put a faster cache in front of a slow database. We re-engineered the storage layer at the kernel boundary — two technical bets explain everything.<\u002Fp>\n\n    <div class=\"deep\">\n      <article class=\"article\">\n        <div class=\"article-num\">01<\u002Fdiv>\n        <div class=\"article-body\">\n          <div class=\"article-kicker\">Storage engine<\u002Fdiv>\n          <h3 class=\"article-h\">Key–value separation, <span class=\"em\">WiscKey-style<\u002Fspan>.<\u002Fh3>\n          <p class=\"article-lede\">Classical LSM trees rewrite every value during compaction — a 10× write amplification tax that destroys NVMe lifetime and detonates tail latency. We split keys from values.<\u002Fp>\n          <p>Index shards hold <b>only 24-byte VLog pointers<\u002Fb> — small, cache-resident, and fast to compact. Values live in an append-only <code>VLog<\u002Fcode> on NVMe and are <b>never rewritten by compaction<\u002Fb>. Garbage collection runs on a dedicated I/O queue that cannot stall reads.<\u002Fp>\n          <p>The benchmark we expose <a class=\"inline\" href=\"#performance\">on the performance page<\u002Fa> shows write amplification of <code>1.0×<\u002Fcode> sustained — RocksDB and Cassandra typically run at <b>6×–12×<\u002Fb>. Multiply that by your NVMe replacement cycle and the cost story writes itself.<\u002Fp>\n\n          <div class=\"article-pull\">\n            <div class=\"pull\"><div class=\"pl\">Write amp<\u002Fdiv><div class=\"pv\"><span class=\"red\">1.0×<\u002Fspan><\u002Fdiv><div class=\"pd\">vs 6–12× elsewhere<\u002Fdiv><\u002Fdiv>\n            <div class=\"pull\"><div class=\"pl\">Index pointer<\u002Fdiv><div class=\"pv\">24 B<\u002Fdiv><div class=\"pd\">per key, cache-resident<\u002Fdiv><\u002Fdiv>\n            <div class=\"pull\"><div class=\"pl\">GC interference<\u002Fdiv><div class=\"pv\"><span class=\"red\">0<\u002Fspan><\u002Fdiv><div class=\"pd\">separate I/O queue<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"article-foot\">\n            <div class=\"article-cite\">Inspired by the <b>WiscKey paper<\u002Fb> (FAST '16) — production-hardened for sharded multi-cloud deployments.<\u002Fdiv>\n            <div class=\"article-links\">\n              <a href=\"#performance\">See the benchmark<\u002Fa>\n              <a href=\"#calc\">Cost impact<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"article\">\n        <div class=\"article-num\">02<\u002Fdiv>\n        <div class=\"article-body\">\n          <div class=\"article-kicker\">Kernel I/O<\u002Fdiv>\n          <h3 class=\"article-h\"><span class=\"em\">io_uring<\u002Fspan> with SQPOLL. Zero syscalls on the hot path.<\u002Fh3>\n          <p class=\"article-lede\">Traditional databases pay a syscall and context-switch tax on every read. We bypass it entirely — the kernel polls our submission queue, and read latency collapses.<\u002Fp>\n          <p>In <code>io_uring SQPOLL<\u002Fcode> mode, a kernel thread polls a shared ring buffer for I/O submissions. Our hot path issues reads with <b>zero syscalls per operation<\u002Fb>. <code>O_DIRECT<\u002Fcode> sidesteps the page cache for deterministic NVMe latency — no eviction noise, no surprise jitter from another tenant.<\u002Fp>\n          <p>Each of our <b>1024 shards<\u002Fb> owns a dedicated submission queue. At the kernel boundary it looks less like a database and more like a 1024-way parallel storage controller. The architecture is laid out in our whitepaper, and you can see the result live <a class=\"inline\" href=\"#transparency\">on the cluster dashboard<\u002Fa>.<\u002Fp>\n\n          <div class=\"article-pull\">\n            <div class=\"pull\"><div class=\"pl\">Syscalls / read<\u002Fdiv><div class=\"pv\"><span class=\"red\">0<\u002Fspan><\u002Fdiv><div class=\"pd\">SQPOLL kernel thread<\u002Fdiv><\u002Fdiv>\n            <div class=\"pull\"><div class=\"pl\">Parallel queues<\u002Fdiv><div class=\"pv\">1024<\u002Fdiv><div class=\"pd\">one per shard<\u002Fdiv><\u002Fdiv>\n            <div class=\"pull\"><div class=\"pl\">P99 NVMe read<\u002Fdiv><div class=\"pv\"><span class=\"red\">4.9 ms<\u002Fspan><\u002Fdiv><div class=\"pd\">under sustained writes<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"article-foot\">\n            <div class=\"article-cite\">Closed source. The architecture is fully documented — happy to walk a security-review team through every component.<\u002Fdiv>\n            <div class=\"article-links\">\n              <a class=\"primary\" href=\"mailto:veltrixdb@gmail.com?subject=Send%20me%20the%20VeltrixDB%20whitepaper&amp;body=Hi%20—%20please%20share%20the%20VeltrixDB%20architecture%20whitepaper.%0A%0AName%3A%0ACompany%3A%0A\">Get the whitepaper<\u002Fa>\n              <a href=\"#transparency\">Live cluster metrics<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TRANSPARENCY DASHBOARD ============ -->\n<section id=\"transparency\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Transparency<\u002Fspan>\n    <h2 class=\"sh\">Live cluster, <span class=\"em\">live metrics<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">A snapshot from one of our internal benchmark clusters. Every number on this page traces back to a metric you can read in Prometheus.<\u002Fp>\n\n    <div class=\"dash\">\n      <div class=\"dash-head\">\n        <span class=\"ttl\">veltrixdb · cluster-prod-01 · us-east-1<\u002Fspan>\n        <span class=\"meta\">Snapshot · May 21 2026 · 14:42 UTC · uptime 187 d<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dash-grid\">\n        <div class=\"dash-tile\">\n          <div class=\"l\">Active keys<\u002Fdiv>\n          <div class=\"v\">1.04<span class=\"red\">B<\u002Fspan><\u002Fdiv>\n          <div class=\"d\">↗ +2.1M / hr<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dash-tile\">\n          <div class=\"l\">Reads scrubbed (lifetime)<\u002Fdiv>\n          <div class=\"v\">108<span class=\"red\">B<\u002Fspan>+<\u002Fdiv>\n          <div class=\"d\">14.3k/s sustained<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dash-tile\">\n          <div class=\"l\">Writes processed<\u002Fdiv>\n          <div class=\"v\">3.42<span class=\"red\">B<\u002Fspan>+<\u002Fdiv>\n          <div class=\"d\">WAL group-commit 80µs<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dash-tile\">\n          <div class=\"l\">P99 read latency<\u002Fdiv>\n          <div class=\"v\">4.9 <span style=\"font-size:16px;color:var(--ink-3);font-weight:400\">ms<\u002Fspan><\u002Fdiv>\n          <div class=\"d\">stable for 187 d<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dash-panels\">\n        <div class=\"dash-panel\">\n          <div class=\"hd\"><span>Read latency · P50 / P95 / P99<\u002Fspan><b>last 24h<\u002Fb><\u002Fdiv>\n          <svg class=\"dash-chart\" id=\"dashChart\" viewBox=\"0 0 600 140\" preserveAspectRatio=\"none\"><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"dash-panel\">\n          <div class=\"hd\"><span>Ops/sec per shard<\u002Fspan><b>1024 shards<\u002Fb><\u002Fdiv>\n          <div class=\"dash-bars\" id=\"dashBars\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dash-foot\">\n        <span><b>Cache hit rate<\u002Fb> 94.2% · <b>Write amp<\u002Fb> 1.0× · <b>SLA breaches<\u002Fb> 0<\u002Fspan>\n        <span>Exposed via <code style=\"font-family:var(--mono);color:var(--ink-2)\">/metrics<\u002Fcode> · Prometheus + Grafana ship in the Helm chart<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HONEST REQUIREMENTS ============ -->\n<section id=\"requirements\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Honest fit check<\u002Fspan>\n    <h2 class=\"sh\">What it <span class=\"em\">won't do<\u002Fspan> — and what it needs.<\u002Fh2>\n    <p class=\"sh-sub\">We'd rather lose the deal than oversell. VeltrixDB is a scalpel, not a Swiss Army knife — here's the truth about hardware, query patterns, and memory before we get on a call.<\u002Fp>\n\n    <div class=\"honest\">\n      <div class=\"honest-head\">\n        <h3>Hard requirements <span class=\"em\">we won't bend on<\u002Fspan>.<\u002Fh3>\n        <span class=\"tag\">Last updated · May 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"honest-grid\">\n        <div class=\"honest-cell\">\n          <div class=\"sym\">⚠<\u002Fdiv>\n          <div class=\"h\">Bare-metal NVMe or local SSD only<\u002Fdiv>\n          <div class=\"d\">Optimised strictly for <b>direct-attached NVMe<\u002Fb> with Linux <code>io_uring<\u002Fcode>. <b>Not<\u002Fb> recommended for AWS EBS, Azure managed disks, or any network-attached storage — they break the latency model.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"honest-cell\">\n          <div class=\"sym\">⚠<\u002Fdiv>\n          <div class=\"h\">Point lookups only<\u002Fdiv>\n          <div class=\"d\">Purpose-built for <b>high-throughput GET / SET / DEL<\u002Fb> at scale. Range queries, secondary indexes, joins, and full-text search are <b>not supported natively<\u002Fb> — wrong workload for VeltrixDB.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"honest-cell\">\n          <div class=\"sym\">⚠<\u002Fdiv>\n          <div class=\"h\">RAM budget for the ART index<\u002Fdiv>\n          <div class=\"d\">The adaptive radix index lives in DRAM. Plan <b>~12 GB RAM per 100M keys<\u002Fb> (varies with key size). 1B keys on a node needs <code>~120 GB<\u002Fcode> RAM. You will not run this on a t3.medium.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"honest-foot\">\n        <span><b>Linux kernel ≥ 5.10<\u002Fb> required for io_uring SQPOLL · <b>AVX2<\u002Fb> CPU baseline · <b>3-node minimum<\u002Fb> for production durability<\u002Fspan>\n        <span><a href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Architecture%20Review\" style=\"color:var(--red);text-decoration:underline;text-underline-offset:3px\">Talk to an architect before you commit →<\u002Fa><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DEPLOY ============ -->\n<section id=\"deploy\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Global Infrastructure<\u002Fspan>\n    <h2 class=\"sh\">One binary. <span class=\"em\">Any cloud<\u002Fspan>. Anywhere.<\u002Fh2>\n    <p class=\"sh-sub\">Deploy on GKE, EKS, AKS, or bare metal with a single Helm command. Identical NVMe performance everywhere. No retuning, no specialist hire, no lock-in.<\u002Fp>\n\n    <div class=\"globe-wrap\">\n      <div class=\"globe-stage\"><div id=\"globe3d\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"globe-info\">\n        <span class=\"gx\">Edge presence<\u002Fspan>\n        <h3>Replicate across <span class=\"em\">7 continents<\u002Fspan> — without paying egress to do it.<\u002Fh3>\n        <p>Active-active replication keeps every region within milliseconds of writes — failover is automatic, traffic shifts before your alerting fires. Run on your own VPC, your own NVMe, your own networking.<\u002Fp>\n        <div class=\"globe-stats\">\n          <div class=\"gs\"><div class=\"v\"><span class=\"red\">14<\u002Fspan><\u002Fdiv><div class=\"l\">Active regions<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs\"><div class=\"v\">99.999<span style=\"font-size:18px;color:var(--ink-3);font-weight:500\">%<\u002Fspan><\u002Fdiv><div class=\"l\">SLA at edge<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"deploy\">\n      <div class=\"clouds\">\n        <div class=\"cloud\"><span class=\"badge\">GCP<\u002Fspan><div class=\"name\">Google Cloud · GKE<\u002Fdiv><div class=\"nodes\">n2-highmem-96<br>Local NVMe SSDs<\u002Fdiv><\u002Fdiv>\n        <div class=\"cloud\"><span class=\"badge\">AWS<\u002Fspan><div class=\"name\">Amazon · EKS<\u002Fdiv><div class=\"nodes\">i3en / im4gn<br>Local NVMe<\u002Fdiv><\u002Fdiv>\n        <div class=\"cloud\"><span class=\"badge\">AZURE<\u002Fspan><div class=\"name\">Microsoft · AKS<\u002Fdiv><div class=\"nodes\">Lsv3 NVMe series<br>Full StorageClass<\u002Fdiv><\u002Fdiv>\n        <div class=\"cloud\"><span class=\"badge\">SELF-HOST<\u002Fspan><div class=\"name\">Bare metal<\u002Fdiv><div class=\"nodes\">Direct NVMe · any Linux<br>No hypervisor overhead<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"terminal\">\n        <div class=\"term-head\">\n          <div class=\"lights\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n          <span class=\"ttl\">~/veltrixdb · zsh<\u002Fspan>\n          <span style=\"width:50px\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"term-body\">\n          <div class=\"term-line\"><span class=\"pr\">$ <\u002Fspan><span class=\"cmd\">helm repo add veltrixdb https://charts.veltrixdb.com<\u002Fspan><\u002Fdiv>\n          <div class=\"term-out\">\"veltrixdb\" has been added to your repositories<\u002Fdiv>\n          <div class=\"term-line\" style=\"margin-top:14px\"><span class=\"pr\">$ <\u002Fspan><span class=\"cmd\">helm install <b>veltrixdb<\u002Fb> veltrixdb/veltrixdb \\<br>&nbsp;&nbsp;&nbsp;&nbsp;--namespace veltrixdb --create-namespace<\u002Fspan><\u002Fdiv>\n          <div class=\"term-out\" style=\"margin-top:10px\">\n            <span class=\"ok\">✓<\u002Fspan> StorageClass · veltrixdb-nvme<br>\n            <span class=\"ok\">✓<\u002Fspan> StatefulSet · 3 replicas, anti-affinity<br>\n            <span class=\"ok\">✓<\u002Fspan> ServiceMonitor · 50+ metrics<br>\n            <span class=\"ok\">✓<\u002Fspan> PodDisruptionBudget · minAvailable 2<br>\n            <span class=\"ok\">✓<\u002Fspan> Ready in <b style=\"color:var(--red)\">94s<\u002Fb>\n          <\u002Fdiv>\n          <div class=\"term-line\" style=\"margin-top:14px\"><span class=\"pr\">$ <\u002Fspan><span class=\"term-cursor\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"deploy-pills\">\n      <div class=\"dp\"><div class=\"nm\">⎈ Kubernetes-native<\u002Fdiv><div class=\"sub\">StatefulSet · anti-affinity · PDB<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">⚓ Helm chart<\u002Fdiv><div class=\"sub\">one command · full values.yaml<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">🤖 K8s operator<\u002Fdiv><div class=\"sub\">auto-scale · reshard · self-heal<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">📊 Prometheus + Grafana<\u002Fdiv><div class=\"sub\">50+ metrics · alerts · dashboards<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FAQ ============ -->\n<section id=\"faq\">\n  <div class=\"wrap\" style=\"max-width:1080px\">\n    <span class=\"eyebrow\">FAQ<\u002Fspan>\n    <h2 class=\"sh\">Questions every <span class=\"em\">CTO asks first<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">The exact concerns we hear in every initial conversation — answered up front so you don't have to chase them.<\u002Fp>\n    <div class=\"faq\">\n      <details open=\"\">\n        <summary>Is VeltrixDB a drop-in replacement for Redis or DynamoDB?<\u002Fsummary>\n        <div class=\"answer\">For <b>point-lookup workloads<\u002Fb> — yes. We ship a Redis-wire-compatible mode and a native client. If your application uses <code>GET<\u002Fcode>, <code>SET<\u002Fcode>, <code>DEL<\u002Fcode>, <code>HGET<\u002Fcode>-style commands, swap the connection string and you're running. If you rely on range scans, secondary indexes, or full-text search, VeltrixDB is the wrong tool — we'll tell you that in the demo.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>How do you actually achieve sub-5ms P99 on disk-backed reads?<\u002Fsummary>\n        <div class=\"answer\">Three things: <code>io_uring<\u002Fcode> SQPOLL eliminates syscalls on the hot path, a 256 GB LIRS cache absorbs ~94% of reads, and key-value separation means compaction never touches the values — so background work never competes with your user requests for NVMe bandwidth.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>What does the bill actually look like at scale?<\u002Fsummary>\n        <div class=\"answer\">You pay for the infrastructure (NVMe nodes), not per million operations. A 3-node Growth cluster serving 2M ops/sec typically lands between <b>$2,490 and $4,800/month<\u002Fb> in cloud costs — customers migrating from DynamoDB usually see 3–5× reduction. We'll model your workload during the demo.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>How does data durability and replication work?<\u002Fsummary>\n        <div class=\"answer\">Synchronous WAL with group-commit fsync. Multi-region clusters replicate over QUIC with active-active conflict resolution. RPO is zero for single-region failures, &lt;30s for cross-region. The 99.99% SLA is contractual on Growth and Enterprise tiers.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>What's the security and compliance story?<\u002Fsummary>\n        <div class=\"answer\">SOC 2 Type II and ISO 27001 certified. AES-256 encryption at rest, TLS 1.3 in transit, mTLS between nodes. GDPR and HIPAA compliant. Enterprise customers get custom DPAs, BYOK / KMS, VPC peering, and air-gapped deployment options.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>How long does production migration take?<\u002Fsummary>\n        <div class=\"answer\">Median: <b>two sprints<\u002Fb>. Helm install is 94 seconds. Then shadow-read traffic for 3–7 days to validate, then flip the connection. Enterprise migrations include a dedicated solutions architect end-to-end — no extra cost.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>What happens if I outgrow my plan?<\u002Fsummary>\n        <div class=\"answer\">Clusters scale online — add nodes, the operator reshards automatically without read interruption. You can upgrade tiers any time with no data migration; we just unlock the additional capacity and support level on your existing cluster.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>Is there a free trial or open-source version?<\u002Fsummary>\n        <div class=\"answer\">Yes — 14-day free trial on the Starter tier (full feature parity, just smaller capacity). Core client libraries are MIT-licensed. The server is source-available under a BSL-style license that converts to Apache 2.0 after 4 years.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ RESOURCES ============ -->\n<section id=\"docs\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Resources<\u002Fspan>\n    <h2 class=\"sh\">Built for teams who <span class=\"em\">read the docs<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Every claim on this page has a benchmark, a paper, or a config file behind it. Go deep before you commit.<\u002Fp>\n    <div class=\"resources\">\n      <a class=\"res\" href=\"#\">\n        <span class=\"kind\">Benchmark report<\u002Fspan>\n        <h4>The 1B-Key Benchmark — methodology &amp; raw data<\u002Fh4>\n        <p>Hardware specs, workload generator config, percentile distributions, and replayable harness. 32 pages.<\u002Fp>\n        <div class=\"meta\"><span>PDF · 4.2 MB<\u002Fspan><span>Download<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n      <a class=\"res\" href=\"#\">\n        <span class=\"kind\">Architecture deep-dive<\u002Fspan>\n        <h4>Key-value separation &amp; why compaction shouldn't touch values<\u002Fh4>\n        <p>How the VLog, io_uring, and LIRS cache combine to keep P99 stable at any write load.<\u002Fp>\n        <div class=\"meta\"><span>Engineering blog · 18 min<\u002Fspan><span>Read →<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n      <a class=\"res\" href=\"#\">\n        <span class=\"kind\">Migration guide<\u002Fspan>\n        <h4>Moving from DynamoDB to VeltrixDB in two sprints<\u002Fh4>\n        <p>Shadow reads, dual-write strategy, cutover checklist, and rollback plan — with copy-pasteable Terraform.<\u002Fp>\n        <div class=\"meta\"><span>Guide · 12 min<\u002Fspan><span>Read →<\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"news\">\n      <div>\n        <h3>Get the <span class=\"em\">benchmark report<\u002Fspan> in your inbox.<\u002Fh3>\n        <p>One email. The full methodology, raw P99 distributions, and a side-by-side cost analysis vs DynamoDB, Redis Enterprise, and Cassandra at 1B keys.<\u002Fp>\n      <\u002Fdiv>\n      <a class=\"news-mail\" href=\"mailto:veltrixdb@gmail.com?subject=Send%20me%20the%20VeltrixDB%20benchmark%20report&amp;body=Hi%20—%20please%20share%20the%20full%20benchmark%20methodology%20and%20cost%20comparison%20PDF.%0A%0AName%3A%0ACompany%3A%0AScale%20(keys%2Fops)%3A%0A\">\n        <span class=\"news-mail-l\">Email us on<\u002Fspan>\n        <span class=\"news-mail-v\">veltrixdb@gmail.com<\u002Fspan>\n        <span class=\"news-mail-a\">↗<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ORIGIN STORY ============ -->\n<section class=\"origin\">\n  <div class=\"wrap origin-inner\">\n    <div>\n      <span class=\"eyebrow\">Why we built this<\u002Fspan>\n      <h2>Born from a <span class=\"em\">3 AM<\u002Fspan> page.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"origin-body\">\n      <p>VeltrixDB started the night a flash sale buried our Redis cluster under 8 GB of session state. The on-call channel filled with screenshots of P99 climbing past 400 ms. The bill that quarter was already 3× what we'd budgeted.<\u002Fp>\n      <p>We tried every workaround you've tried — read replicas, write batching, a DynamoDB migration that ended with <span class=\"si\">a quarter of unpredictable per-op billing<\u002Fspan>. None of it solved the actual problem.<\u002Fp>\n      <p>The real problem was that <b>every popular database rewrites your values during compaction<\u002Fb>. It's a 10× amplification tax on storage and a guaranteed spike in tail latency exactly when you can least afford it.<\u002Fp>\n      <p>So we built VeltrixDB the way we wished a database had been built when we were on call: <b>key–value separation so compaction never touches values<\u002Fb>, <b>io_uring so the kernel never gets in the way<\u002Fb>, and <b>fixed cluster pricing so the bill never surprises you<\u002Fb>.<\u002Fp>\n      <p>Now we ship it to teams who recognise their own war stories in ours.<\u002Fp>\n      <div class=\"origin-sig\">\n        <div class=\"avatar\">AG<\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"nm\">Akanksha Gupta<\u002Fdiv>\n          <div class=\"role\">Founder, VeltrixDB<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section class=\"cta\">\n  <div class=\"wrap cta-inner\">\n    <h2>Go from 33ms to <span class=\"em\">&lt;5ms<\u002Fspan> this quarter.<\u002Fh2>\n    <div class=\"arrow-stat\">\n      <span>33ms P99<\u002Fspan>\n      <span style=\"color:var(--red)\">───────▶<\u002Fspan>\n      <b>4.9ms P99<\u002Fb>\n    <\u002Fdiv>\n    <div class=\"cta-cta\">\n      <a class=\"btn primary\" href=\"mailto:veltrixdb@gmail.com?subject=VeltrixDB%20Demo\">Book a free demo <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n      <a class=\"btn\" href=\"tel:+919817463648\">+91 98174 63648<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"cta-foot\">No commitment <span class=\"sep\">·<\u002Fspan> 30-min session <span class=\"sep\">·<\u002Fspan> Free migration analysis included<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"ft\">\n      <div class=\"brand-block\">\n        <a class=\"brand\" href=\"#\">\n          <span class=\"mark\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2L3 14h7l-1 8 11-13h-7l0-7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <b>Veltrix<i>DB<\u002Fi><\u002Fb>\n        <\u002Fa>\n        <p>Sub-5ms reads at 1 billion keys. NVMe-backed. Cloud-portable. Built for teams whose users notice when their database can't keep up.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h5>Product<\u002Fh5>\n        <ul>\n          <li><a href=\"#why\">Platform<\u002Fa><\u002Fli>\n          <li><a href=\"#performance\">Benchmark<\u002Fa><\u002Fli>\n          <li><a href=\"#compare\">Comparison<\u002Fa><\u002Fli>\n          <li><a href=\"#how\">Architecture<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h5>Resources<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Documentation<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Helm chart<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Operator guide<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Security model<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h5>Company<\u002Fh5>\n        <ul>\n          <li><a href=\"#pricing\">Pricing<\u002Fa><\u002Fli>\n          <li><a href=\"tel:+919817463648\">+91 98174 63648<\u002Fa><\u002Fli>\n          <li><a href=\"mailto:veltrixdb@gmail.com\">Book a demo<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Careers<\u002Fa><\u002Fli>\n          <li><a href=\"#\"><span style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);margin-right:8px;vertical-align:middle\"><\u002Fspan>Status · All systems<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ft-bar\">\n      <div>© 2026 VeltrixDB · All rights reserved<\u002Fdiv>\n      <div>v0.9.4-beta · build cb44a1f<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* ============ 3D PIPELINE (read/write path) ============ */\nfunction makePipeline3D(){\n  const el = document.getElementById('pipe3d');\n  if (!el || !window.THREE) return;\n  const W = () => el.clientWidth, H = () => el.clientHeight || 300;\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(38, W()/H(), 0.1, 100);\n  camera.position.set(0, 1.4, 7.6); camera.lookAt(0, 0, 0);\n  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(W(), H());\n  renderer.setClearColor(0x000000, 0);\n  el.appendChild(renderer.domElement);\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.45));\n  const dl = new THREE.DirectionalLight(0xE5121C, 0.9); dl.position.set(2,4,4); scene.add(dl);\n  const dl2 = new THREE.DirectionalLight(0xffffff, 0.35); dl2.position.set(-3,2,3); scene.add(dl2);\n\n  const xs = [-4.2, -2.1, 0, 2.1, 4.2];\n  const accentIdx = 2;\n  const nodes = [];\n  xs.forEach((x,i)=>{\n    const grp = new THREE.Group();\n    const geom = new THREE.BoxGeometry(1.0, 0.8, 0.8);\n    const body = new THREE.Mesh(geom, new THREE.MeshPhysicalMaterial({\n      color: i===accentIdx ? 0xE5121C : 0x1B1B26,\n      metalness:0.55, roughness:0.45,\n      emissive: i===accentIdx ? 0xE5121C : 0x000000,\n      emissiveIntensity: i===accentIdx ? 0.55 : 0.0,\n      transparent:true, opacity: 0.92\n    }));\n    grp.add(body);\n    const wf = new THREE.LineSegments(\n      new THREE.WireframeGeometry(geom),\n      new THREE.LineBasicMaterial({color: i===accentIdx ? 0xFF8088 : 0x6A6C78, transparent:true, opacity: i===accentIdx?0.85:0.55})\n    );\n    grp.add(wf);\n    grp.position.set(x, 0, 0);\n    grp.userData = {i, ph: Math.random()*Math.PI*2};\n    scene.add(grp);\n    nodes.push(grp);\n  });\n  for (let i=0;i<xs.length-1;i++){\n    const geo = new THREE.BufferGeometry().setFromPoints([\n      new THREE.Vector3(xs[i]+0.5, 0, 0),\n      new THREE.Vector3(xs[i+1]-0.5, 0, 0)\n    ]);\n    scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({color:0xE5121C, transparent:true, opacity:0.32})));\n  }\n\n  const packets = [];\n  function spawn(isWrite){\n    const m = new THREE.Mesh(\n      new THREE.SphereGeometry(0.13, 16, 12),\n      new THREE.MeshBasicMaterial({color: isWrite ? 0xF4A65A : 0xFF3340})\n    );\n    const halo = new THREE.Mesh(\n      new THREE.SphereGeometry(0.22, 16, 12),\n      new THREE.MeshBasicMaterial({color: isWrite ? 0xF4A65A : 0xFF3340, transparent:true, opacity:0.18})\n    );\n    m.add(halo);\n    m.userData = {t:0, speed: 0.0050 + Math.random()*0.0030, write:isWrite};\n    scene.add(m);\n    packets.push(m);\n  }\n\n  let last = 0;\n  function loop(now){\n    if (now - last > 480 && packets.length < 10){ spawn(Math.random() < 0.4); last = now; }\n    for (let i=packets.length-1;i>=0;i--){\n      const p = packets[i];\n      p.userData.t += p.userData.speed;\n      if (p.userData.t > 1){ scene.remove(p); packets.splice(i,1); continue; }\n      const t = p.userData.t;\n      p.position.x = xs[0] + t*(xs[xs.length-1]-xs[0]);\n      p.position.y = Math.sin(t*Math.PI)*0.55 + 0.05;\n      p.position.z = Math.cos(t*Math.PI*1.5)*0.18;\n    }\n    const tt = (now||0)*0.001;\n    nodes.forEach(n => {\n      n.rotation.y += 0.006;\n      n.rotation.x = Math.sin(tt*0.7 + n.userData.ph)*0.05;\n    });\n    renderer.render(scene, camera);\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame(loop);\n  window.addEventListener('resize', ()=>{\n    camera.aspect = W()/H(); camera.updateProjectionMatrix();\n    renderer.setSize(W(), H());\n  });\n}\n\n/* ============ 3D GLOBE ============ */\nfunction makeGlobe3D(){\n  const el = document.getElementById('globe3d');\n  if (!el || !window.THREE) return;\n  const W = () => el.clientWidth, H = () => el.clientHeight || 420;\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(40, W()/H(), 0.1, 100);\n  camera.position.set(0, 0, 6);\n  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(W(), H());\n  renderer.setClearColor(0x000000, 0);\n  el.appendChild(renderer.domElement);\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.4));\n  const dl = new THREE.DirectionalLight(0xE5121C, 1.0); dl.position.set(3,2,5); scene.add(dl);\n\n  const r = 1.7;\n  const grp = new THREE.Group();\n  const sphere = new THREE.Mesh(\n    new THREE.SphereGeometry(r, 36, 28),\n    new THREE.MeshPhysicalMaterial({color:0x12121C, metalness:0.35, roughness:0.7, transparent:true, opacity:0.92})\n  );\n  grp.add(sphere);\n  grp.add(new THREE.LineSegments(\n    new THREE.WireframeGeometry(new THREE.SphereGeometry(r*1.005, 28, 18)),\n    new THREE.LineBasicMaterial({color:0xE5121C, transparent:true, opacity:0.32})\n  ));\n  // outer ring (atmospheric)\n  const ring = new THREE.Mesh(\n    new THREE.RingGeometry(r*1.18, r*1.20, 64),\n    new THREE.MeshBasicMaterial({color:0xFF3340, side:THREE.DoubleSide, transparent:true, opacity:0.5})\n  );\n  ring.rotation.x = Math.PI*0.18;\n  grp.add(ring);\n\n  const pts = [\n    [0.4, 0.7, 0.6],[ -0.6, 0.4, 0.7],[ -0.9, 0.5, 0.0],\n    [0.9, 0.2, 0.4],[ 1.0, 0.6, -0.3],[ -0.3, -0.6, 0.7],\n    [0.5, -0.5, -0.6],[ -0.85, -0.1, -0.4],[ 0.1, 0.85, -0.4]\n  ];\n  const ringPulse = [];\n  pts.forEach(p=>{\n    const v = new THREE.Vector3(...p).normalize().multiplyScalar(r*1.02);\n    const dot = new THREE.Mesh(\n      new THREE.SphereGeometry(0.05, 14, 10),\n      new THREE.MeshBasicMaterial({color:0xFF3340})\n    );\n    dot.position.copy(v); grp.add(dot);\n    const halo = new THREE.Mesh(\n      new THREE.RingGeometry(0.06, 0.085, 24),\n      new THREE.MeshBasicMaterial({color:0xFF6B73, side:THREE.DoubleSide, transparent:true, opacity:0.6})\n    );\n    halo.position.copy(v); halo.lookAt(0,0,0);\n    halo.userData = {ph: Math.random()*Math.PI*2};\n    ringPulse.push(halo);\n    grp.add(halo);\n  });\n\n  // arcs\n  function arc(a,b){\n    const va = new THREE.Vector3(...a).normalize().multiplyScalar(r*1.02);\n    const vb = new THREE.Vector3(...b).normalize().multiplyScalar(r*1.02);\n    const mid = va.clone().add(vb).multiplyScalar(0.5).normalize().multiplyScalar(r*1.65);\n    const curve = new THREE.QuadraticBezierCurve3(va, mid, vb);\n    const pts = curve.getPoints(40);\n    const geo = new THREE.BufferGeometry().setFromPoints(pts);\n    return new THREE.Line(geo, new THREE.LineBasicMaterial({color:0xFF6B73, transparent:true, opacity:0.55}));\n  }\n  for (let i=0;i<pts.length;i++){\n    grp.add(arc(pts[i], pts[(i+2)%pts.length]));\n    grp.add(arc(pts[i], pts[(i+4)%pts.length]));\n  }\n\n  scene.add(grp);\n\n  let mx=0, my=0;\n  el.parentElement.addEventListener('mousemove', (e)=>{\n    const r = el.getBoundingClientRect();\n    mx = ((e.clientX - r.left)/r.width - 0.5) * 0.6;\n    my = ((e.clientY - r.top)/r.height - 0.5) * 0.4;\n  });\n\n  const t0 = performance.now();\n  function loop(){\n    const t = (performance.now()-t0)*0.001;\n    grp.rotation.y = t*0.18 + mx*0.6;\n    grp.rotation.x = Math.sin(t*0.2)*0.15 - my*0.4;\n    ringPulse.forEach(d=>{\n      const s = 1 + (Math.sin(t*2 + d.userData.ph) + 1) * 0.7;\n      d.scale.setScalar(s);\n      d.material.opacity = Math.max(0, 0.6 - (s-1)*0.4);\n    });\n    renderer.render(scene, camera);\n    requestAnimationFrame(loop);\n  }\n  loop();\n  window.addEventListener('resize', ()=>{\n    camera.aspect = W()/H(); camera.updateProjectionMatrix();\n    renderer.setSize(W(), H());\n  });\n}\n\n/* ============ HERO 3D — wire icosahedron + particles ============ */\nfunction makeHero3D(){\n  const el = document.getElementById('hero3d');\n  if (!el || !window.THREE) return;\n  const W = () => el.clientWidth, H = () => Math.max(el.clientHeight, 600);\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(48, W()/H(), 0.1, 200);\n  camera.position.set(0, 0, 12);\n  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(W(), H());\n  renderer.setClearColor(0x000000, 0);\n  el.appendChild(renderer.domElement);\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.4));\n  const key = new THREE.DirectionalLight(0xE5121C, 1.0); key.position.set(4,3,5); scene.add(key);\n  const rim = new THREE.DirectionalLight(0xFF3340, 0.5); rim.position.set(-4,-2,3); scene.add(rim);\n\n  // Big wire icosahedron\n  const objs = [];\n  function makeSolid(geom, opt){\n    const grp = new THREE.Group();\n    const body = new THREE.Mesh(geom, new THREE.MeshPhysicalMaterial({\n      color: opt.color, metalness:.4, roughness:.5,\n      transparent:true, opacity: opt.bodyOp ?? 0.10, side:THREE.DoubleSide\n    }));\n    grp.add(body);\n    const wire = new THREE.LineSegments(\n      new THREE.WireframeGeometry(geom),\n      new THREE.LineBasicMaterial({color: opt.wire, transparent:true, opacity: opt.wireOp ?? 0.55})\n    );\n    grp.add(wire);\n    grp.position.set(opt.x, opt.y, opt.z||0);\n    grp.scale.setScalar(opt.s ?? 1);\n    grp.userData = { rx: (Math.random()*0.5+0.1)*0.0035, ry: (Math.random()*0.5+0.1)*0.0045, fx: opt.x, fy: opt.y, ph: Math.random()*Math.PI*2 };\n    scene.add(grp);\n    objs.push(grp);\n  }\n  makeSolid(new THREE.IcosahedronGeometry(1.6, 0),  {x:-4.5, y:1.0, color:0xE5121C, wire:0xFF6B73, s:1.0});\n  makeSolid(new THREE.OctahedronGeometry(1.0, 0),   {x:4.6,  y:-1.4, color:0xE5121C, wire:0xFF6B73, s:1.0});\n  makeSolid(new THREE.TorusKnotGeometry(0.6,0.18,80,12,2,3), {x:3.8, y:1.8, color:0xFF3340, wire:0xFF8088, s:1.0, bodyOp:.06});\n  makeSolid(new THREE.TetrahedronGeometry(0.85,0),  {x:-3.5, y:-2.0, color:0xE5121C, wire:0xFF6B73, s:1.0});\n  makeSolid(new THREE.DodecahedronGeometry(0.55,0), {x:0.6, y:2.6, z:-1, color:0xE5121C, wire:0xFF6B73, s:1.0, bodyOp:.08});\n\n  // Starfield\n  const N = 380;\n  const sg = new THREE.BufferGeometry();\n  const sp = new Float32Array(N*3);\n  for (let i=0;i<N;i++){\n    sp[i*3]   = (Math.random()-0.5)*36;\n    sp[i*3+1] = (Math.random()-0.5)*22;\n    sp[i*3+2] = -8 + Math.random()*-14;\n  }\n  sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));\n  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({\n    color:0xE5121C, size:0.06, transparent:true, opacity:0.5,\n    sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending\n  })));\n\n  let mx=0, my=0;\n  el.parentElement.addEventListener('mousemove', (e)=>{\n    const r = el.getBoundingClientRect();\n    mx = ((e.clientX - r.left)/r.width - 0.5) * 0.6;\n    my = ((e.clientY - r.top)/r.height - 0.5) * 0.4;\n  });\n\n  const t0 = performance.now();\n  function loop(){\n    const t = (performance.now()-t0)*0.001;\n    objs.forEach(o => {\n      o.rotation.x += o.userData.rx;\n      o.rotation.y += o.userData.ry;\n      o.position.x = o.userData.fx + Math.sin(t*0.5 + o.userData.ph)*0.18;\n      o.position.y = o.userData.fy + Math.cos(t*0.4 + o.userData.ph)*0.16;\n    });\n    camera.position.x += (mx*1.4 - camera.position.x)*0.04;\n    camera.position.y += (-my*1.0 - camera.position.y)*0.04;\n    camera.lookAt(0,0,0);\n    renderer.render(scene, camera);\n    requestAnimationFrame(loop);\n  }\n  loop();\n\n  window.addEventListener('resize', ()=>{\n    camera.aspect = W()/H();\n    camera.updateProjectionMatrix();\n    renderer.setSize(W(), H());\n  });\n}\n\n/* ============ Latency bars on viewport enter ============ */\n(function(){\n  const bars = document.querySelectorAll('.bar-fill');\n  const wrap = document.querySelector('.lat-wrap');\n  if (!wrap) return;\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      if (e.isIntersecting){\n        bars.forEach(b=>{ b.style.width = b.dataset.w + '%'; });\n        io.disconnect();\n      }\n    });\n  },{threshold:.2});\n  io.observe(wrap);\n})();\n\n/* ============ Duel sparklines + counters ============ */\n(function(){\n  const usOps = document.getElementById('usOps');\n  const lgOps = document.getElementById('lgOps');\n  const usLat = document.getElementById('usLat');\n  const lgLat = document.getElementById('lgLat');\n  const usSpark = document.getElementById('usSpark');\n  const lgSpark = document.getElementById('lgSpark');\n  if (!usOps) return;\n  const W=200,H=48;\n  const usData = Array.from({length:40},()=> 26+Math.random()*4);\n  const lgData = Array.from({length:40},()=> 14+Math.random()*4);\n  function path(data){\n    return data.map((v,i)=>{\n      const x = (i/(data.length-1))*W;\n      const y = H - ((v-0)/(40))*H;\n      return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);\n    }).join(' ');\n  }\n  function render(){\n    usSpark.innerHTML = `\n      <defs><linearGradient id=\"ug\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#E5121C\" stop-opacity=\".45\"/>\n        <stop offset=\"100%\" stop-color=\"#E5121C\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n      <path d=\"${path(usData)} L${W} ${H} L0 ${H} Z\" fill=\"url(#ug)\"/>\n      <path d=\"${path(usData)}\" fill=\"none\" stroke=\"#E5121C\" stroke-width=\"1.6\"/>`;\n    lgSpark.innerHTML = `\n      <defs><linearGradient id=\"lg\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#F4A65A\" stop-opacity=\".30\"/>\n        <stop offset=\"100%\" stop-color=\"#F4A65A\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n      <path d=\"${path(lgData)} L${W} ${H} L0 ${H} Z\" fill=\"url(#lg)\"/>\n      <path d=\"${path(lgData)}\" fill=\"none\" stroke=\"#F4A65A\" stroke-width=\"1.6\"/>`;\n  }\n  let usO = 1820000, lgO = 112000, usL = 4.7, lgL = 76;\n  function tick(){\n    usO += (Math.random()-.4)*40000;\n    lgO += (Math.random()-.4)*8000;\n    usL = 4.4 + Math.random()*0.8;\n    lgL = 70 + Math.random()*12 + (Math.random()<0.12 ? 60 : 0);\n    usOps.textContent = (usO/1e6).toFixed(2)+'M';\n    lgOps.textContent = (lgO/1e3).toFixed(0)+'k';\n    usLat.textContent = usL.toFixed(1);\n    lgLat.textContent = lgL.toFixed(0);\n    usData.shift(); usData.push(26+Math.random()*4 + (Math.random()<0.05?2:0));\n    lgData.shift(); lgData.push(14+Math.random()*4 + (Math.random()<0.15?-6:0));\n    render();\n  }\n  render(); tick();\n  setInterval(tick, 1100);\n})();\n\n/* ============ Path demo — auto-cycling tabs + steps ============ */\n(function(){\n  const tabs = document.querySelectorAll('.ptab');\n  if (!tabs.length) return;\n  const panels = {\n    write:{el:document.getElementById('pc-write'), ctx:'Single-key write · 128 B value · TCP binary protocol'},\n    read: {el:document.getElementById('pc-read'),  ctx:'Single-key read · 128 B value · TCP binary protocol'},\n    delete:{el:document.getElementById('pc-delete'),ctx:'Single-key delete · tombstone · TCP binary protocol'},\n  };\n  const ctx = document.getElementById('pathCtx');\n  const tabOrder = ['write','read','delete'];\n  let curTab = 0, stepTimerId = null, tabTimerId = null, paused = false;\n\n  function setActiveTab(key){\n    tabs.forEach(x=>x.classList.remove('active'));\n    const btn = [...tabs].find(t=>t.dataset.path===key);\n    if (btn) btn.classList.add('active');\n    Object.values(panels).forEach(p=>{p.el.style.display='none'});\n    const p = panels[key];\n    p.el.style.display='flex';\n    if (ctx) ctx.textContent = p.ctx;\n    const steps = p.el.querySelectorAll('.pstep');\n    steps.forEach(s=>s.classList.remove('active'));\n    if (steps.length) steps[0].classList.add('active');\n  }\n  function cycleStep(){\n    const p = panels[tabOrder[curTab]];\n    const steps = p.el.querySelectorAll('.pstep');\n    const cur = [...steps].findIndex(s=>s.classList.contains('active'));\n    steps.forEach(s=>s.classList.remove('active'));\n    const next = (cur+1) % steps.length;\n    steps[next].classList.add('active');\n  }\n  function startStepCycle(){\n    if (stepTimerId) clearInterval(stepTimerId);\n    stepTimerId = setInterval(()=>{ if (!paused) cycleStep(); }, 900);\n  }\n  function startTabCycle(){\n    if (tabTimerId) clearInterval(tabTimerId);\n    tabTimerId = setInterval(()=>{\n      if (paused) return;\n      curTab = (curTab+1) % tabOrder.length;\n      setActiveTab(tabOrder[curTab]);\n    }, 4500);\n  }\n  tabs.forEach(t=>{\n    t.addEventListener('click',()=>{\n      paused = false;\n      curTab = tabOrder.indexOf(t.dataset.path);\n      setActiveTab(tabOrder[curTab]);\n      startStepCycle();\n    });\n  });\n  const pathPanel = document.querySelector('.path-panel');\n  if (pathPanel){\n    pathPanel.addEventListener('mouseenter',()=>{ paused = true; });\n    pathPanel.addEventListener('mouseleave',()=>{ paused = false; });\n  }\n  setActiveTab(tabOrder[curTab]);\n  startStepCycle();\n  startTabCycle();\n})();\n\n/* ============ Path shapes 3D ============ */\nfunction makePathShapes3D(){\n  const wrap = document.getElementById('pathShapes3d');\n  if (!wrap || !window.THREE) return;\n  const W = () => wrap.clientWidth, H = () => wrap.clientHeight;\n  if (!W() || !H()) return;\n  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});\n  renderer.setPixelRatio(Math.min(devicePixelRatio,2));\n  renderer.setSize(W(),H());\n  renderer.setClearColor(0x000000,0);\n  wrap.appendChild(renderer.domElement);\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(46, W()/H(), 0.1, 100);\n  camera.position.set(0,0,9);\n  scene.add(new THREE.AmbientLight(0xffffff,0.25));\n  const keyLight = new THREE.DirectionalLight(0xFF3340,1.8);\n  keyLight.position.set(3,5,6); scene.add(keyLight);\n  const fillLight = new THREE.PointLight(0xE5121C,0.6,14);\n  fillLight.position.set(-3,2,3); scene.add(fillLight);\n\n  const mat = new THREE.MeshPhysicalMaterial({\n    color:0x181824, metalness:0.55, roughness:0.35,\n    emissive:0xE5121C, emissiveIntensity:0.06,\n  });\n  const matB = mat.clone(); matB.emissiveIntensity = 0.03;\n\n  const card1 = new THREE.Mesh(new THREE.BoxGeometry(1.9,2.4,0.14),mat);\n  card1.position.set(-1.4,-0.6,0);\n  card1.rotation.set(0.18,-0.22,-0.32);\n  scene.add(card1);\n\n  const card2 = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.8,0.12),matB);\n  card2.position.set(0.6,-1.3,-0.8);\n  card2.rotation.set(-0.1,0.18,0.2);\n  scene.add(card2);\n\n  const tetra = new THREE.Mesh(new THREE.TetrahedronGeometry(1.15,0),mat.clone());\n  tetra.position.set(1.5,1.1,-0.5);\n  tetra.rotation.set(0.4,0.5,0.2);\n  scene.add(tetra);\n\n  const ringGeo = new THREE.RingGeometry(0.7,0.78,40);\n  const ringMat = new THREE.MeshBasicMaterial({color:0xE5121C,opacity:0.18,transparent:true,side:THREE.DoubleSide});\n  const ring1 = new THREE.Mesh(ringGeo,ringMat); ring1.rotation.x = -Math.PI/2; ring1.position.set(-1.4,-2.0,0); scene.add(ring1);\n  const ring2 = ring1.clone(); ring2.position.set(0.6,-2.4,-0.8); scene.add(ring2);\n  const ring3 = ring1.clone(); ring3.position.set(1.5,-0.6,-0.5); scene.add(ring3);\n\n  let t=0;\n  (function loop(){\n    t+=0.007;\n    card1.position.y = -0.6 + Math.sin(t)*0.18;\n    card1.rotation.z = -0.32 + Math.sin(t*0.7)*0.04;\n    ring1.position.y = -2.0 + Math.sin(t)*0.18;\n    card2.position.y = -1.3 + Math.sin(t*0.9+2)*0.13;\n    ring2.position.y = -2.4 + Math.sin(t*0.9+2)*0.13;\n    tetra.rotation.y += 0.008;\n    tetra.position.y = 1.1 + Math.sin(t*1.2+1)*0.15;\n    ring3.position.y = -0.6 + Math.sin(t*1.2+1)*0.15;\n    renderer.render(scene,camera);\n    requestAnimationFrame(loop);\n  })();\n\n  window.addEventListener('resize', ()=>{\n    camera.aspect = W()/H(); camera.updateProjectionMatrix();\n    renderer.setSize(W(),H());\n  });\n}\n\n/* ============ How-it-works tabs (legacy, removed) ============ */\n(function(){\n  const tabs = document.querySelectorAll('.how-tab');\n  if (!tabs.length) return;\n  const flows = {\n    write:{el:document.getElementById('flow-write'), lat:'~0.2ms', desc:'Value bytes go <b>directly to VLog<\u002Fb> — the index only stores a 24-byte pointer. <code>Zero write amplification.<\u002Fcode>'},\n    hit:{el:document.getElementById('flow-hit'), lat:'~0.3ms', desc:'Small hot keys (≤256B) get <b>priority-2 eviction resistance<\u002Fb> — they stay cached even during large cold scans.'},\n    miss:{el:document.getElementById('flow-miss'), lat:'~4.9ms', desc:'<b>io_uring SQPOLL<\u002Fb> submits zero-syscall read requests directly to the NVMe queue — <code>no kernel context switch on the hot path.<\u002Fcode>'}\n  };\n  const lat = document.getElementById('howLat');\n  const desc = document.getElementById('howDesc');\n  tabs.forEach(t=>{\n    t.addEventListener('click',()=>{\n      tabs.forEach(x=>x.classList.remove('active'));\n      t.classList.add('active');\n      Object.values(flows).forEach(f=>{f.el.style.display='none'});\n      const f = flows[t.dataset.tab];\n      f.el.style.display='flex';\n      lat.textContent = f.lat;\n      desc.innerHTML = f.desc;\n    });\n  });\n})();\n\n/* ============ Scroll-reveal animations (subtle, professional) ============ */\n(function(){\n  function tag(){\n    document.querySelectorAll('section .eyebrow, section h2.sh, section .sh-sub, section .origin h2').forEach(el => el.classList.add('reveal'));\n    [\n      '.outcomes', '.pains', '.testimonials', '.pricing', '.cases',\n      '.resources', '.metric-row', '.stats-grid', '.deploy-pills',\n      '.trust-badges', '.duel-foot', '.deep', '.dash-grid', '.calc-cards', '.honest-grid'\n    ].forEach(sel => {\n      document.querySelectorAll(sel).forEach(el => el.classList.add('reveal-stagger'));\n    });\n    [\n      '.table-wrap', '.lat-wrap', '.how', '.path-demo', '.deploy', '.faq', '.news',\n      '.pipe-wrap', '.globe-wrap', '.dash', '.calc', '.origin-body'\n    ].forEach(sel => {\n      document.querySelectorAll(sel).forEach(el => el.classList.add('reveal'));\n    });\n  }\n  tag();\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting){\n        e.target.classList.add('in');\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal, .reveal-stagger').forEach(el => io.observe(el));\n})();\n\n/* ============ Hero 4.9 counter rollback (33 -> 4.9) ============ */\n(function(){\n  const numEl = document.querySelector('.hero-kinetic .big .num');\n  if (!numEl) return;\n  let started = false;\n  function animate(){\n    if (started) return; started = true;\n    const target = 4.9, start = 33.0;\n    const dur = 1400;\n    const t0 = performance.now();\n    function step(now){\n      const k = Math.min(1, (now - t0)/dur);\n      // ease-out cubic\n      const e = 1 - Math.pow(1 - k, 3);\n      const v = start + (target - start) * e;\n      numEl.textContent = v.toFixed(1);\n      if (k < 1) requestAnimationFrame(step);\n      else numEl.textContent = target.toFixed(1);\n    }\n    requestAnimationFrame(step);\n  }\n  // start shortly after load\n  setTimeout(animate, 450);\n})();\n\n/* ============ Cost Calculator ============ */\n(function(){\n  const slider = document.getElementById('calcSlider');\n  if (!slider) return;\n  const opsEl = document.getElementById('calcOps');\n  const ddbPrice = document.getElementById('ddbPrice');\n  const vdbPrice = document.getElementById('vdbPrice');\n  const ddbB = document.getElementById('ddbBreakdown');\n  const vdbB = document.getElementById('vdbBreakdown');\n  const savEl = document.getElementById('calcSavings');\n  const multEl = document.getElementById('calcMultiplier');\n  const DDB_PER_M = 1.00; // blended $/M ops\n  function fmt(n){ return '$' + Math.round(n).toLocaleString(); }\n  function tier(opsB){\n    if (opsB <= 0.5) return { name:'Starter', base:499, capB:0.5 };\n    if (opsB <= 5)   return { name:'Growth',  base:2490, capB:5 };\n    return { name:'Enterprise', base:2490 + (opsB-5)*50, capB:opsB };\n  }\n  function vdbCost(opsB){\n    if (opsB <= 0.5) return 499;\n    if (opsB <= 5)   return 2490;\n    return Math.round(2490 + (opsB-5) * 50); // $50 per extra billion\n  }\n  function update(){\n    const v = +slider.value;\n    const opsB = v;\n    const opsM = opsB * 1000;\n    const ddb = opsM * DDB_PER_M;\n    const vdb = vdbCost(opsB);\n    const savings = Math.max(0, ddb - vdb);\n    const mult = ddb / Math.max(1, vdb);\n    opsEl.textContent = opsB;\n    ddbPrice.textContent = fmt(ddb);\n    vdbPrice.textContent = fmt(vdb);\n    ddbB.textContent = `$${DDB_PER_M.toFixed(2)} / M blended ops · ${opsB}B ops → ${fmt(ddb)}`;\n    if (opsB <= 0.5) vdbB.textContent = 'Starter tier · single-region cluster';\n    else if (opsB <= 5) vdbB.textContent = 'Growth tier · multi-region replication';\n    else vdbB.textContent = `Growth $2,490 + ${(opsB-5).toFixed(0)}B overflow @ $50/B · same NVMe hardware`;\n    if (savings > 0){\n      savEl.textContent = fmt(savings);\n      savEl.style.color = 'var(--good)';\n      multEl.textContent = mult.toFixed(1) + '× cheaper';\n    } else {\n      savEl.textContent = fmt(-savings);\n      savEl.style.color = 'var(--warm)';\n      multEl.textContent = 'similar at this scale';\n    }\n    // fill colour on track\n    const pct = ((v - +slider.min) / (+slider.max - +slider.min)) * 100;\n    slider.style.backgroundSize = pct + '% 100%';\n  }\n  slider.addEventListener('input', update);\n  update();\n})();\n\n/* ============ Dashboard chart + bars ============ */\n(function(){\n  const chart = document.getElementById('dashChart');\n  const bars = document.getElementById('dashBars');\n  if (!chart || !bars) return;\n  const W=600, H=140, N=60;\n  function rand(min,max){ return min + Math.random()*(max-min); }\n  // three series: p50, p95, p99 (sub-5ms each)\n  function series(base, jitter, spikes){\n    return Array.from({length:N}, (_,i)=> base + Math.sin(i*0.3)*jitter*0.4 + rand(-jitter,jitter) + (spikes && Math.random()<0.05 ? rand(jitter,jitter*2) : 0));\n  }\n  function path(data, max){\n    return data.map((v,i)=>{\n      const x = (i/(N-1))*W;\n      const y = H - Math.min(H, (v/max)*H*0.85) - 8;\n      return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);\n    }).join(' ');\n  }\n  const p50 = series(0.6, 0.15, false);\n  const p95 = series(1.4, 0.35, false);\n  const p99 = series(3.6, 0.6, true);\n  const max = 6.5; // ms scale\n  chart.innerHTML = `\n    <defs>\n      <linearGradient id=\"dashFill\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#E5121C\" stop-opacity=\".35\"/>\n        <stop offset=\"100%\" stop-color=\"#E5121C\" stop-opacity=\"0\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <line x1=\"0\" y1=\"${H-(5/max)*H*0.85-8}\" x2=\"${W}\" y2=\"${H-(5/max)*H*0.85-8}\" stroke=\"rgba(255,255,255,.08)\" stroke-dasharray=\"3 4\"/>\n    <text x=\"${W-4}\" y=\"${H-(5/max)*H*0.85-12}\" text-anchor=\"end\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#5A5C66\" letter-spacing=\".08em\">SLA 5MS<\u002Ftext>\n    <path d=\"${path(p99, max)} L${W} ${H} L0 ${H} Z\" fill=\"url(#dashFill)\"/>\n    <path d=\"${path(p99, max)}\" fill=\"none\" stroke=\"#E5121C\" stroke-width=\"1.5\"/>\n    <path d=\"${path(p95, max)}\" fill=\"none\" stroke=\"#F4A65A\" stroke-width=\"1.2\" stroke-opacity=\".7\"/>\n    <path d=\"${path(p50, max)}\" fill=\"none\" stroke=\"#46D391\" stroke-width=\"1.2\" stroke-opacity=\".7\"/>\n  `;\n  // bars: 32 shards visible, varied heights\n  const heights = Array.from({length:32}, (_,i)=> 30 + Math.sin(i*0.5)*30 + Math.random()*30);\n  bars.innerHTML = heights.map(h=>`<div class=\"b\" style=\"height:0\"><\u002Fdiv>`).join('');\n  // animate in when in viewport\n  const io = new IntersectionObserver((ents)=>{\n    ents.forEach(e=>{\n      if (e.isIntersecting){\n        bars.querySelectorAll('.b').forEach((b,i)=>{\n          setTimeout(()=>{ b.style.height = heights[i] + '%'; }, i*20);\n        });\n        io.disconnect();\n      }\n    });\n  }, {threshold:.3});\n  io.observe(bars);\n})();\n\n/* ============ smooth scroll ============ */\ndocument.querySelectorAll('a[href^=\"#\"]').forEach(a=>{\n  a.addEventListener('click',e=>{\n    const id = a.getAttribute('href');\n    if (id.length>1){\n      const t = document.querySelector(id);\n      if (t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}\n    }\n  });\n});\n\n/* ============ Boot ============ */\n(function boot(){\n  function go(){ try{ makeHero3D(); }catch(e){ console.warn(e); } try{ makePipeline3D(); }catch(e){ console.warn(e); } try{ makeGlobe3D(); }catch(e){ console.warn(e); } try{ makePathShapes3D(); }catch(e){ console.warn(e); } }\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);\n  else go();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
