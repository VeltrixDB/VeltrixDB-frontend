document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ript src=\"80b309fd-883c-4499-828c-b65128325df5\"><\u002Fscript>\n<style>\n  :root{\n    --bg:#F6F4EF;            /* warm paper */\n    --bg-2:#EDEAE2;\n    --bg-3:#E2DED3;\n    --line:rgba(20,24,30,.16);\n    --line-2:rgba(20,24,30,.26);\n    --line-strong:rgba(20,24,30,.34);\n    --box-shadow:0 1px 0 rgba(20,24,30,.04), 0 8px 22px -14px rgba(20,24,30,.18);\n    --ink:#15181D;\n    --ink-2:#3A3F47;\n    --ink-3:#6B7280;\n    --ink-4:#9AA1AC;\n    --accent:#3D6FA0;         /* deeper steel blue — reads on light */\n    --accent-deep:#2A547F;\n    --accent-glow:rgba(61,111,160,.22);\n    --gold:#8C7A4E;           /* warm bronze — readable on light */\n    --gold-soft:#A89460;\n    --warn:#B85A48;\n    --good:#3F7E63;\n    --surface:#FFFFFF;\n    --surface-2:#FAF8F3;\n    --r:14px;\n    --grid: 1280px;\n    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n    --serif: 'Instrument Serif', 'Times New Roman', serif;\n    --sans: 'Geist', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-feature-settings:\"ss01\",\"cv11\"}\n  body{\n    background:\n      radial-gradient(1100px 600px at 78% -8%, rgba(61,111,160,.07), transparent 60%),\n      radial-gradient(800px 500px at -5% 30%, rgba(140,122,78,.05), transparent 60%),\n      var(--bg);\n    overflow-x:hidden;\n  }\n  a{color:inherit;text-decoration:none}\n  ::selection{background:var(--accent);color:#FFFFFF}\n\n  .wrap{max-width:var(--grid);margin:0 auto;padding:0 28px}\n  .mono{font-family:var(--mono);letter-spacing:-.01em}\n  .serif{font-family:var(--serif);font-weight:400;letter-spacing:-.01em}\n  .micro{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}\n  .rule{height:1px;background:var(--line);width:100%}\n\n  /* ============== NAV ============== */\n  nav.top{\n    position:sticky;top:0;z-index:50;\n    backdrop-filter:saturate(140%) blur(14px);\n    background:linear-gradient(to bottom, rgba(246,244,239,.92), rgba(246,244,239,.78));\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:62px}\n  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em}\n  .brand .mark{\n    width:24px;height:24px;border-radius:7px;\n    background:linear-gradient(135deg,var(--accent) 0%, var(--accent-deep) 100%);\n    display:grid;place-items:center;color:#FFFFFF;\n    box-shadow:0 0 24px var(--accent-glow), inset 0 0 0 1px rgba(255,255,255,.18);\n  }\n  .brand .mark svg{width:12px;height:12px}\n  .brand b{font-weight:600;font-size:15px}\n  .brand b i{font-style:normal;color:var(--ink-3);font-weight:400}\n  .nav-links{display:flex;gap:28px}\n  .nav-links a{font-size:13.5px;color:var(--ink-2);transition:color .15s}\n  .nav-links a:hover{color:var(--ink)}\n  .nav-cta{display:flex;align-items:center;gap:10px}\n  .btn{\n    height:36px;padding:0 16px;border-radius:8px;\n    display:inline-flex;align-items:center;gap:8px;\n    font-size:13px;font-weight:500;letter-spacing:-.005em;\n    border:1px solid var(--line-2);background:transparent;color:var(--ink);cursor:pointer;\n    transition:all .2s ease;font-family:var(--sans);\n    text-decoration:none;\n  }\n  .btn:hover{background:rgba(20,24,30,.04);border-color:rgba(20,24,30,.22)}\n  .btn.primary{\n    background:linear-gradient(180deg, #1F242C 0%, #15181D 100%);\n    color:#FFFFFF;border-color:transparent;font-weight:600;\n    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 6px 16px -6px rgba(61,111,160,.45);\n  }\n  .btn.primary:hover{background:linear-gradient(180deg,#2A2F38 0%,#1A1E25 100%);transform:translateY(-1px)}\n  .btn.accent{\n    background:var(--accent);color:#FFFFFF;border-color:transparent;font-weight:600;\n    box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 6px 20px -6px var(--accent-glow);\n  }\n  .btn.accent:hover{background:#92B4D2;transform:translateY(-1px)}\n  .btn .arrow{transition:transform .2s}\n  .btn:hover .arrow{transform:translate(2px,-2px)}\n  .phone{font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}\n  .phone:hover{color:var(--ink)}\n\n  /* ============== HERO ============== */\n  /* ============== HERO ============== */\n  .hero{\n    position:relative;padding:80px 0 56px;\n    border-bottom:1px solid var(--line);\n    overflow:hidden;\n  }\n  /* (legacy scroll-flow CSS removed) */\n  .hero::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:\n      linear-gradient(to right, rgba(20,24,30,.04) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(20,24,30,.04) 1px, transparent 1px);\n    background-size:88px 88px;\n    mask-image:radial-gradient(ellipse 80% 90% at 50% 30%, black 30%, transparent 80%);\n    pointer-events:none;\n  }\n  .hero-grid{display:grid;grid-template-columns:1.2fr .9fr;gap:80px;align-items:center;position:relative;z-index:1}\n\n  .pill{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:7px 14px;border-radius:999px;\n    border:1px solid var(--line-2);\n    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;\n    color:var(--ink-2);\n    background:rgba(20,24,30,.025);\n    backdrop-filter:blur(8px);\n  }\n  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent), 0 0 4px var(--accent);animation:pulse 2.4s ease-in-out infinite}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}\n  .pill .sep{color:var(--ink-4)}\n\n  h1.hero-h{\n    margin:28px 0 0;\n    font-size:clamp(48px,5.8vw,84px);\n    line-height:.96;letter-spacing:-.038em;font-weight:400;\n    color:var(--ink);\n  }\n  h1.hero-h .em{\n    font-family:var(--serif);font-style:italic;font-weight:400;letter-spacing:-.025em;\n    background:linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 100%);\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n  }\n  h1.hero-h .strike{\n    position:relative;display:inline-block;color:var(--ink-3);\n  }\n  h1.hero-h .strike::after{\n    content:\"\";position:absolute;left:-2%;right:-2%;top:54%;height:2px;background:var(--ink-3);transform:rotate(-1.5deg);border-radius:2px;opacity:.7;\n  }\n\n  .hero-sub{\n    margin-top:32px;font-size:17.5px;line-height:1.6;color:var(--ink-2);max-width:560px;font-weight:300;\n  }\n  .hero-sub b{color:var(--ink);font-weight:500}\n\n  .hero-cta{display:flex;align-items:center;gap:14px;margin-top:36px}\n  .hero-cta .btn{height:46px;padding:0 20px;font-size:14px;border-radius:10px}\n\n  .hero-stats{\n    display:grid;grid-template-columns:repeat(4,1fr);gap:0;\n    margin-top:64px;border-top:1px solid var(--line);\n  }\n  .hero-stats .stat{\n    padding:24px 0 6px;border-right:1px solid var(--line);padding-right:20px;\n  }\n  .hero-stats .stat:last-child{border-right:0}\n  .hero-stats .v{font-family:var(--serif);font-size:42px;line-height:1;letter-spacing:-.025em;color:var(--ink);font-weight:400}\n  .hero-stats .v sup{font-size:13px;color:var(--ink-3);font-family:var(--mono);font-weight:400;vertical-align:super;margin-left:3px;letter-spacing:.04em}\n  .hero-stats .l{margin-top:12px;font-size:10.5px;color:var(--ink-4);font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase}\n\n  /* ============== ENGINE (hero right) ============== */\n  .engine{\n    position:relative;border:1px solid var(--line-strong);border-radius:18px;\n    background:linear-gradient(180deg, #FFFFFF 0%, #FAF8F3 100%);\n    padding:0;\n    box-shadow:\n      0 30px 60px -30px rgba(20,24,30,.18), 0 12px 30px -12px rgba(20,24,30,.10),\n      0 0 0 1px rgba(61,111,160,.06),\n      inset 0 1px 0 rgba(20,24,30,.06);\n    overflow:hidden;\n  }\n  .engine-head{\n    display:flex;align-items:center;justify-content:space-between;gap:14px;\n    font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.12em;text-transform:uppercase;\n    padding:16px 20px;border-bottom:1px solid var(--line);\n    background:rgba(20,24,30,.02);\n  }\n  .engine-head .live{display:inline-flex;align-items:center;gap:8px;color:var(--ink-2)}\n  .engine-head .live::before{content:\"\";width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 1.6s ease-in-out infinite}\n  .engine-head .meta{color:var(--ink-4)}\n\n  .engine-stage{\n    position:relative;height:300px;\n    background:\n      radial-gradient(500px 220px at 50% 110%, rgba(61,111,160,.10), transparent 60%),\n      linear-gradient(180deg,#FAF8F3 0%,#EDEAE2 100%);\n    overflow:hidden;\n  }\n  .engine-stage::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:\n      linear-gradient(to right, rgba(20,24,30,.06) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(20,24,30,.06) 1px, transparent 1px);\n    background-size:24px 24px;\n    mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 90%);\n    pointer-events:none;\n  }\n  .shard-grid{\n    position:absolute;inset:32px 32px 60px;\n    display:grid;grid-template-columns:repeat(24,1fr);grid-template-rows:repeat(10,1fr);\n    gap:3px;\n  }\n  .shard{\n    background:rgba(20,24,30,.06);border-radius:2px;\n    transition:background .35s ease, box-shadow .35s ease, transform .35s ease;\n  }\n  .shard.r{background:var(--accent);box-shadow:0 0 10px var(--accent),0 0 4px var(--accent);transform:scale(1.15)}\n  .shard.w{background:var(--gold);box-shadow:0 0 10px var(--gold),0 0 4px var(--gold);transform:scale(1.15)}\n  .shard.h{background:#15181D;opacity:.65;box-shadow:0 0 8px rgba(20,24,30,.18);transform:scale(1.1)}\n\n  /* readouts overlay on top of stage */\n  .engine-readouts{\n    position:absolute;left:0;right:0;bottom:0;\n    display:grid;grid-template-columns:repeat(3,1fr);\n    border-top:1px solid var(--line);\n    background:rgba(255,255,255,.85);backdrop-filter:blur(8px);\n  }\n  .engine-readouts .ro{padding:10px 14px;border-right:1px solid var(--line)}\n  .engine-readouts .ro:last-child{border-right:0}\n  .engine-readouts .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-4)}\n  .engine-readouts .v{margin-top:5px;font-family:var(--serif);font-size:26px;letter-spacing:-.018em;line-height:1;color:var(--ink);font-weight:400}\n  .engine-readouts .v.acc{color:var(--accent)}\n  .engine-readouts .v sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);font-weight:400;vertical-align:baseline;margin-left:4px;letter-spacing:.04em}\n\n  .engine-foot{\n    display:flex;justify-content:space-between;align-items:center;gap:14px;\n    padding:14px 18px;border-top:1px solid var(--line);\n    background:rgba(20,24,30,.025);\n  }\n  .legend{display:flex;gap:18px;flex-wrap:wrap}\n  .legend span{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.04em}\n  .legend i{width:8px;height:8px;border-radius:2px;display:inline-block}\n  .legend i.read{background:var(--accent);box-shadow:0 0 6px var(--accent-glow)}\n  .legend i.write{background:var(--gold)}\n  .legend i.hit{background:#15181D;opacity:.5}\n  .engine-foot .arch{font-family:var(--mono);font-size:10.5px;color:var(--ink-4);letter-spacing:.04em}\n\n  /* section vertical rhythm */\n  section{padding:140px 0;position:relative}\n  section.tight{padding:100px 0}\n  .eyebrow{\n    display:inline-flex;align-items:center;gap:12px;\n    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);\n  }\n  .eyebrow::before{content:\"\";display:block;width:28px;height:1px;background:var(--gold);opacity:.7}\n  h2.sh{\n    font-size:clamp(36px,4vw,56px);\n    line-height:1;letter-spacing:-.03em;font-weight:400;\n    margin:24px 0 0;max-width:900px;color:var(--ink);\n  }\n  h2.sh .em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold-soft);letter-spacing:-.02em}\n  .sh-sub{margin-top:22px;font-size:16.5px;color:var(--ink-3);max-width:680px;line-height:1.6;font-weight:300}\n\n  /* ============== OUTCOMES ============== */\n  .outcomes-wrap{margin-top:64px;border:1px solid var(--line-2);border-radius:18px;background:linear-gradient(180deg, rgba(20,24,30,.02), rgba(255,255,255,0));overflow:hidden;box-shadow:var(--box-shadow)}\n  .outcomes{display:grid;grid-template-columns:repeat(3,1fr)}\n  .outcome{\n    border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);\n    padding:36px 32px 32px;display:flex;flex-direction:column;gap:0;\n    position:relative;\n    transition:background .25s ease;\n  }\n  .outcome:nth-child(3n){border-right:0}\n  .outcome:nth-last-child(-n+3){border-bottom:0}\n  .outcome:hover{background:rgba(61,111,160,.04)}\n  .outcome:hover .ico{border-color:rgba(61,111,160,.40);background:rgba(61,111,160,.07)}\n  .outcome:hover .ico svg{stroke:var(--accent)}\n\n  .outcome .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}\n  .outcome .ico{\n    width:42px;height:42px;border-radius:11px;\n    display:grid;place-items:center;\n    background:rgba(20,24,30,.06);\n    border:1px solid var(--line-2);\n    transition:all .25s ease;\n  }\n  .outcome .ico svg{width:20px;height:20px;stroke:var(--ink-2);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s}\n  .outcome .idx{\n    font-family:var(--mono);font-size:10.5px;color:var(--ink-4);\n    letter-spacing:.14em;text-transform:uppercase;\n  }\n  .outcome h3{\n    font-size:23px;letter-spacing:-.022em;font-weight:400;\n    margin:0 0 14px;line-height:1.18;color:var(--ink);\n  }\n  .outcome h3 .em{\n    font-family:var(--serif);font-style:italic;font-weight:400;\n    color:var(--gold-soft);\n  }\n  .outcome p{margin:0;color:var(--ink-3);font-size:14px;line-height:1.65;flex:1;font-weight:300}\n  .outcome .metric{\n    margin-top:24px;padding-top:18px;border-top:1px dashed var(--line);\n    display:flex;align-items:baseline;justify-content:space-between;gap:10px;\n  }\n  .outcome .metric .num{\n    font-family:var(--serif);font-size:24px;letter-spacing:-.015em;line-height:1;color:var(--ink);\n  }\n  .outcome .metric .num .acc{color:var(--accent)}\n  .outcome .metric .lbl{\n    font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;\n    text-transform:uppercase;color:var(--ink-4);text-align:right;\n  }\n\n  /* ============== PAIN (sound familiar) ============== */\n  .pains{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:56px}\n  .pain{\n    border:1px solid var(--line-2);border-radius:14px;padding:28px;\n    background:linear-gradient(180deg, rgba(224,123,107,.025), transparent 60%);\n    position:relative;box-shadow:var(--box-shadow);\n  }\n  .pain q{\n    display:block;font-family:var(--serif);font-style:italic;font-size:24px;line-height:1.28;\n    color:var(--ink);quotes:\"“\" ”\";letter-spacing:-.012em;font-weight:400;\n  }\n  .pain q::before{content:open-quote;color:var(--gold);margin-right:2px}\n  .pain q::after{content:close-quote;color:var(--gold)}\n  .pain p{margin:18px 0 0;color:var(--ink-3);font-size:14px;line-height:1.55}\n  .pain .src{margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.06em;text-transform:uppercase}\n\n  /* ============== COMPARE TABLE ============== */\n  .table-wrap{margin-top:48px;border:1px solid var(--line-2);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.01);box-shadow:var(--box-shadow)}\n  table.cmp{width:100%;border-collapse:collapse;font-size:14px}\n  table.cmp th, table.cmp td{padding:18px 20px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}\n  table.cmp tr:last-child td{border-bottom:0}\n  table.cmp thead th{\n    font-family:var(--mono);font-weight:500;font-size:10.5px;letter-spacing:.16em;\n    text-transform:uppercase;color:var(--ink-3);\n    background:rgba(20,24,30,.025);border-bottom:1px solid var(--line-2);\n  }\n  table.cmp thead th.us{color:var(--accent)}\n  table.cmp thead th.us .star{margin-right:6px}\n  table.cmp td.criteria{color:var(--ink);font-weight:500;width:34%}\n  table.cmp td.cell{color:var(--ink-3)}\n  table.cmp td.us{\n    background:linear-gradient(180deg, rgba(61,111,160,.07), rgba(61,111,160,.02));\n    color:var(--ink);\n    border-left:1px solid rgba(61,111,160,.28);\n    border-right:1px solid rgba(61,111,160,.28);\n  }\n  table.cmp tbody tr:last-child td.us{border-bottom:1px solid rgba(61,111,160,.28)}\n  .v-yes{color:var(--good);font-weight:500}\n  .v-warn{color:var(--gold);font-weight:500}\n  .v-no{color:var(--warn);font-weight:500}\n  .v-yes::before{content:\"●  \";font-size:10px}\n  .v-warn::before{content:\"◐  \";font-size:10px}\n  .v-no::before{content:\"○  \";font-size:10px}\n\n  /* ============== METRICS ============== */\n  .metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:64px;border:1px solid var(--line-2);border-radius:14px;background:rgba(255,255,255,.01);overflow:hidden;box-shadow:var(--box-shadow)}\n  .metric{padding:36px 24px 28px;border-right:1px solid var(--line-2);position:relative}\n  .metric:last-child{border-right:0}\n  .metric .big{font-family:var(--serif);font-size:72px;letter-spacing:-.03em;line-height:.9}\n  .metric .big.acc{color:var(--accent)}\n  .metric .lbl{margin-top:18px;font-size:14px;color:var(--ink);font-weight:500}\n  .metric .desc{margin-top:6px;font-size:13px;color:var(--ink-3);line-height:1.5}\n\n  /* ============== LATENCY CHART ============== */\n  .lat-wrap{margin-top:48px;border:1px solid var(--line-2);border-radius:14px;padding:36px 36px 30px;background:rgba(255,255,255,.01);box-shadow:var(--box-shadow)}\n  .lat-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:36px}\n  .lat-head h3{margin:0;font-size:24px;letter-spacing: rgba(61,111,160,.07), 0 30px 80px -40px rgba(61,111,160,.28);\n  }\n  .duel-card h4{margin:0;font-size:18px;font-weight:500;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}\n  .duel-card.us h4 .pin{font-family:var(--mono);font-size:9.5px;color:#0B0E11;background:linear-gradient(180deg,#15181D,#2A2F38);padding:3px 8px;border-radius:4px;letter-spacing:.1em;font-weight:600}\n  .duel-card .legacy-pin{font-family:var(--mono);font-size:10px;color:var(--ink-3);background:rgba(20,24,30,.06);padding:3px 7px;border-radius:4px;letter-spacing:.08em}\n  .duel-row{margin-top:20px}\n  .duel-row .k{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-4);text-transform:uppercase}\n  .duel-row .v{font-family:var(--serif);font-size:42px;letter-spacing:-.02em;line-height:1;margin-top:6px}\n  .us .duel-row .v.acc{color:var(--accent)}\n  .duel-row .sub{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--ink-3)}\n  .spark{margin-top:14px;height:46px;width:100%}\n  .duel-vs{\n    align-self:center;\n    font-family:var(--serif);font-style:italic;font-size:32px;color:var(--ink-3);\n    text-align:center;\n  }\n  .duel-vs .vs-line{display:block;width:1px;height:60px;background:var(--line);margin:8px auto}\n  .duel-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:24px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .duel-foot .cell{padding:22px 24px;border-right:1px solid var(--line)}\n  .duel-foot .cell:last-child{border-right:0}\n  .duel-foot .k{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.06em;text-transform:uppercase}\n  .duel-foot .v{font-family:var(--serif);font-size:34px;letter-spacing:-.02em;line-height:1;margin-top:8px}\n  .duel-foot .v .vs{font-size:13px;font-family:var(--mono);color:var(--ink-3);margin-left:8px;letter-spacing:.02em}\n\n  /* ============== USE CASES ============== */\n  .cases{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:56px}\n  .case{\n    border:1px solid var(--line-2);border-radius:14px;padding:32px;\n    background:linear-gradient(180deg, rgba(20,24,30,.03), rgba(255,255,255,0));\n    position:relative;overflow:hidden;\n    transition:border-color .2s, transform .2s;box-shadow:var(--box-shadow);\n  }\n  .case:hover{border-color:var(--line-2);transform:translateY(-2px)}\n  .case::before{\n    content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);\n    transform:scaleY(0);transform-origin:top;transition:transform .3s;\n  }\n  .case:hover::before{transform:scaleY(1)}\n  .case .cap{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}\n  .case h3{font-size:25px;font-weight:400;letter-spacing:-.022em;margin:14px 0 12px;line-height:1.18}\n  .case h3 .em{font-family:var(--serif);font-style:italic;color:var(--gold-soft)}\n  .case p{margin:0;color:var(--ink-3);font-size:14.5px;line-height:1.55}\n  .case .chips{margin-top:20px;display:flex;flex-wrap:wrap;gap:6px}\n  .case .chip{font-family:var(--mono);font-size:11px;color:var(--ink-2);padding:5px 10px;border:1px solid var(--line-2);border-radius:6px;background:rgba(20,24,30,.03);letter-spacing:.02em}\n\n  /* ============== HOW IT WORKS ============== */\n  .how{margin-top:48px;border:1px solid var(--line-2);border-radius:14px;background:rgba(255,255,255,.01);overflow:hidden;box-shadow:var(--box-shadow)}\n  .how-tabs{display:flex;border-bottom:1px solid var(--line)}\n  .how-tab{\n    padding:18px 24px;font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;\n    color:var(--ink-3);cursor:pointer;border-right:1px solid var(--line);\n    transition:all .15s;background:transparent;border-top:none;border-bottom:none;border-left:none;\n    text-align:left;\n  }\n  .how-tab:last-child{border-right:0}\n  .how-tab.active{color:var(--ink);background:rgba(61,111,160,.06);box-shadow:inset 0 -2px 0 var(--accent)}\n  .how-tab:hover:not(.active){color:var(--ink-2);background:rgba(20,24,30,.03)}\n  .how-body{padding:48px 36px}\n  .flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}\n  .node{\n    min-width:130px;padding:18px 16px;border-radius:12px;\n    border:1px solid var(--line-strong);background:rgba(20,24,30,.04);\n    text-align:center;position:relative;\n    box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 4px 10px -6px rgba(20,24,30,.18);\n  }\n  .node.us{border-color:rgba(61,111,160,.36);background:rgba(61,111,160,.07);box-shadow:0 0 30px -10px rgba(61,111,160,.32)}\n  .node .ic{font-size:20px;margin-bottom:8px}\n  .node .nm{font-size:13px;font-weight:500;letter-spacing:-.01em}\n  .node .sub{margin-top:4px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.04em}\n  .arrow-h{\n    flex:0 0 32px;display:flex;align-items:center;justify-content:center;color:var(--ink-4);\n    font-family:var(--mono);font-size:14px;\n  }\n  .how-foot{margin-top:36px;padding-top:24px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}\n  .how-foot .lat{font-family:var(--serif);font-size:48px;letter-spacing:-.02em;color:var(--gold);line-height:1}\n  .how-foot .lat-l{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-top:6px}\n  .how-foot .desc{max-width:520px;color:var(--ink-2);font-size:14px;line-height:1.6}\n  .how-foot .desc b{color:var(--ink);font-weight:500}\n  .how-foot .desc code{font-family:var(--mono);background:rgba(61,111,160,.10);color:var(--accent);padding:2px 6px;border-radius:4px;font-size:12.5px}\n\n  /* ============== DEPLOY ============== */\n  .deploy{display:grid;grid-template-columns:1.1fr .9fr;gap:32px;align-items:stretch;margin-top:48px}\n  .clouds{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}\n  .cloud{\n    border:1px solid var(--line-2);border-radius:12px;padding:20px;\n    background:rgba(20,24,30,.025);\n    display:flex;flex-direction:column;gap:8px;min-height:120px;\n    transition:border-color .2s;box-shadow:var(--box-shadow);\n  }\n  .cloud:hover{border-color:var(--line-2)}\n  .cloud .name{font-size:15px;font-weight:500;letter-spacing:-.01em}\n  .cloud .nodes{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);line-height:1.5}\n  .cloud .badge{align-self:flex-start;font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(61,111,160,.07);padding:2px 8px;border-radius:4px;letter-spacing:.08em;border:1px solid rgba(182,255,60,.15)}\n\n  .terminal{\n    border:1px solid var(--line-strong);border-radius:12px;\n    background:#FFFFFF;\n    box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 18px 40px -18px rgba(20,24,30,.22), 0 0 0 1px rgba(20,24,30,.04);\n    overflow:hidden;display:flex;flex-direction:column;\n  }\n  .term-head{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:12px 14px;border-bottom:1px solid var(--line);\n  }\n  .term-head .lights{display:flex;gap:6px}\n  .term-head .lights i{display:block;width:10px;height:10px;border-radius:50%}\n  .term-head .lights i:nth-child(1){background:#FF6B5B}\n  .term-head .lights i:nth-child(2){background:#C8C0AE}\n  .term-head .lights i:nth-child(3){background:var(--accent)}\n  .term-head .ttl{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:.04em}\n  .term-body{padding:20px 18px;font-family:var(--mono);font-size:13px;line-height:1.7;flex:1}\n  .term-line{color:var(--ink-2)}\n  .term-line .pr{color:var(--accent);user-select:none}\n  .term-line .cmd{color:var(--ink)}\n  .term-line .cmd b{color:var(--accent);font-weight:500}\n  .term-out{color:var(--ink-3);margin-top:10px}\n  .term-out .ok{color:var(--good)}\n  .term-cursor{display:inline-block;width:7px;height:14px;background:var(--accent);vertical-align:middle;margin-left:4px;animation:blink 1.1s steps(1) infinite}\n  @keyframes blink{50%{opacity:0}}\n\n  .deploy-pills{display:grid;grid-templa \"hero-sub\">\n        VeltrixDB delivers <b>sub-5ms reads at 1 billion keys<\u002Fb> — at a fraction of what you pay for Redis, DynamoDB, or Cassandra. One Helm chart. Any cloud. Zero lock-in.\n      <\u002Fp>\n      <div class=\"hero-cta\">\n        <a class=\"btn primary\" href=\"mailto:ssshubhamsharma4@gmail.com?subject=VeltrixDB%20Demo%20Request&amp;body=Hi%20VeltrixDB%20team%2C%0A%0AI%27d%20like%20to%20book%20a%20demo.%20Here%27s%20our%20context%3A%0A%0ACompany%3A%20%0ARole%3A%20%0ACurrent%20database%3A%20%0AScale%20%28keys%20%2F%20QPS%29%3A%20%0ABiggest%20pain%20point%3A%20%0A%0AThanks.\">Book a demo <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n        <a class=\"btn\" href=\"#performance\">Read the benchmark<\u002Fa>\n      <\u002Fdiv>\n\n      <div class=\"hero-stats\">\n        <div class=\"stat\">\n          <div class=\"v\">&lt;5<sup>ms<\u002Fsup><\u002Fdiv>\n          <div class=\"l\">P99 latency<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"v\">2M<sup>+<\u002Fsup><\u002Fdiv>\n          <div class=\"l\">Requests / sec<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"v\">1B<sup>+<\u002Fsup><\u002Fdiv>\n          <div class=\"l\">Keys supported<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"v\">3–5<sup>×<\u002Fsup><\u002Fdiv>\n          <div class=\"l\">Cost reduction<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"engine\">\n      <div class=\"engine-head\">\n        <span class=\"live\">veltrixdb · live cluster<\u002Fspan>\n        <span class=\"meta\">cluster-01 · 3 nodes · IST 14:22<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"engine-stage\" id=\"engine\">\n        <div class=\"shard-grid\" id=\"shardGrid\"><\u002Fdiv>\n        <div class=\"engine-readouts\">\n          <div class=\"ro\">\n            <div class=\"k\">Throughput<\u002Fdiv>\n            <div class=\"v acc\"><span id=\"ops\">1.84<\u002Fspan><sub>M ops/s<\u002Fsub><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ro\">\n            <div class=\"k\">P99 latency<\u002Fdiv>\n            <div class=\"v\"><span id=\"lat\">4.7<\u002Fspan><sub>ms<\u002Fsub><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ro\">\n            <div class=\"k\">Cache hit<\u002Fdiv>\n            <div class=\"v\"><span id=\"hit\">94.2<\u002Fspan><sub>%<\u002Fsub><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"engine-foot\">\n        <div class=\"legend\">\n          <span><i class=\"read\"><\u002Fi>Read · NVMe<\u002Fspan>\n          <span><i class=\"write\"><\u002Fi>Write · WAL<\u002Fspan>\n          <span><i class=\"hit\"><\u002Fi>Cache hit<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"arch\">1024 shards · io_uring SQPOLL<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ OUTCOMES (built different) ============ -->\n<section id=\"why\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Built different<\u002Fspan>\n    <h2 class=\"sh\">What actually changes <span class=\"em\">when you switch<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Not a feature checklist. The real outcomes your engineers, finance team, and users feel — within weeks of deployment.<\u002Fp>\n\n    <div class=\"outcomes-wrap\">\n    <div class=\"outcomes\">\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 17l5-5 4 4 8-9\"><\u002Fpath><path d=\"M14 7h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">01 — Latency<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Latency that <span class=\"em\">never surprises<\u002Fspan> you.<\u002Fh3>\n        <p>Sub-5ms reads at any scale, under any write load. No degradation during flash sales. No spikes when background cleanup runs. Consistent — always.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\"><span class=\"acc\">&lt;5<\u002Fspan>ms<\u002Fspan>\n          <span class=\"lbl\">P99 — guaranteed<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9 9.5C9 8 10.3 7 12 7s3 1 3 2.5-1.3 2-3 2.5-3 1-3 2.5S10.3 17 12 17s3-1 3-2.5\"><\u002Fpath><path d=\"M12 5v2M12 17v2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">02 — Cost<\u002Fspan>\n        <\u002Fdiv>\n        <h3>A bill you can <span class=\"em\">actually predict<\u002Fspan>.<\u002Fh3>\n        <p>Pay for fixed infrastructure, not per million operations. Your bill doesn't spike when a campaign goes viral or a cron job runs a full-table scan.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\"><span class=\"acc\">3–5×<\u002Fspan><\u002Fspan>\n          <span class=\"lbl\">Lower vs DynamoDB<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M7 18a5 5 0 010-10 6 6 0 0111.7 1.5A4 4 0 0118 18H7z\"><\u002Fpath><path d=\"M9 14h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">03 — Portability<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Any cloud. <span class=\"em\">Zero lock-in<\u002Fspan>.<\u002Fh3>\n        <p>One Helm chart runs identically on GKE, EKS, AKS, or bare metal. Switch providers without rewriting your data layer or renegotiating vendor contracts.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\">4 <span style=\"font-size:13px;font-family:var(--mono);color:var(--ink-3);letter-spacing:.04em\">platforms<\u002Fspan><\u002Fspan>\n          <span class=\"lbl\">GKE · EKS · AKS · Bare<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 3l8 4v6c0 5-3.5 7.5-8 8-4.5-.5-8-3-8-8V7l8-4z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">04 — Compaction<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Background work, <span class=\"em\">invisible to users<\u002Fspan>.<\u002Fh3>\n        <p>Compaction and GC run on a completely separate I/O path. Your users never feel it. No more 3 AM pages because cleanup chose the wrong moment.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\"><span class=\"acc\">0<\u002Fspan><span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:6px\">interference<\u002Fspan><\u002Fspan>\n          <span class=\"lbl\">Separate I/O path<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 12h4l2-7 4 14 2-7h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">05 — Observability<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Observability from <span class=\"em\">day one<\u002Fspan>.<\u002Fh3>\n        <p>50+ Prometheus metrics, pre-wired Grafana dashboards, and alert rules ship in the Helm chart. No custom instrumentation. No dark weeks.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\"><span class=\"acc\">50+<\u002Fspan> metrics<\u002Fspan>\n          <span class=\"lbl\">ServiceMonitor · Alerts<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outcome\">\n        <div class=\"head\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><path d=\"M3 18h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span class=\"idx\">06 — Time to prod<\u002Fspan>\n        <\u002Fdiv>\n        <h3>Zero to production <span class=\"em\">in minutes<\u002Fspan>.<\u002Fh3>\n        <p>One Helm command deploys storage, replication, auto-scaling, and monitoring. No weeks of tuning. No specialist hire. Day-one productive.<\u002Fp>\n        <div class=\"metric\">\n          <span class=\"num\"><span class=\"acc\">94<\u002Fspan><span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:4px\">s<\u002Fspan><\u002Fspan>\n          <span class=\"lbl\">helm install → ready<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PAIN ============ -->\n<section class=\"tight\" style=\"border-top:1px solid var(--line);padding-top:96px\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Sound familiar<\u002Fspan>\n    <h2 class=\"sh\">Every fast-growing team <span class=\"em\">hits the same wall<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Your database was fine at 1M users. Somewhere between 10M and 100M, things got expensive. Then slow. Then both.<\u002Fp>\n\n    <div class=\"pains\">\n      <div class=\"pain\">\n        <q>Our database bill tripled and we didn't ship a single feature.<\u002Fq>\n        <p>More data means more reads. More reads mean bigger Redis clusters or paying DynamoDB per million ops. The bill grows faster than revenue.<\u002Fp>\n        <div class=\"src\">— VP Engineering, Series C<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <q>Latency is fine at 9 AM, then spikes to 500ms at noon.<\u002Fq>\n        <p>Traditional databases run internal cleanup jobs that fight your user requests for disk access. Peak traffic + compaction = your worst nightmare.<\u002Fp>\n        <div class=\"src\">— Staff SRE, fintech<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain\">\n        <q>We're burning through SSDs every few months.<\u002Fq>\n        <p>Databases without key-value separation rewrite your data over and over. Every unnecessary rewrite is wear on expensive NVMe — a tax on your latency.<\u002Fp>\n        <div class=\"src\">— Platform Lead, ad-tech<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMPARE ============ -->\n<section id=\"compare\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Honest comparison<\u002Fspan>\n    <h2 class=\"sh\">\"Why not just use Redis <span class=\"em\">or DynamoDB?<\u002Fspan>\"<\u002Fh2>\n    <p class=\"sh-sub\">Great tools — for specific use cases. At 100M+ keys with strict latency SLAs, here's the honest picture.<\u002Fp>\n\n    <div class=\"table-wrap\">\n      <table class=\"cmp\">\n        <thead>\n          <tr>\n            <th>What matters to you<\u002Fth>\n            <th>Redis<\u002Fth>\n            <th>DynamoDB<\u002Fth>\n            <th>Cassandra<\u002Fth>\n            <th class=\"us\"><span class=\"star\">★<\u002Fspan>VeltrixDB<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td class=\"criteria\">Sub-5ms reads at 1B keys<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">RAM-limited<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-warn\">Varies<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">20–80ms<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Always<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Predictable monthly cost<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">RAM costs scale<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">Per-op billing<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-warn\">Complex ops<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Fixed infra cost<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">No latency spikes under writes<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-yes\">Yes<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-warn\">Sometimes<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">Compaction storms<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Always<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Data larger than RAM<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-no\">RAM only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-yes\">Yes<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-yes\">Yes<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">NVMe-backed<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">No cloud vendor lock-in<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-yes\">Self-host<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">AWS only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-yes\">Self-host<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Any cloud<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Kubernetes-native deploy<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">Manual config<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">Managed only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-warn\">Complex setup<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">Helm + Operator<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Built-in Prometheus metrics<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-warn\">Basic<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-no\">CloudWatch only<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-warn\">Plugin needed<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">50+ metrics<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"criteria\">Simple to operate<\u002Ftd>\n            <td class=\"cell\" data-h=\"Redis\"><span class=\"v-yes\">Simple<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"DynamoDB\"><span class=\"v-yes\">Managed<\u002Fspan><\u002Ftd>\n            <td class=\"cell\" data-h=\"Cassandra\"><span class=\"v-no\">Weeks to tune<\u002Fspan><\u002Ftd>\n            <td class=\"us\" data-h=\"VeltrixDB\"><span class=\"v-yes\">1 Helm chart<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ METRICS / LATENCY ============ -->\n<section id=\"performance\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">By the numbers<\u002Fspan>\n    <h2 class=\"sh\">Results that <span class=\"em\">speak for themselves<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Benchmarked on real cloud hardware — GCP N2 nodes with 8 NVMe SSDs, 64 cores, 480 GB RAM.<\u002Fp>\n\n    <div class=\"metric-row\">\n      <div class=\"metric\">\n        <div class=\"big acc\">85<span style=\"font-size:36px\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Reduction in read latency<\u002Fdiv>\n        <div class=\"desc\">From 33ms down to 4.9ms P99<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">10<span style=\"font-size:36px\">×<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Less unnecessary rewriting<\u002Fdiv>\n        <div class=\"desc\">Compaction only touches keys, never values<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">3–5<span style=\"font-size:36px\">×<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Lower infrastructure cost<\u002Fdiv>\n        <div class=\"desc\">vs DynamoDB at equivalent scale<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"big\">1B<span style=\"font-size:36px\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"lbl\">Keys on a 3-node cluster<\u002Fdiv>\n        <div class=\"desc\">256 GB cache · 3 TB NVMe per node<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lat-wrap\">\n      <div class=\"lat-head\">\n        <div>\n          <h3>P99 read latency at 1 billion keys — head to head<\u002Fh3>\n          <p>Lower is better. Sustained mixed read/write load. Equivalent hardware.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"lat-axis\">— ms (P99) →<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"bars\" id=\"bars\">\n        <div class=\"bar-row\"><div class=\"bar-label\">Cassandra<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill cas\" data-w=\"100\">~80ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~80ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">LSM-tree DB<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill lsm\" data-w=\"42\">~33ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~33ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">DynamoDB<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill ddb\" data-w=\"16\">~12ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">~12ms P99<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">VeltrixDB · miss<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill us-miss\" data-w=\"7\">4.9ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">4.9ms · cache miss<\u002Fdiv><\u002Fdiv>\n        <div class=\"bar-row\"><div class=\"bar-label\">VeltrixDB · hit<\u002Fdiv><div class=\"bar-track\"><div class=\"bar-fill us-hit\" data-w=\"2.5\">0.3ms<\u002Fdiv><\u002Fdiv><div class=\"bar-note\">0.3ms · cache hit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lat-foot\">VeltrixDB achieves <b>&lt;5ms P99 even on cache misses<\u002Fb> because values are read directly from NVMe via zero-copy <span class=\"mono\">io_uring<\u002Fspan> — no compaction, no page-cache eviction, no surprises.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 3D LATENCY RACE -->\n    <div class=\"lat3d-wrap\" id=\"lat3d\">\n      <div class=\"lat3d-head\">\n        <div>\n          <h3>Watch a single read travel across <span class=\"em\">four databases<\u002Fspan><\u002Fh3>\n          <p>Same query · same payload · same hardware. Each lane's length scales to its real P99 latency.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"lat3d-toggle\" role=\"tablist\">\n          <button data-mode=\"play\" class=\"active\">▶ Race<\u002Fbutton>\n          <button data-mode=\"pause\">⏸ Pause<\u002Fbutton>\n          <button data-mode=\"loop\">↻ Loop<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lat3d-stage\">\n        <div class=\"lat3d-floor\"><\u002Fdiv>\n        <div class=\"lat3d-track\" id=\"lat3dTrack\">\n          <div class=\"lat3d-row\" data-ms=\"80\"><div class=\"nm\">Cassandra<small>LSM · disk<\u002Fsmall><\u002Fdiv><div class=\"lat3d-bay\"><div class=\"lat3d-pkt cas\"><\u002Fdiv><\u002Fdiv><div class=\"ms\">80<span class=\"u\">ms<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"lat3d-row\" data-ms=\"33\"><div class=\"nm\">LSM-tree DB<small>generic<\u002Fsmall><\u002Fdiv><div class=\"lat3d-bay\"><div class=\"lat3d-pkt lsm\"><\u002Fdiv><\u002Fdiv><div class=\"ms\">33<span class=\"u\">ms<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"lat3d-row\" data-ms=\"12\"><div class=\"nm\">DynamoDB<small>managed<\u002Fsmall><\u002Fdiv><div class=\"lat3d-bay\"><div class=\"lat3d-pkt ddb\"><\u002Fdiv><\u002Fdiv><div class=\"ms\">12<span class=\"u\">ms<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"lat3d-row us\" data-ms=\"0.3\"><div class=\"nm\">VeltrixDB<small>cache hit<\u002Fsmall><\u002Fdiv><div class=\"lat3d-bay\"><div class=\"lat3d-pkt us\"><\u002Fdiv><\u002Fdiv><div class=\"ms\">0.3<span class=\"u\">ms<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lat3d-foot\">In the time it takes Cassandra to return <b>one<\u002Fb> read, VeltrixDB has already returned <b>~266<\u002Fb>. That's not a benchmark trick — it's the difference between a UI that feels alive and one that hangs.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ GLOBE / GLOBAL CLUSTER ============ -->\n<section id=\"globe\" class=\"globe-sec\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap globe-grid\">\n    <div class=\"globe-copy\">\n      <span class=\"eyebrow\">Global topology<\u002Fspan>\n      <h2 class=\"sh\">One cluster, <span class=\"em\">every region<\u002Fspan>.<\u002Fh2>\n      <p class=\"sh-sub\">Replicas in 9+ regions, replicating in real time over QUIC. Read from the closest. Write anywhere. Recover from anything.<\u002Fp>\n      <div class=\"globe-stats\">\n        <div class=\"gs\"><div class=\"gv\">9+<\u002Fdiv><div class=\"gl\">Regions<\u002Fdiv><\u002Fdiv>\n        <div class=\"gs\"><div class=\"gv\">&lt;40<sub>ms<\u002Fsub><\u002Fdiv><div class=\"gl\">Cross-region replication<\u002Fdiv><\u002Fdiv>\n        <div class=\"gs\"><div class=\"gv\">3×<\u002Fdiv><div class=\"gl\">Multi-region durability<\u002Fdiv><\u002Fdiv>\n        <div class=\"gs\"><div class=\"gv\">QUIC<\u002Fdiv><div class=\"gl\">Transport<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"globe-hint mono\">↻ drag to rotate · auto-spinning<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"globe-stage\" id=\"globe3d\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SCROLL COMPONENT FLOW (REPLACED) ============ -->\n\n<!-- ============ PATH FLOW: WRITE / READ / DELETE ============ -->\n<section id=\"flow\" class=\"pathflow-sec\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Component flow<\u002Fspan>\n    <h2 class=\"sh\">One engine, <span class=\"em\">three paths<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Watch a single operation travel through the system. Switch between write, read, and delete to see how each takes a different route through the same components.<\u002Fp>\n\n    <div class=\"pathflow-wrap\">\n      <div class=\"pathflow-head\">\n        <div class=\"pathflow-tabs\" id=\"pfTabs\">\n          <button class=\"active\" data-path=\"write\">› Write<\u002Fbutton>\n          <button data-path=\"read\">› Read<\u002Fbutton>\n          <button data-path=\"delete\">› Delete<\u002Fbutton>\n        <\u002Fdiv>\n        <span class=\"pathflow-meta\" id=\"pfMeta\">veltrixdb · single-key write · tcp binary<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pathflow-body\">\n        <div class=\"pathflow-stage\" id=\"pf3d\"><\u002Fdiv>\n        <div class=\"pathflow-info\">\n          <span class=\"pf-num\" id=\"pfNum\">Path 01 / 03 — Durable write<\u002Fspan>\n          <h3 id=\"pfTitle\">Value lands on NVMe <span class=\"em\">before ack<\u002Fspan>.<\u002Fh3>\n          <p id=\"pfDesc\">Group-commit WAL batches concurrent writes into a single fsync. The value goes straight to the VLog via O_DIRECT — the index keeps only a 24-byte pointer. Zero write amplification.<\u002Fp>\n          <div class=\"pathflow-steps\" id=\"pfSteps\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pathflow-foot\">\n        <span>End-to-end · P99<\u002Fspan>\n        <span class=\"total\" id=\"pfTotal\"><span class=\"acc\">~0.2<\u002Fspan> ms<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DUEL ============ -->\n<section id=\"duel\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Live duel<\u002Fspan>\n    <h2 class=\"sh\">Real-time performance <span class=\"em\">head to head<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">Simulated workload: 70% reads, 30% writes, 1M key space, 128-byte values. Counters update live.<\u002Fp>\n\n    <div class=\"duel\">\n      <div class=\"duel-card us\">\n        <h4>VeltrixDB <span class=\"pin\">RECOMMENDED<\u002Fspan><\u002Fh4>\n        <div class=\"duel-row\">\n          <div class=\"k\">Throughput<\u002Fdiv>\n          <div class=\"v acc\"><span id=\"usOps\">0<\u002Fspan> <span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:4px\">ops/s<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\">↑ 16× faster reads<\u002Fdiv>\n          <svg class=\"spark\" id=\"usSpark\" viewBox=\"0 0 200 46\" preserveAspectRatio=\"none\"><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"duel-row\">\n          <div class=\"k\">P99 read latency<\u002Fdiv>\n          <div class=\"v acc\"><span id=\"usLat\">0.0<\u002Fspan><span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:4px\">ms<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\">stable · no spikes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"duel-vs\"><i>vs<\u002Fi><span class=\"vs-line\"><\u002Fspan><\u002Fdiv>\n\n      <div class=\"duel-card\">\n        <h4>Legacy DB <span class=\"legacy-pin\">CONTROL<\u002Fspan><\u002Fh4>\n        <div class=\"duel-row\">\n          <div class=\"k\">Throughput<\u002Fdiv>\n          <div class=\"v\"><span id=\"lgOps\">0<\u002Fspan> <span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:4px\">ops/s<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\" style=\"color:#C8C0AE\">⚠ compaction spikes detected<\u002Fdiv>\n          <svg class=\"spark\" id=\"lgSpark\" viewBox=\"0 0 200 46\" preserveAspectRatio=\"none\"><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"duel-row\">\n          <div class=\"k\">P99 read latency<\u002Fdiv>\n          <div class=\"v\"><span id=\"lgLat\">0.0<\u002Fspan><span style=\"font-size:14px;font-family:var(--mono);color:var(--ink-3);margin-left:4px\">ms<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\">spikes during writes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"duel-foot\">\n      <div class=\"cell\">\n        <div class=\"k\">Write amplification<\u002Fdiv>\n        <div class=\"v\">1.0×<span class=\"vs\">vs 6.2× legacy<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"k\">Cache hit rate<\u002Fdiv>\n        <div class=\"v\">94.2%<span class=\"vs\">vs 61% legacy<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"k\">Infra cost<\u002Fdiv>\n        <div class=\"v\">3.4×<span class=\"vs\">cheaper vs DynamoDB<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ USE CASES ============ -->\n<section id=\"usecases\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Who uses it<\u002Fspan>\n    <h2 class=\"sh\">Built for teams where <span class=\"em\">speed is a feature<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">If your users notice latency and your team notices the bill, this was built for you.<\u002Fp>\n\n    <div class=\"cases\">\n      <div class=\"case\">\n        <div class=\"cap\">01 — E-commerce &amp; flash sales<\u002Fdiv>\n        <h3>Black Friday spikes <span class=\"em\">without 10×-ing your bill<\u002Fspan>.<\u002Fh3>\n        <p>Product catalogs, inventory counts, session state, and cart data — serving millions of concurrent users. VeltrixDB absorbs the spike on fixed infrastructure.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Sessions<\u002Fspan><span class=\"chip\">Inventory<\u002Fspan><span class=\"chip\">Carts<\u002Fspan><span class=\"chip\">Pricing<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">02 — Gaming &amp; real-time<\u002Fdiv>\n        <h3>Sub-5ms across <span class=\"em\">millions of concurrent players<\u002Fspan>.<\u002Fh3>\n        <p>Player scores, match state, achievements, and friend lists need millisecond reads. Leaderboards stay live; matchmaking stays honest.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Leaderboards<\u002Fspan><span class=\"chip\">Player state<\u002Fspan><span class=\"chip\">Matchmaking<\u002Fspan><span class=\"chip\">Presence<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">03 — Fintech &amp; payments<\u002Fdiv>\n        <h3>Deterministic latency, <span class=\"em\">even mid write-burst<\u002Fspan>.<\u002Fh3>\n        <p>Fraud scoring, rate limiting, and balance lookups need predictable &lt;5ms reads. Risk decisions don't degrade under load.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Fraud detection<\u002Fspan><span class=\"chip\">Rate limits<\u002Fspan><span class=\"chip\">Balances<\u002Fspan><span class=\"chip\">Idempotency<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"case\">\n        <div class=\"cap\">04 — AI / ML feature stores<\u002Fdiv>\n        <h3>Hot features stay <span class=\"em\">hot<\u002Fspan>.<\u002Fh3>\n        <p>Model serving pipelines look up thousands of user features in real time. The 256 GB intelligent cache keeps your hottest features resident.<\u002Fp>\n        <div class=\"chips\"><span class=\"chip\">Feature lookup<\u002Fspan><span class=\"chip\">Embeddings<\u002Fspan><span class=\"chip\">Online inference<\u002Fspan><span class=\"chip\">Vector ids<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW IT WORKS ============ -->\n<section id=\"how\" style=\"border-top:1px solid var(--line)\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">How it works<\u002Fspan>\n    <h2 class=\"sh\">Fast, simple, <span class=\"em\">and it just works<\u002Fspan>.<\u002Fh2>\n    <p class=\"sh-sub\">All the complexity is hidden. You write data. You read data. At any scale. Without weekend on-call incidents.<\u002Fp>\n\n    <div class=\"how\">\n      <div class=\"how-tabs\" role=\"tablist\">\n        <button class=\"how-tab active\" data-tab=\"write\">› Write path<\u002Fbutton>\n        <button class=\"how-tab\" data-tab=\"hit\">› Read · cache hit<\u002Fbutton>\n        <button class=\"how-tab\" data-tab=\"miss\">› Read · NVMe miss<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"how-body\">\n        <div class=\"flow\" id=\"flow-write\">\n          <div class=\"node\"><div class=\"ic\">💻<\u002Fdiv><div class=\"nm\">Your app<\u002Fdiv><div class=\"sub\">TCP binary<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">📝<\u002Fdiv><div class=\"nm\">WAL<\u002Fdiv><div class=\"sub\">group commit<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node us\"><div class=\"ic\">⚡<\u002Fdiv><div class=\"nm\">NVMe VLog<\u002Fdiv><div class=\"sub\">O_DIRECT<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">🗂️<\u002Fdiv><div class=\"nm\">Index shard<\u002Fdiv><div class=\"sub\">1024 parallel<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">🧠<\u002Fdiv><div class=\"nm\">LIRS cache<\u002Fdiv><div class=\"sub\">value-aware<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow\" id=\"flow-hit\" style=\"display:none\">\n          <div class=\"node\"><div class=\"ic\">💻<\u002Fdiv><div class=\"nm\">Your app<\u002Fdiv><div class=\"sub\">TCP binary<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node us\"><div class=\"ic\">🧠<\u002Fdiv><div class=\"nm\">LIRS cache<\u002Fdiv><div class=\"sub\">256GB · hit<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">💻<\u002Fdiv><div class=\"nm\">Response<\u002Fdiv><div class=\"sub\">zero disk I/O<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow\" id=\"flow-miss\" style=\"display:none\">\n          <div class=\"node\"><div class=\"ic\">💻<\u002Fdiv><div class=\"nm\">Your app<\u002Fdiv><div class=\"sub\">TCP binary<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">🧠<\u002Fdiv><div class=\"nm\">LIRS cache<\u002Fdiv><div class=\"sub\">miss<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">🗂️<\u002Fdiv><div class=\"nm\">Index shard<\u002Fdiv><div class=\"sub\">VLog pointer<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node us\"><div class=\"ic\">💿<\u002Fdiv><div class=\"nm\">io_uring<\u002Fdiv><div class=\"sub\">SQPOLL · O_DIRECT<\u002Fdiv><\u002Fdiv>\n          <div class=\"arrow-h\">──▶<\u002Fdiv>\n          <div class=\"node\"><div class=\"ic\">💻<\u002Fdiv><div class=\"nm\">Response<\u002Fdiv><div class=\"sub\">+ warm cache<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"how-foot\">\n          <div>\n            <div class=\"lat\" id=\"howLat\">~0.2ms<\u002Fdiv>\n            <div class=\"lat-l\">end-to-end<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"desc\" id=\"howDesc\">\n            Value bytes go <b>directly to VLog<\u002Fb> — the index only stores a 24-byte pointer. <code> ass=\"pr\">$ <\u002Fspan><span class=\"cmd\">helm repo add veltrixdb https://charts.veltrixdb.com<\u002Fspan><\u002Fdiv>\n          <div class=\"term-out\">\"veltrixdb\" has been added to your repositories<\u002Fdiv>\n          <div class=\"term-line\" style=\"margin-top:14px\"><span class=\"pr\">$ <\u002Fspan><span class=\"cmd\">helm install <b>veltrixdb<\u002Fb> veltrixdb/veltrixdb \\<br>&nbsp;&nbsp;&nbsp;&nbsp;--namespace veltrixdb --create-namespace<\u002Fspan><\u002Fdiv>\n          <div class=\"term-out\" style=\"margin-top:10px\">\n            <span class=\"ok\">✓<\u002Fspan> StorageClass · veltrixdb-nvme<br>\n            <span class=\"ok\">✓<\u002Fspan> StatefulSet · 3 replicas, anti-affinity<br>\n            <span class=\"ok\">✓<\u002Fspan> ServiceMonitor · 50+ metrics<br>\n            <span class=\"ok\">✓<\u002Fspan> PodDisruptionBudget · minAvailable 2<br>\n            <span class=\"ok\">✓<\u002Fspan> Ready in <b style=\"color:var(--accent)\">94s<\u002Fb>\n          <\u002Fdiv>\n          <div class=\"term-line\" style=\"margin-top:14px\"><span class=\"pr\">$ <\u002Fspan><span class=\"cursor\"><\u002Fspan><span class=\"term-cursor\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"deploy-pills\">\n      <div class=\"dp\"><div class=\"nm\">⎈ Kubernetes-native<\u002Fdiv><div class=\"sub\">StatefulSet · anti-affinity · PDB<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">⚓ Helm chart<\u002Fdiv><div class=\"sub\">one command · full values.yaml<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">🤖 K8s operator<\u002Fdiv><div class=\"sub\">auto-scale · reshard · self-heal<\u002Fdiv><\u002Fdiv>\n      <div class=\"dp\"><div class=\"nm\">📊 Prometheus + Grafana<\u002Fdiv><div class=\"sub\">50+ metrics · alerts · dashboards<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section class=\"cta\">\n  <div class=\"wrap cta-in
