t(0x8C7A4E, 0.35); warm.position.set(0,-5,4); scene.add(warm);\n\n  // --- soft glow halo sprite (canvas radial gradient) ---\n  function makeHaloTexture(hex){\n    const c = document.createElement('canvas'); c.width=c.height=128;\n    const g = c.getContext('2d');\n    const h = '#' + hex.toString(16).padStart(6,'0');\n    const grad = g.createRadialGradient(64,64,0,64,64,64);\n    grad.addColorStop(0, h+'cc');\n    grad.addColorStop(0.4, h+'33');\n    grad.addColorStop(1, h+'00');\n    g.fillStyle = grad; g.fillRect(0,0,128,128);\n    const tex = new THREE.CanvasTexture(c); tex.needsUpdate=true;\n    return tex;\n  }\n  const haloBlue = makeHaloTexture(0x3D6FA0);\n  const haloGold = makeHaloTexture(0x8C7A4E);\n\n  const objects = [];\n  function shape(geom, opt){\n    const grp = new THREE.Group();\n    const bodyMat = new THREE.MeshPhysicalMaterial({\n      color: opt.color ?? 0x3D6FA0,\n      metalness: 0.25, roughness: 0.45,\n      transparent: true, opacity: opt.bodyOp ?? 0.16,\n      clearcoat: 0.6, clearcoatRoughness: 0.35,\n      side: THREE.DoubleSide\n    });\n    const body = new THREE.Mesh(geom, bodyMat); grp.add(body);\n    const wire = new THREE.LineSegments(\n      new THREE.WireframeGeometry(geom),\n      new THREE.LineBasicMaterial({ color: opt.wire ?? 0x2A547F, transparent: true, opacity: opt.wireOp ?? 0.62 })\n    );\n    grp.add(wire);\n    // halo\n    const halo = new THREE.Sprite(new THREE.SpriteMaterial({\n      map: opt.warm ? haloGold : haloBlue,\n      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity: opt.glow ?? 0.55\n    }));\n    const hs = (opt.s ?? 1) * (opt.haloS ?? 3.4);\n    halo.scale.set(hs, hs, 1);\n    grp.add(halo);\n    grp.position.set(opt.x ?? 0, opt.y ?? 0, opt.z ?? 0);\n    grp.scale.setScalar(opt.s ?? 1);\n    grp.userData = {\n      base:{x:grp.position.x,y:grp.position.y,z:grp.position.z},\n      rotS:{x:(Math.random()-.5)*0.006, y:(Math.random()-.5)*0.008, z:(Math.random()-.5)*0.003},\n      bobAmp: 0.25 + Math.random()*0.30,\n      bobSpd: 0.3 + Math.random()*0.45,\n      bobPh: Math.random()*Math.PI*2,\n      px: 0.3 + Math.random()*0.7,\n      isAnchor: opt.anchor || false\n    };\n    scene.add(grp); objects.push(grp);\n    return grp;\n  }\n\n  if (preset === 'hero'){\n    shape(new THREE.IcosahedronGeometry(1.15, 0), {x:-3.8, y:0.6, z:0,    color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.TorusKnotGeometry(0.6, 0.18, 80, 12, 2, 3), {x:3.4, y:1.2, z:-1, color:0x6B7A92, wire:0x3D6FA0, anchor:true, haloS:3.6});\n    shape(new THREE.OctahedronGeometry(0.78, 0), {x:3.0, y:-1.7, z:0.4,   color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.BoxGeometry(1.0, 1.0, 1.0),  {x:-2.7, y:-1.7, z:0.6,  color:0x8C7A4E, wire:0x6B5E3C, anchor:true, warm:true});\n    shape(new THREE.TetrahedronGeometry(0.72, 0),{x:0.4, y:2.5, z:-1.2,   color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.DodecahedronGeometry(0.55, 0),{x:1.6, y:-2.9, z:0.5,  color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.IcosahedronGeometry(0.32, 0),{x:-5.4, y:-2.6, z:-2,   color:0x3D6FA0, wire:0x2A547F, glow:0.4});\n    shape(new THREE.OctahedronGeometry(0.30, 0), {x:5.6, y:-2.8, z:-2.5,  color:0x6B7A92, wire:0x3D6FA0, glow:0.4});\n  } else {\n    shape(new THREE.IcosahedronGeometry(1.0, 0),  {x:-5.5, y:1.2, z:-1,   color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.TorusKnotGeometry(0.4, 0.14, 64, 10, 2, 3), {x:5.3, y:-0.4, z:-1, color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.OctahedronGeometry(0.62, 0),  {x:4.4, y:1.9, z:0,     color:0x6B7A92, wire:0x3D6FA0, anchor:true});\n    shape(new THREE.BoxGeometry(0.78,0.78,0.78),  {x:-4.5, y:-1.5, z:0.3, color:0x8C7A4E, wire:0x6B5E3C, anchor:true, warm:true});\n    shape(new THREE.DodecahedronGeometry(0.5,0),  {x:0.2, y:2.3, z:-1.4,  color:0x3D6FA0, wire:0x2A547F, anchor:true});\n    shape(new THREE.TetrahedronGeometry(0.55,0),  {x:-0.4, y:-2.4, z:0.6, color:0x3D6FA0, wire:0x2A547F, anchor:true});\n  }\n\n  // --- particle starfield (depth) ---\n  const starCount = preset === 'hero' ? 320 : 200;\n  const starGeo = new THREE.BufferGeometry();\n  const starPos = new Float32Array(starCount*3);\n  for (let i=0;i<starCount;i++){\n    starPos[i*3+0] = (Math.random()-0.5)*30;\n    starPos[i*3+1] = (Math.random()-0.5)*16;\n    starPos[i*3+2] = -6 + Math.random()*-12;\n  }\n  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));\n  const starMat = new THREE.PointsMaterial({\n    color: 0x3D6FA0, size: 0.05, transparent:true, opacity:0.6,\n    sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending\n  });\n  const stars = new THREE.Points(starGeo, starMat);\n  scene.add(stars);\n\n  // --- constellation lines connecting anchors (recomputed each frame) ---\n  const anchors = objects.filter(o => o.userData.isAnchor);\n  const maxPairs = anchors.length * (anchors.length-1) / 2;\n  const lineGeo = new THREE.BufferGeometry();\n  const linePos = new Float32Array(maxPairs * 6);\n  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));\n  const lineMat = new THREE.LineBasicMaterial({\n    color: 0x3D6FA0, transparent:true, opacity:0.18, blending:THREE.AdditiveBlending, depthWrite:false\n  });\n  const lines = new THREE.LineSegments(lineGeo, lineMat);\n  scene.add(lines);\n\n  // --- data packet pulses traveling along constellation edges ---\n  const pulseCount = preset === 'hero' ? 8 : 5;\n  const pulses = [];\n  for (let i=0;i<pulseCount;i++){\n    const sp = new THREE.Sprite(new THREE.SpriteMaterial({\n      map: haloBlue, transparent:true, blending:THREE.AdditiveBlending,\n      depthWrite:false, opacity:0.95\n    }));\n    sp.scale.set(0.6,0.6,1);\n    scene.add(sp);\n    pulses.push({ sp, a:0, b:1, t:Math.random(), spd: 0.18 + Math.random()*0.2 });\n  }\n  function reseedPulse(p){\n    if (anchors.length < 2) return;\n    p.a = (Math.random()*anchors.length)|0;\n    do { p.b = (Math.random()*anchors.length)|0; } while (p.b === p.a);\n    p.t = 0;\n    p.spd = 0.18 + Math.random()*0.22;\n  }\n  pulses.forEach(reseedPulse);\n\n  let mx=0, my=0, scrollY=0;\n  el.parentElement && el.parentElement.addEventListener('mousemove', (e)=>{\n    const r = el.getBoundingClientRect();\n    mx = ((e.clientX - r.left)/r.width - 0.5);\n    my = ((e.clientY - r.top)/r.height - 0.5);\n  });\n  window.addEventListener('scroll', ()=>{ scrollY = window.scrollY; }, {passive:true});\n  window.addEventListener('resize', ()=>{ renderer.setSize(W(),H()); camera.aspect=W()/H(); camera.updateProjectionMatrix(); });\n\n  let raf, t0 = performance.now(), running=true;\n  const tmpA = new THREE.Vector3(), tmpB = new THREE.Vector3();\n  function loop(){\n    const t = (performance.now() - t0)*0.001;\n    objects.forEach(g=>{\n      const u = g.userData;\n      g.rotation.x += u.rotS.x; g.rotation.y += u.rotS.y; g.rotation.z += u.rotS.z;\n      g.position.y = u.base.y + Math.sin(t*u.bobSpd + u.bobPh)*u.bobAmp;\n      g.position.x = u.base.x + mx*u.px*0.5 + Math.cos(t*u.bobSpd*0.5 + u.bobPh)*u.bobAmp*0.4;\n      g.position.z = u.base.z + my*u.px*0.4;\n    });\n\n    // refresh constellation positions every frame\n    let pi = 0;\n    for (let i=0;i<anchors.length;i++){\n      for (let j=i+1;j<anchors.length;j++){\n        const a = anchors[i].position, b = anchors[j].position;\n        const dist = a.distanceTo(b);\n        if (dist < 6.5){\n          linePos[pi++] = a.x; linePos[pi++] = a.y; linePos[pi++] = a.z;\n          linePos[pi++] = b.x; linePos[pi++] = b.y; linePos[pi++] = b.z;\n        }\n      }\n    }\n    // hide unused segments by zeroing\n    while (pi < linePos.length){ linePos[pi++] = 0; }\n    lineGeo.attributes.position.needsUpdate = true;\n    lineGeo.setDrawRange(0, (pi/3));\n\n    // update pulses traveling along edges\n    pulses.forEach(p=>{\n      p.t += 0.016 * p.spd;\n      if (p.t >= 1){ reseedPulse(p); }\n      if (anchors[p.a] && anchors[p.b]){\n        tmpA.copy(anchors[p.a].position);\n        tmpB.copy(anchors[p.b].position);\n        p.sp.position.lerpVectors(tmpA, tmpB, p.t);\n        const fade = Math.sin(p.t * Math.PI);\n        p.sp.material.opacity = fade;\n        p.sp.scale.setScalar(0.4 + fade*0.7);\n      }\n    });\n\n    // gentle starfield rotation\n    stars.rotation.y += 0.0006;\n    stars.rotation.x += 0.0003;\n\n    // scroll-tied parallax: hero scene drifts as user scrolls\n    const scrollOffset = preset === 'hero' ? Math.min(scrollY*0.0008, 1.5) : 0;\n    camera.position.x += (mx*0.7 - camera.position.x)*0.05;\n    camera.position.y += (-my*0.4 - scrollOffset - camera.position.y)*0.05;\n    camera.lookAt(0, -scrollOffset*0.3, 0);\n\n    renderer.render(scene,camera);\n    if (running) raf = requestAnimationFrame(loop);\n  }\n  loop();\n  document.addEventListener('visibilitychange', ()=>{\n    running = !document.hidden;\n    if (!document.hidden) loop();\n    else cancelAnimationFrame(raf);\n  });\n}\n\n/* ============ Globe section: rotating wireframe Earth + arcs ============ */\nfunction makeGlobeScene(){\n  const el = document.getElementById('globe3d');\n  if (!el || !window.THREE) return;\n  const W = () => el.clientWidth, H = () => Math.max(el.clientHeight, 420);\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(40, W()/H(), 0.1, 100);\n  camera.position.set(0, 0.4, 6.4);\n  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(W(), H());\n  renderer.setClearColor(0x000000, 0);\n  el.appendChild(renderer.domElement);\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.55));\n  const dl = new THREE.DirectionalLight(0xffffff, 1.0); dl.position.set(3,4,5); scene.add(dl);\n  const rim2 = new THREE.DirectionalLight(0x3D6FA0, 0.9); rim2.position.set(-3,-2,2); scene.add(rim2);\n\n  const root = new THREE.Group(); scene.add(root);\n\n  // inner translucent sphere\n  const inner = new THREE.Mesh(\n    new THREE.SphereGeometry(1.6, 48, 36),\n    new THREE.MeshPhysicalMaterial({ color:0x3D6FA0, metalness:0.2, roughness:0.4, transparent:true, opacity:0.10, clearcoat:0.6 })\n  );\n  root.add(inner);\n\n  // wireframe globe (lat/long lines)\n  const wireGeo = new THREE.SphereGeometry(1.62, 36, 24);\n  const wire = new THREE.LineSegments(\n    new THREE.WireframeGeometry(wireGeo),\n    new THREE.LineBasicMaterial({ color:0x3D6FA0, transparent:true, opacity:0.32 })\n  );\n  root.add(wire);\n\n  // dotted-surface \"land\" — random points on sphere\n  const dotCount = 1200;\n  const dotPos = new Float32Array(dotCount*3);\n  for (let i=0;i<dotCount;i++){\n    const u = Math.random(), v = Math.random();\n    const phi = Math.acos(2*v - 1), theta = 2*Math.PI*u;\n    const r = 1.66;\n    dotPos[i*3+0] = r * Math.sin(phi)*Math.cos(theta);\n    dotPos[i*3+1] = r * Math.cos(phi);\n    dotPos[i*3+2] = r * Math.sin(phi)*Math.sin(theta);\n  }\n  const dotGeo = new THREE.BufferGeometry();\n  dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));\n  const dots = new THREE.Points(dotGeo, new THREE.PointsMaterial({\n    color:0x2A547F, size:0.024, transparent:true, opacity:0.85, depthWrite:false, sizeAttenuation:true\n  }));\n  root.add(dots);\n\n  // city node markers (clusters / regions)\n  const cities = [\n    {lat: 37.78, lon:-122.42, label:'us-west'},\n    {lat: 40.71, lon: -74.00, label:'us-east'},\n    {lat: 51.50, lon:  -0.12, label:'eu-west'},\n    {lat: 50.11, lon:   8.68, label:'eu-central'},\n    {lat: 19.07, lon:  72.87, label:'ap-mumbai'},\n    {lat:  1.35, lon: 103.81, label:'ap-southeast'},\n    {lat: 35.68, lon: 139.69, label:'ap-tokyo'},\n    {lat:-33.86, lon: 151.20, label:'ap-sydney'},\n    {lat:-23.55, lon: -46.63, label:'sa-east'}\n  ];\n  function latLonToVec(lat, lon, r=1.66){\n    const phi = (90 - lat) * Math.PI/180;\n    const theta = (lon + 180) * Math.PI/180;\n    return new THREE.Vector3(\n      -r * Math.sin(phi)*Math.cos(theta),\n       r * Math.cos(phi),\n       r * Math.sin(phi)*Math.sin(theta)\n    );\n  }\n  function makeMarkerHalo(hex){\n    const c = document.createElement('canvas'); c.width=c.height=64;\n    const g = c.getContext('2d');\n    const grad = g.createRadialGradient(32,32,0,32,32,32);\n    grad.addColorStop(0,'#'+hex.toString(16).padStart(6,'0')+'ff');\n    grad.addColorStop(0.45,'#'+hex.toString(16).padStart(6,'0')+'66');\n    grad.addColorStop(1,'#'+hex.toString(16).padStart(6,'0')+'00');\n    g.fillStyle = grad; g.fillRect(0,0,64,64);\n    return new THREE.CanvasTexture(c);\n  }\n  const cityHalo = makeMarkerHalo(0x3D6FA0);\n  const cityHaloGold = makeMarkerHalo(0x8C7A4E);\n  const cityNodes = [];\n  cities.forEach((c, i) => {\n    const v = latLonToVec(c.lat, c.lon);\n    const dot = new THREE.Mesh(\n      new THREE.SphereGeometry(0.035, 12, 10),\n      new THREE.MeshBasicMaterial({ color: i%4===0 ? 0x8C7A4E : 0x3D6FA0 })\n    );\n    dot.position.copy(v); root.add(dot);\n    const halo = new THREE.Sprite(new THREE.SpriteMaterial({\n      map: i%4===0 ? cityHaloGold : cityHalo,\n      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.9\n    }));\n    halo.scale.set(0.32,0.32,1); halo.position.copy(v);\n    root.add(halo);\n    cityNodes.push({ pos:v, halo, base:0.32 });\n  });\n\n  // arcs between random city pairs\n  const arcGroup = new THREE.Group(); root.add(arcGroup);\n  function makeArc(a, b){\n    const mid = a.clone().add(b).multiplyScalar(0.5);\n    mid.normalize().multiplyScalar(2.6 + Math.random()*0.4);\n    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);\n    const pts = curve.getPoints(40);\n    const geo = new THREE.BufferGeometry().setFromPoints(pts);\n    const mat = new THREE.LineBasicMaterial({\n      color: Math.random()<0.3 ? 0x8C7A4E : 0x3D6FA0,\n      transparent:true, opacity:0.0, blending:THREE.AdditiveBlending, depthWrite:false\n    });\n    const line = new THREE.Line(geo, mat);\n    line.userData = { curve, life: 0, dur: 1.6 + Math.random()*1.2, packet:null };\n    arcGroup.add(line);\n\n    // traveling packet\n    const pkt = new THREE.Sprite(new THREE.SpriteMaterial({\n      map: cityHalo, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.0\n    }));\n    pkt.scale.set(0.22,0.22,1);\n    arcGroup.add(pkt);\n    line.userData.packet = pkt;\n    return line;\n  }\n  let arcs = [];\n  function spawnArc(){\n    if (arcs.length > 14) return;\n    const i = (Math.random()*cities.length)|0;\n    let j; do { j = (Math.random()*cities.length)|0; } while(j===i);\n    arcs.push(makeArc(cityNodes[i].pos, cityNodes[j].pos));\n  }\n  for (let k=0;k<6;k++) spawnArc();\n\n  // mouse drag to spin\n  let drag=false, lastX=0, lastY=0, vy=0.0035, vx=0.0008;\n  let mxR=0, myR=0;\n  el.addEventListener('mousedown', e=>{ drag=true; lastX=e.clientX; lastY=e.clientY; });\n  window.addEventListener('mouseup', ()=>{ drag=false; });\n  window.addEventListener('mousemove', e=>{\n    const r = el.getBoundingClientRect();\n    mxR = ((e.clientX - r.left)/r.width - 0.5);\n    myR = ((e.clientY - r.top)/r.height - 0.5);\n    if (drag){\n      const dx = e.clientX - lastX, dy = e.clientY - lastY;\n      root.rotation.y += dx * 0.005;\n      root.rotation.x += dy * 0.003;\n      lastX=e.clientX; lastY=e.clientY;\n    }\n  });\n  window.addEventListener('resize', ()=>{ renderer.setSize(W(),H()); camera.aspect=W()/H(); camera.updateProjectionMatrix(); });\n\n  let raf, t0 = performance.now(), spawnT=0, running=true;\n  function loop(){\n    const t = (performance.now() - t0)*0.001;\n    if (!drag){\n      root.rotation.y += vy;\n      root.rotation.x += Math.sin(t*0.2)*0.0006;\n    }\n\n    // pulse city halos\n    cityNodes.forEach((n,i)=>{\n      const k = 0.32 + Math.sin(t*1.4 + i)*0.12;\n      n.halo.scale.set(k,k,1);\n    });\n\n    // arcs lifecycle\n    arcs.forEach(a => {\n      a.userData.life += 0.016;\n      const u = a.userData.life / a.userData.dur;\n      if (u < 0.5) a.material.opacity = u*2 * 0.85;\n      else a.material.opacity = (1 - (u-0.5)*2) * 0.85;\n      // packet\n      const pktU = Math.min(u*1.4, 1);\n      const p = a.userData.curve.getPoint(pktU);\n      a.userData.packet.position.copy(p);\n      a.userData.packet.material.opacity = Math.sin(u*Math.PI);\n    });\n    // remove dead, spawn new\n    arcs = arcs.filter(a => {\n      if (a.userData.life > a.userData.dur){\n        arcGroup.remove(a); arcGroup.remove(a.userData.packet);\n        return false;\n      }\n      return true;\n    });\n    spawnT += 0.016;\n    if (spawnT > 0.45){ spawnT = 0; spawnArc(); }\n\n    // camera subtle parallax\n    camera.position.x += (mxR*0.5 - camera.position.x)*0.04;\n    camera.position.y += (0.4 - myR*0.3 - camera.position.y)*0.04;\n    camera.lookAt(0,0,0);\n\n    renderer.render(scene,camera);\n    if (running) raf = requestAnimationFrame(loop);\n  }\n  loop();\n  document.addEventListener('visibilitychange', ()=>{\n    running = !document.hidden;\n    if (!document.hidden) loop(); else cancelAnimationFrame(raf);\n  });\n}\n\n/* ============ Scroll-driven component flow ============ */\nfunction makeFlowScene(){\n  const el = document.getElementById('pf3d');\n  if (!el || !window.THREE) return;\n  const W = () => el.clientWidth, H = () => el.clientHeight;\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(40, W()/H(), 0.1, 100);\n  camera.position.set(0, 0.4, 8.6);\n  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(W(), H());\n  renderer.setClearColor(0x000000, 0);\n  el.appendChild(renderer.domElement);\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.55));\n  const dl = new THREE.DirectionalLight(0xffffff, 0.95); dl.position.set(4,5,5); scene.add(dl);\n  const rim = new THREE.DirectionalLight(0x3D6FA0, 0.7); rim.position.set(-4,-2,3); scene.add(rim);\n\n  function halo(hex){\n    const c=document.createElement('canvas'); c.width=c.height=128;\n    const g=c.getContext('2d');\n    const h='#'+hex.toString(16).padStart(6,'0');\n    const grad=g.createRadialGradient(64,64,0,64,64,64);\n    grad.addColorStop(0,h+'cc'); grad.addColorStop(0.45,h+'33'); grad.addColorStop(1,h+'00');\n    g.fillStyle=grad; g.fillRect(0,0,128,128);\n    return new THREE.CanvasTexture(c);\n  }\n  const haloBlue = halo(0x3D6FA0), haloGold = halo(0x8C7A4E), haloRed = halo(0xB85A48);\n\n  // 5 nodes laid out in a fan\n  const nodeDefs = [\n    { id:'app',   x:-5.2, y:0.0,  geom:new THREE.IcosahedronGeometry(0.62,0), color:0x3D6FA0, label:'App' },\n    { id:'wal',   x:-2.6, y:1.0,  geom:new THREE.BoxGeometry(0.95,0.95,0.95), color:0x8C7A4E, label:'WAL', warm:true },\n    { id:'vlog',  x:0,    y:-0.6, geom:new THREE.OctahedronGeometry(0.78,0),  color:0x3D6FA0, label:'VLog' },\n    { id:'index', x:2.6,  y:1.0,  geom:new THREE.TetrahedronGeometry(0.78,0), color:0x6B7A92, label:'Index' },\n    { id:'cache', x:5.2,  y:0.0,  geom:new THREE.DodecahedronGeometry(0.62,0),color:0x3D6FA0, label:'Cache' }\n  ];\n  const nodeMap = {};\n  const nodes = nodeDefs.map((d,i)=>{\n    const grp = new THREE.Group();\n    const body = new THREE.Mesh(d.geom, new THREE.MeshPhysicalMaterial({\n      color:d.color, metalness:0.25, roughness:0.45, transparent:true, opacity:0.18, clearcoat:0.6\n    }));\n    grp.add(body);\n    const wire = new THREE.LineSegments(\n      new THREE.WireframeGeometry(d.geom),\n      new THREE.LineBasicMaterial({ color:d.color, transparent:true, opacity:0.4 })\n    );\n    grp.add(wire);\n    const sp = new THREE.Sprite(new THREE.SpriteMaterial({\n      map: d.warm ? haloGold : haloBlue,\n      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.3\n    }));\n    sp.scale.set(2.4,2.4,1); grp.add(sp);\n    grp.position.set(d.x, d.y, 0);\n    grp.userData = { id:d.id, halo:sp, body, wire, base:{x:d.x,y:d.y}, color:d.color, warm:d.warm };\n    scene.add(grp); nodeMap[d.id] = grp; return grp;\n  });\n\n  // edges (curves) for each path; we generate dynamically\n  let pathEdges = [];\n  function clearEdges(){ pathEdges.forEach(e=>scene.remove(e.line)); pathEdges = []; }\n  function makeEdge(aId, bId, accentHex){\n    const a = nodeMap[aId].position.clone();\n    const b = nodeMap[bId].position.clone();\n    const mid = a.clone().add(b).multiplyScalar(0.5);\n    mid.y += (Math.random()*0.6 + 0.5) * (a.x < b.x ? 1 : -1) * 0.3;\n    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);\n    const pts = curve.getPoints(40);\n    const geo = new THREE.BufferGeometry().setFromPoints(pts);\n    const mat = new THREE.LineDashedMaterial({\n      color: accentHex, transparent:true, opacity:0.55, dashSize:0.18, gapSize:0.10,\n      blending:THREE.AdditiveBlending, depthWrite:false\n    });\n    const line = new THREE.Line(geo, mat);\n    line.computeLineDistances();\n    scene.add(line);\n    pathEdges.push({ line, curve });\n    return curve;\n  }\n\n  // packet sprite\n  const packet = new THREE.Sprite(new THREE.SpriteMaterial({\n    map: haloBlue, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:1\n  }));\n  packet.scale.set(0.7,0.7,1); scene.add(packet);\n  const packetCore = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 10), new THREE.MeshBasicMaterial({ color:0x3D6FA0 }));\n  scene.add(packetCore);\n\n  // path definitions\n  const PATHS = {\n    write:  { color:0x3D6FA0, hops:['app','wal','vlog','index','cache'] },\n    read:   { color:0x3D6FA0, hops:['app','cache','index','vlog','app'] },\n    delete: { color:0xB85A48, hops:['app','wal','index','vlog','cache'] }\n  };\n  let currentPath = 'write';\n  let curves = [];\n  let progress = 0;\n\n  function setPath(name){\n    currentPath = name;\n    clearEdges();\n    curves = [];\n    const def = PATHS[name];\n    const accent = def.color;\n    packet.material.map = name === 'delete' ? haloRed : haloBlue;\n    packetCore.material.color.setHex(accent);\n    for (let i=0;i<def.hops.length-1;i++){\n      curves.push(makeEdge(def.hops[i], def.hops[i+1], accent));\n    }\n    progress = 0;\n  }\n  setPath('write');\n\n  // starfield\n  const starCount = 160;\n  const sPos = new Float32Array(starCount*3);\n  for (let i=0;i<starCount;i++){\n    sPos[i*3+0] = (Math.random()-0.5)*22;\n    sPos[i*3+1] = (Math.random()-0.5)*10;\n    sPos[i*3+2] = -8 + Math.random()*-6;\n  }\n  const sGeo = new THREE.BufferGeometry();\n  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));\n  const stars = new THREE.Points(sGeo, new THREE.PointsMaterial({\n    color:0x3D6FA0, size:0.04, transparent:true, opacity:0.5, sizeAttenuation:true,\n    depthWrite:false, blending:THREE.AdditiveBlending\n  }));\n  scene.add(stars);\n\n  let mx=0, my=0;\n  el.addEventListener('mousemove', e=>{\n    const r = el.getBoundingClientRect();\n    mx = ((e.clientX - r.left)/r.width - 0.5);\n    my = ((e.clientY - r.top)/r.height - 0.5);\n  });\n  window.addEventListener('resize', ()=>{ renderer.setSize(W(),H()); camera.aspect=W()/H(); camera.updateProjectionMatrix(); });\n\n  // step UI updates\n  function syncUI(){\n    const def = PATHS[currentPath];\n    const segIdx = Math.min(curves.length-1, Math.floor(progress * curves.length));\n    const activeNodeId = def.hops[segIdx + 1];\n    nodes.forEach(g=>{\n      const u = g.userData;\n      const isActive = u.id === activeNodeId;\n      const isVisited = def.hops.indexOf(u.id) <= segIdx + 1 && def.hops.indexOf(u.id) !== -1;\n      const targetWire = isVisited ? 0.85 : 0.4;\n      u.wire.material.opacity += (targetWire - u.wire.material.opacity)*0.1;\n      const targetGlow = isActive ? 0.9 : (isVisited ? 0.55 : 0.3);\n      u.halo.material.opacity += (targetGlow - u.halo.material.opacity)*0.1;\n      const targetScale = isActive ? 1.18 : 1;\n      const ns = u.body.scale.x + (targetScale - u.body.scale.x)*0.1;\n      u.body.scale.setScalar(ns); u.wire.scale.setScalar(ns);\n    });\n    // step list\n    document.querySelectorAll('.pathflow-step').forEach((s,i)=>{\n      s.classList.toggle('active', i === segIdx);\n    });\n  }\n\n  let raf, t0=performance.now(), running=true;\n  function loop(){\n    const t = (performance.now() - t0)*0.001;\n    progress += 0.0035;\n    if (progress >= 1) progress = 0;\n\n    nodes.forEach((g,i)=>{\n      g.rotation.x += 0.005;\n      g.rotation.y += 0.007;\n      g.position.y = g.userData.base.y + Math.sin(t*0.5 + i*1.3)*0.10;\n    });\n\n    if (curves.length > 0){\n      const segCount = curves.length;\n      const segIdx = Math.min(segCount-1, Math.floor(progress * segCount));\n      const local = (progress * segCount) - segIdx;\n      const p = curves[segIdx].getPoint(local);\n      packet.position.copy(p);\n      packetCore.position.copy(p);\n      pathEdges.forEach((e,i)=>{\n        e.line.material.dashSize = 0.16 + Math.sin(t*1.2 + i)*0.04;\n        const op = i <= segIdx ? 0.7 : 0.35;\n        e.line.material.opacity += (op - e.line.material.opacity)*0.08;\n      });\n    }\n\n    syncUI();\n\n    stars.rotation.y += 0.0006;\n    camera.position.x += (mx*0.6 - camera.position.x)*0.04;\n    camera.position.y += (0.4 - my*0.3 - camera.position.y)*0.04;\n    camera.lookAt(0, 0, 0);\n\n    renderer.render(scene,camera);\n    if (running) raf = requestAnimationFrame(loop);\n  }\n  loop();\n  document.addEventListener('visibilitychange', ()=>{\n    running = !document.hidden;\n    if (!document.hidden) loop(); else cancelAnimationFrame(raf);\n  });\n\n  // step list data\n  const STEP_DATA = {\n    write: {\n      title:'Value lands on NVMe <span class=\"em\">before ack<\u002Fspan>.',\n      desc:'Group-commit WAL batches concurrent writes into a single fsync. The value goes straight to the VLog via O_DIRECT — the index keeps only a 24-byte pointer. Zero write amplification.',\n      meta:'veltrixdb · single-key write · tcp binary',\n      total:'~0.2 ms', num:'Path 01 / 03 — Durable write',\n      steps:[\n        {n:'01', label:'App → WAL', ms:'~12µs'},\n        {n:'02', label:'WAL fsync (group-commit)', ms:'~80µs'},\n        {n:'03', label:'VLog → NVMe O_DIRECT', ms:'~30µs'},\n        {n:'04', label:'Index pointer update', ms:'~8µs'},\n        {n:'05', label:'Cache warm → ack', ms:'~5µs'}\n      ]\n    },\n    read: {\n      title:'Hot keys never <span class=\"em\">touch disk<\u002Fspan>.',\n      desc:'The 256 GB LIRS cache catches 94% of reads with zero I/O. Misses fall through to the index shard, then fetch the value from VLog via io_uring SQPOLL — no syscall on the hot path.',\n      meta:'veltrixdb · single-key read · tcp binary',\n      total:'~0.3 ms', num:'Path 02 / 03 — Cached read',\n      steps:[\n        {n:'01', label:'App → Cache lookup', ms:'~10µs'},\n        {n:'02', label:'LIRS hit (94%)', ms:'~80µs'},\n        {n:'03', label:'Miss → Index shard', ms:'~20µs'},\n        {n:'04', label:'VLog read (io_uring)', ms:'~3.5ms'},\n        {n:'05', label:'Response → App', ms:'~6µs'}\n      ]\n    },\n    delete: {\n      title:'Tombstone, <span class=\"em\">no rewrite<\u002Fspan>.',\n      desc:'Deletes are logged to the WAL and marked as tombstones in the index. Values stay where they are — the next compaction sweep reclaims them. Zero write amplification on delete-heavy workloads.',\n      meta:'veltrixdb · single-key delete · tcp binary',\n      total:'~0.15 ms', num:'Path 03 / 03 — Tombstone delete',\n      steps:[\n        {n:'01', label:'App → WAL (delete log)', ms:'~12µs'},\n        {n:'02', label:'Index → tombstone', ms:'~10µs'},\n        {n:'03', label:'VLog entry queued for GC', ms:'~5µs'},\n        {n:'04', label:'Cache eviction', ms:'~4µs'},\n        {n:'05', label:'Ack to app', ms:'~6µs'}\n      ]\n    }\n  };\n  const stepsEl = document.getElementById('pfSteps');\n  const titleEl = document.getElementById('pfTitle');\n  const descEl = document.getElementById('pfDesc');\n  const metaEl = document.getElementById('pfMeta');\n  const totalEl = document.getElementById('pfTotal');\n  const numEl = document.getElementById('pfNum');\n  function renderInfo(name){\n    const d = STEP_DATA[name];\n    titleEl.innerHTML = d.title;\n    descEl.textContent = d.desc;\n    metaEl.textContent = d.meta;\n    totalEl.innerHTML = '<span class=\"acc\">'+d.total.split(' ms')[0]+'<\u002Fspan> ms';\n    numEl.textContent = d.num;\n    stepsEl.innerHTML = d.steps.map((s,i)=>(\n      '<div class=\"pathflow-step\"><span class=\"pn\">'+s.n+'<\u002Fspan><span>'+s.label+'<\u002Fspan><span class=\"pms\">'+s.ms+'<\u002Fspan><\u002Fdiv>'\n    )).join('');\n  }\n  renderInfo('write');\n\n  document.querySelectorAll('#pfTabs button').forEach(b=>{\n    b.addEventListener('click', ()=>{\n      document.querySelectorAll('#pfTabs button').forEach(x=>x.classList.remove('active'));\n      b.classList.add('active');\n      const p = b.dataset.path;\n      setPath(p);\n      renderInfo(p);\n    });\n  });\n}\n\n\n(function bootScenes(){\n  function go(){\n    try { if (typeof makeVeltrixScene === 'function') {\n      if (document.getElementById('hero3d')) makeVeltrixScene('hero3d', 'hero');\n      if (document.getElementById('cta3d'))  makeVeltrixScene('cta3d', 'cta');\n    } } catch(e){ console.warn(e); }\n    try { makeGlobeScene(); } catch(e){ console.warn(e); }\n    try { makeFlowScene();  } catch(e){ console.warn(e); }\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', go);\n  } else {\n    go();\n  }\n})();\n\n/* ===== Engine shard grid (hero) ===== */\n(function(){\n  const grid = document.getElementById('shardGrid');\n  if (!grid) return;\n  const COLS = 24, ROWS = 10, N = COLS*ROWS;\n  const cells = [];\n  for (let i=0;i<N;i++){\n    const d = document.createElement('div');\n    d.className = 'shard';\n    grid.appendChild(d);\n    cells.push(d);\n  }\n  let ops = 1.84, lat = 4.7, hit = 94.2;\n  const opsEl = document.getElementById('ops');\n  const latEl = document.getElementById('lat');\n  const hitEl = document.getElementById('hit');\n  function tick(){\n    const types = ['r','w','h'];\n    const weights = [0.55,0.25,0.20];\n    for (let k=0;k<22;k++){\n      const i = (Math.random()*N)|0;\n      const r = Math.random();\n      let t = 'r'; let acc=0;\n      for (let j=0;j<3;j++){acc+=weights[j]; if (r<acc){t=types[j];break}}\n      cells[i].className = 'shard '+t;\n      setTimeout(()=>{cells[i].className='shard'}, 420 + Math.random()*420);\n    }\n    ops = 1.74 + Math.random()*0.28;\n    lat = 4.4 + Math.random()*0.7;\n    hit = 93.5 + Math.random()*1.4;\n    if (opsEl) opsEl.textContent = ops.toFixed(2);\n    if (latEl) latEl.textContent = lat.toFixed(1);\n    if (hitEl) hitEl.textContent = hit.toFixed(1);\n  }\n  setInterval(tick, 280);\n  tick();\n})();\n\n/* ===== Latency bars: animate on viewport enter ===== */\n(function(){\n  const bars = document.querySelectorAll('.bar-fill');\n  const wrap = document.querySelector('.lat-wrap');\n  if (!wrap) return;\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      if (e.isIntersecting){\n        bars.forEach(b=>{ b.style.width = b.dataset.w + '%'; });\n        io.disconnect();\n      }\n    });\n  },{threshold:.2});\n  io.observe(wrap);\n})();\n\n/* ===== Duel sparklines + counters ===== */\n(function(){\n  const usOps = document.getElementById('usOps');\n  const lgOps = document.getElementById('lgOps');\n  const usLat = document.getElementById('usLat');\n  const lgLat = document.getElementById('lgLat');\n  const usSpark = document.getElementById('usSpark');\n  const lgSpark = document.getElementById('lgSpark');\n  const W=200,H=46;\n  const usData = Array.from({length:40},()=> 26+Math.random()*4);\n  const lgData = Array.from({length:40},()=> 14+Math.random()*4);\n\n  function path(data,smooth){\n    const max = 40, min = 0;\n    return data.map((v,i)=>{\n      const x = (i/(data.length-1))*W;\n      const y = H - ((v-min)/(max-min))*H;\n      return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);\n    }).join(' ');\n  }\n  function render(){\n    usSpark.innerHTML = `\n      <defs><linearGradient id=\"ug\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#3D6FA0\" stop-opacity=\".35\"/>\n        <stop offset=\"100%\" stop-color=\"#3D6FA0\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n      <path d=\"${path(usData)} L${W} ${H} L0 ${H} Z\" fill=\"url(#ug)\"/>\n      <path d=\"${path(usData)}\" fill=\"none\" stroke=\"#3D6FA0\" stroke-width=\"1.6\"/>`;\n    lgSpark.innerHTML = `\n      <defs><linearGradient id=\"lg\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#B85A48\" stop-opacity=\".25\"/>\n        <stop offset=\"100%\" stop-color=\"#B85A48\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n      <path d=\"${path(lgData)} L${W} ${H} L0 ${H} Z\" fill=\"url(#lg)\"/>\n      <path d=\"${path(lgData)}\" fill=\"none\" stroke=\"#B85A48\" stroke-width=\"1.6\"/>`;\n  }\n  let usO = 1820000, lgO = 112000;\n  let usL = 4.7, lgL = 76;\n  function tick(){\n    usO += (Math.random()-.4)*40000;\n    lgO += (Math.random()-.4)*8000;\n    usL = 4.4 + Math.random()*0.8;\n    // legacy spikes occasionally\n    lgL = 70 + Math.random()*12 + (Math.random()<0.12 ? 60 : 0);\n    usOps.textContent = (usO/1e6).toFixed(2)+'M';\n    lgOps.textContent = (lgO/1e3).toFixed(0)+'k';\n    usLat.textContent = usL.toFixed(1);\n    lgLat.textContent = lgL.toFixed(0);\n    usData.shift(); usData.push(26+Math.random()*4 + (Math.random()<0.05?2:0));\n    lgData.shift(); lgData.push(14+Math.random()*4 + (Math.random()<0.15?-6:0));\n    render();\n  }\n  render(); tick();\n  setInterval(tick, 1100);\n})();\n\n/* ===== How-it-works tabs ===== */\n(function(){\n  const tabs = document.querySelectorAll('.how-tab');\n  const flows = {\n    write:{el:document.getElementById('flow-write'), lat:'~0.2ms', desc:'Value bytes go <b>directly to VLog<\u002Fb> — the index only stores a 24-byte pointer. <code>Zero write amplification.<\u002Fcode>'},\n    hit:{el:document.getElementById('flow-hit'), lat:'~0.3ms', desc:'Small hot keys (≤256B) get <b>priority-2 eviction resistance<\u002Fb> — they stay cached even during large cold scans.'},\n    miss:{el:document.getElementById('flow-miss'), lat:'~4.9ms', desc:'<b>io_uring SQPOLL<\u002Fb> submits zero-syscall read requests directly to the NVMe queue — <code>no kernel context switch on the hot path.<\u002Fcode>'}\n  };\n  const lat = document.getElementById('howLat');\n  const desc = document.getElementById('howDesc');\n  tabs.forEach(t=>{\n    t.addEventListener('click',()=>{\n      tabs.forEach(x=>x.classList.remove('active'));\n      t.classList.add('active');\n      Object.values(flows).forEach(f=>{f.el.style.display='none'});\n      const f = flows[t.dataset.tab];\n      f.el.style.display='flex';\n      lat.textContent = f.lat;\n      desc.innerHTML = f.desc;\n    });\n  });\n})();\n\n/* ===== smooth scroll ===== */\ndocument.querySelectorAll('a[href^=\"#\"]').forEach(a=>{\n  a.addEventListener('click',e=>{\n    const id = a.getAttribute('href');\n    if (id.length>1){\n      const t = document.querySelector(id);\n      if (t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}\n    }\n  });\n});\n\n/* ============ 3D LATENCY RACE ============ */\n(function(){\n  const wrap = document.getElementById('lat3d');\n  if (!wrap) return;\n  const rows = wrap.querySelectorAll('.lat3d-row');\n  const buttons = wrap.querySelectorAll('.lat3d-toggle button');\n  const maxMs = 80; // Cassandra\n  let state = 'idle'; // idle | running | paused | done\n  let startTime = 0;\n  let pausedAt = 0;\n  let raf = null;\n  let loop = false;\n\n  function setActive(mode){\n    buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));\n  }\n\n  function reset(){\n    rows.forEach(r => {\n      const pkt = r.querySelector('.lat3d-pkt');\n      pkt.style.transition = 'none';\n      pkt.style.left = '0px';\n      // force reflow\n      void pkt.offsetWidth;\n    });\n  }\n\n  function start(){\n    reset();\n    state = 'running';\n    setActive('play');\n    rows.forEach(r => {\n      const pkt = r.querySelector('.lat3d-pkt');\n      const bay = r.querySelector('.lat3d-bay');\n      const ms = parseFloat(r.dataset.ms);\n      const w = bay.clientWidth - pkt.offsetWidth;\n      // duration scales with ms, normalized so cassandra (80ms) takes ~6s\n      const dur = (ms / maxMs) * 6;\n      pkt.style.transition = `left ${dur}s linear`;\n      // double rAF to ensure transition picks up\n      requestAnimationFrame(()=> requestAnimationFrame(()=> {\n        pkt.style.left = w + 'px';\n      }));\n    });\n    if (loop){\n      clearTimeout(raf);\n      raf = setTimeout(start, 7200);\n    }\n  }\n\n  function pause(){\n    state = 'paused';\n    setActive('pause');\n    rows.forEach(r => {\n      const pkt = r.querySelector('.lat3d-pkt');\n      const cs = getComputedStyle(pkt);\n      const left = cs.left;\n      pkt.style.transition = 'none';\n      pkt.style.left = left;\n    });\n    clearTimeout(raf);\n  }\n\n  buttons.forEach(b => {\n    b.addEventListener('click', () => {\n      const mode = b.dataset.mode;\n      if (mode === 'play'){ loop = false; start(); }\n      else if (mode === 'pause'){ pause(); }\n      else if (mode === 'loop'){ loop = true; setActive('loop'); start(); }\n    });\n  });\n\n  // Auto-start on first viewport entry\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e => {\n      if (e.isIntersecting && state === 'idle'){\n        loop = true;\n        setActive('loop');\n        setTimeout(start, 200);\n      }\n    });\n  }, { threshold: 0.4 });\n  io.observe(wrap);\n})();\n\n/* ============ 3D TILT ON CARDS ============ */\n(function(){\n  if (window.matchMedia('(hover:none)').matches) return;\n  const els = document.querySelectorAll('.case, .duel-card, .outcome');\n  els.forEach(el => {\n    let raf = null;\n    el.addEventListener('mousemove', (e) => {\n      const r = el.getBoundingClientRect();\n      const x = (e.clientX - r.left) / r.width - 0.5;\n      const y = (e.clientY - r.top) / r.height - 0.5;\n      cancelAnimationFrame(raf);\n      raf = requestAnimationFrame(() => {\n        el.style.transform = `perspective(1000px) rotateY(${x * 4}deg) rotateX(${-y * 4}deg) translateZ(4px)`;\n      });\n    });\n    el.addEventListener('mouseleave', () => {\n      cancelAnimationFrame(raf);\n      el.style.transform = '';\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
